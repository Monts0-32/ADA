<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | Partition Network</title>
    <script src="/uplink.js"></script>
    <script src="/chat-widget.js"></script>
    <style>
        :root { --bg: #0d1117; --header: #161b22; --border: #30363d; --text: #c9d1d9; --btn-green: #238636; --blue: #58a6ff; --red: #f85149; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; }
        #main-content { display: none; max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .wiki-card { background: #161b22; border: 1px solid var(--border); border-radius: 8px; padding: 20px; position: relative; display: flex; flex-direction: column; min-height: 400px; box-sizing: border-box; }
        .wiki-card:hover { border-color: #8b949e; }
        .card-img { width: 100%; height: 160px; object-fit: cover; border-radius: 6px; background: #0d1117; margin-bottom: 15px; border: 1px solid var(--border); }
        .user-pill-mini { display: inline-flex; align-items: center; gap: 8px; font-size: 11px; color: var(--blue); background: rgba(88, 166, 255, 0.08); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(88, 166, 255, 0.2); margin-bottom: 15px; width: fit-content; }
        .user-pill-mini img { width: 18px; height: 18px; border-radius: 50%; object-fit: cover; }
        .card-footer { margin-top: auto; width: 100%; padding-right: 40px; box-sizing: border-box; }
        .btn { padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; color: white; background: #21262d; border: 1px solid var(--border); text-align: center; font-size: 13px; display: block; }
        .btn-green { background: var(--btn-green); border: none; }
        .menu-btn { position: absolute; bottom: 12px; right: 12px; cursor: pointer; color: #8b949e; font-size: 24px; padding: 5px; z-index: 100; line-height: 1; }
        .dropdown { position: absolute; bottom: 50px; right: 12px; background: #1c2128; border: 1px solid var(--border); border-radius: 6px; display: none; z-index: 200; width: 170px; box-shadow: 0 8px 24px #000; }
        .dropdown div { padding: 12px 15px; font-size: 13px; cursor: pointer; border-bottom: 1px solid var(--border); color: #c9d1d9; }
        .dropdown div:hover { background: #30363d; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #161b22; border: 1px solid var(--border); border-radius: 12px; padding: 30px; z-index: 5000; width: 450px; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:4000; }
        input, textarea { width: 100%; background: #0d1117; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 6px; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .suggest-box { position: absolute; background: #21262d; border: 1px solid var(--border); width: 100%; top: 100%; left: 0; z-index: 3000; border-radius: 6px; display: none; }
        .suggest-item { padding: 10px; display: flex; align-items: center; gap: 10px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 12px; }
    </style>
</head>
<body>


<div id="main-content">
    <div class="header-row">
        <h1>Partition Network</h1>
        <button class="btn btn-green" style="width:auto;" onclick="window.openCreatePopup()">+ Create Partition</button>
    </div>
    <div class="grid" id="wiki-grid"></div>
</div>

<div class="overlay" id="modal-overlay" onclick="window.closeModals()"></div>

<!-- CREATE -->
<div class="modal" id="create-modal">
    <h3>Initialize Partition</h3>
    <input type="text" id="new-title" placeholder="Sector Title...">
    <button class="btn btn-green" id="btn-create-submit" onclick="window.submitCreate()">Initialize</button>
    <button class="btn" onclick="window.closeModals()">Cancel</button>
</div>

<!-- EDIT -->
<div class="modal" id="edit-modal">
    <h3>Edit Card Metadata</h3>
    <input type="text" id="edit-title">
    <textarea id="edit-desc" style="height:80px;"></textarea>
    <label class="btn" style="background:#0d1117; display:block; text-align:center;">Upload Image<input type="file" id="img-in" hidden onchange="window.handleImg(this)"></label>
    <input type="hidden" id="edit-img-data">
    <button class="btn btn-green" onclick="window.saveMetadata()">Save Changes</button>
</div>

<!-- SETTINGS -->
<div class="modal" id="settings-modal">
    <h3>Access Control</h3>
    <div style="position:relative; margin-bottom:15px;">
        <input type="text" id="u-search" placeholder="Search user..." oninput="window.searchUsers(this.value)">
        <div id="suggestions" class="suggest-box"></div>
    </div>
    <div id="access-list-ui" style="max-height:150px; overflow-y:auto; margin-bottom:15px;"></div>
    <button class="btn" onclick="window.transferOwnership()" style="color:var(--blue)">Transfer Owner</button>
    <button class="btn" onclick="window.closeModals()">Close</button>
</div>

<script>
    const API = "https://ada-relay.andrewdinglearchive.workers.dev";
    const DEFAULT_ICON = `data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzhCOTRBRSIgd2lkdGg9IjI0IiBoZWlnaHQ9IjI0Ij48cGF0aCBkPSJNMTIgMTJjMi4yMSAwIDQtMS43OSA0LTREOCAzLjM0IDgtNy4zNCA4LTQgMTQuMjEgMTIgMTIgMTJ6bTAgMmMtMi42NyAwLTggMS4zNC04IDR2MmgxNnYtMmMwLTIuNjYtNS4zMy00LTggNHoiLz48L3N2Zz4=`;
    
    let activeId = null;
    let currentUser = null;

    // --- ATTACH GLOBALS IMMEDIATELY ---
    window.openModal = (id) => {
        document.getElementById('modal-overlay').style.display = 'block';
        document.getElementById(id).style.display = 'block';
    };

    window.closeModals = () => {
        document.querySelectorAll('.modal, .overlay, .dropdown').forEach(el => el.style.display = 'none');
        document.getElementById('suggestions').style.display = 'none';
    };

    window.openCreatePopup = () => window.openModal('create-modal');

    window.toggleMenu = (id) => {
        event.stopPropagation();
        const m = document.getElementById(`menu-${id}`);
        const open = m.style.display === 'block';
        document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none');
        if(!open) m.style.display = 'block';
    };

    window.submitCreate = async function() {
        const title = document.getElementById('new-title').value.trim();
        const btn = document.getElementById('btn-create-submit');
        const email = localStorage.getItem('ada_user_email');
        if(!title) return alert("Title required.");
        
        btn.disabled = true; btn.innerText = "Syncing...";
        const res = await fetch(`${API}/wiki/create`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, title })
        });
        const d = await res.json();
        if(d.success) {
            window.closeModals(); window.loadCards();
            document.getElementById('new-title').value = '';
        } else { alert("Error: " + d.error); }
        btn.disabled = false; btn.innerText = "Initialize";
    };

    window.loadCards = async function() {
        const res = await fetch(`${API}/wiki/metadata`);
        const cards = await res.json();
        const myEmail = localStorage.getItem('ada_user_email');
        const isAdmin = currentUser?.is_admin === 1;

        document.getElementById('wiki-grid').innerHTML = cards.map(c => {
            const isOwner = myEmail === c.creator_email || isAdmin;
            return `
                <div class="wiki-card">
                    <img src="${c.image_url || ''}" class="card-img" onerror="this.src='https://via.placeholder.com/300x160?text=Partition'">
                    <div class="user-pill-mini">
                        <img src="${c.profile_picture || DEFAULT_ICON}">
                        <span>${c.display_name || c.creator_email}</span>
                    </div>
                    <h3 class="wiki-title">${c.title}</h3>
                    <p class="wiki-desc">${c.description || 'Sector online.'}</p>
                    <div class="card-footer"><a href="/wiki.html?id=${c.id}" class="btn btn-green">Open Partition</a></div>
                    ${isOwner ? `<div class="menu-btn" onclick="window.toggleMenu('${c.id}')">â‹®</div>` : ''}
                    <div class="dropdown" id="menu-${c.id}">
                        <div onclick="window.openEdit('${c.id}','${c.title}','${c.description}','${c.image_url}')">Edit Card</div>
                        <div onclick="window.openSettings('${c.id}')">Permissions</div>
                        <div style="color:var(--red)" onclick="window.deleteWiki('${c.id}')">Wipe Sector</div>
                    </div>
                </div>`;
        }).join('');
    };

    window.openEdit = (id, t, d, img) => { activeId = id; document.getElementById('edit-title').value = t; document.getElementById('edit-desc').value = d; document.getElementById('edit-img-data').value = img; window.openModal('edit-modal'); };
    window.handleImg = (i) => { if(i.files[0]){ const r=new FileReader(); r.onload=(e)=>document.getElementById('edit-img-data').value=e.target.result; r.readAsDataURL(i.files[0]); }};
    window.saveMetadata = async () => { await fetch(`${API}/wiki/metadata/save`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ id: activeId, title: document.getElementById('edit-title').value, description: document.getElementById('edit-desc').value, image_url: document.getElementById('edit-img-data').value }) }); window.closeModals(); window.loadCards(); };

    window.openSettings = (id) => { activeId = id; window.openModal('settings-modal'); window.refreshAccessList(); };
    window.refreshAccessList = async () => {
        const res = await fetch(`${API}/wiki/load?id=${activeId}`);
        const data = await res.json();
        document.getElementById('access-list-ui').innerHTML = data.allowedUsers.map(p => `<div class="access-row"><span>${p.user_email}</span><span style="color:var(--red); cursor:pointer;" onclick="window.removeAccess('${p.user_email}')">Ă—</span></div>`).join('') || '<p style="text-align:center; font-size:11px; opacity:0.5;">Private Partition</p>';
    };

    window.searchUsers = async (q) => { 
        if(q.length < 2) return;
        const res = await fetch(`${API}/search/suggest?q=${encodeURIComponent(q)}`);
        const users = await res.json();
        const box = document.getElementById('suggestions');
        box.innerHTML = users.map(u => `<div class="suggest-item" onclick="window.grant('${u.email}')"><img src="${u.profile_picture}" width="20"><span>${u.email}</span></div>`).join('');
        box.style.display = 'block';
    };

    window.grant = async (e) => { await fetch(`${API}/wiki/access/update`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ wikiId: activeId, targetEmail: e, level: 'edit' }) }); document.getElementById('u-search').value = ''; window.refreshAccessList(); };
    window.removeAccess = async (e) => { if(confirm("Revoke?")) { await fetch(`${API}/wiki/access/delete`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ wikiId: activeId, userEmail: e }) }); window.refreshAccessList(); } };
    window.transferOwnership = async () => { const e = prompt("New owner email:"); if(e && confirm(`Transfer?`)) { await fetch(`${API}/wiki/transfer`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ id: activeId, newOwner: e }) }); window.closeModals(); window.loadCards(); }};
    window.deleteWiki = async (id) => {
      if(confirm("Wipe?")) {
        await fetch(`${API}/wiki/delete`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id })
        });
        window.loadCards();
      }
    };

    async function init() {
        try {
            if (typeof runNeuralGuard !== 'function') {
                console.warn("runNeuralGuard not ready...");
                setTimeout(init, 100);
                return;
            }
    
            const data = await runNeuralGuard('wiki_access');
            console.log("INIT DATA:", data);
    
            if (!data) {
                console.error("No data from guard");
                return;
            }
    
            currentUser = data.user;
    
            document.getElementById('main-content').style.display = 'block';
    
            console.log("Loading cards...");
            await window.loadCards();
    
        } catch (err) {
            console.error("INIT CRASH:", err);
        }
    }

    window.onclick = (e) => {
      if (!e.target.closest('.menu-btn') && !e.target.closest('.dropdown') && !e.target.closest('.modal')) {
        window.closeModals();
      }
    };
</script>
</body>
</html>
