<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | Wiki Partitions</title>
    
    <!-- 1. BOOTSTRAP SCRIPTS -->
    <script src="/uplink.js"></script>
    <script src="/header-engine.js"></script>
    <script src="/chat-widget.js"></script>

    <style>
        :root { --bg: #0d1117; --header: #161b22; --border: #30363d; --text: #c9d1d9; --btn-green: #238636; --blue: #58a6ff; --red: #f85149; }
        
        /* THEMED SCROLLBAR */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 5px; }

        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; }
        
        /* CONTENT WRAPPER (Hidden until guard clears) */
        #main-content { display: none; max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        
        /* CARD STYLING */
        .wiki-card { background: #161b22; border: 1px solid var(--border); border-radius: 8px; padding: 20px; position: relative; transition: 0.2s; }
        .wiki-card:hover { border-color: #8b949e; }
        .card-img { width: 100%; height: 160px; object-fit: cover; border-radius: 6px; background: #0d1117; margin-bottom: 15px; border: 1px solid var(--border); }
        
        /* CREATOR TAG */
        .creator-tag { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #8b949e; margin-bottom: 12px; background: rgba(0,0,0,0.3); padding: 5px 10px; border-radius: 20px; width: fit-content; border: 1px solid var(--border); }
        .creator-tag img { width: 18px; height: 18px; border-radius: 50%; object-fit: cover; }

        /* THREE DOTS MENU */
        .menu-btn { position: absolute; top: 15px; right: 15px; cursor: pointer; color: #8b949e; padding: 5px; font-size: 20px; line-height: 1; }
        .menu-btn:hover { color: white; }
        .dropdown { position: absolute; top: 45px; right: 15px; background: #1c2128; border: 1px solid var(--border); border-radius: 6px; display: none; z-index: 100; width: 160px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .dropdown div { padding: 10px 15px; font-size: 12px; cursor: pointer; border-bottom: 1px solid var(--border); color: #c9d1d9; }
        .dropdown div:hover { background: #30363d; color: var(--blue); }
        .dropdown div:last-child { border-bottom: none; color: var(--red); }

        /* MODALS */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #161b22; border: 1px solid var(--border); border-radius: 12px; padding: 30px; z-index: 2000; width: 450px; box-shadow: 0 0 100px rgba(0,0,0,0.8); }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1900; backdrop-filter: blur(4px); }
        
        input, textarea { width: 100%; background: #0d1117; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 6px; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--blue); }
        
        .btn { padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; border: 1px solid var(--border); width: 100%; margin-bottom: 10px; color: white; background: #21262d; transition: 0.2s; }
        .btn-green { background: var(--btn-green); border: none; }
        .btn-green:hover { background: #2ea043; }

        /* SMART LOOKUP */
        .search-suggest { position: absolute; background: #21262d; border: 1px solid var(--border); width: 100%; top: 45px; z-index: 10; border-radius: 6px; display: none; max-height: 200px; overflow-y: auto; }
        .suggest-item { padding: 10px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 12px; border-bottom: 1px solid var(--border); }
        .suggest-item:hover { background: #30363d; }
        .suggest-item img { width: 24px; height: 24px; border-radius: 50%; }
    </style>
</head>
<body>

<!-- Header injection anchor -->
<div id="ada-header-anchor"></div>

<div id="main-content">
    <div class="header-row">
        <h1>Partition Network</h1>
        <button class="btn btn-green" style="width:auto;" onclick="createPartition()">+ New Partition</button>
    </div>
    <div class="grid" id="wiki-grid"></div>
</div>

<!-- MODALS -->
<div class="overlay" id="modal-overlay" onclick="closeModals()"></div>

<!-- EDIT CARD MODAL -->
<div class="modal" id="edit-modal">
    <h3 style="margin-top:0">Edit Card Meta</h3>
    <input type="text" id="edit-title" placeholder="Partition Title">
    <textarea id="edit-desc" placeholder="Partition Description" style="height:80px; resize:none;"></textarea>
    <label class="btn" style="display:block; text-align:center;">Upload Image<input type="file" id="img-input" hidden onchange="handleImg(this)"></label>
    <input type="hidden" id="edit-img-data">
    <button class="btn btn-green" onclick="saveMetadata()">Apply Changes</button>
</div>

<!-- SETTINGS MODAL -->
<div class="modal" id="settings-modal">
    <h3 style="margin-top:0">Access Control</h3>
    <div style="font-size:11px; color:#8b949e; margin-bottom:10px;">GRANT ACCESS TO USER</div>
    <div style="position:relative;">
        <input type="text" id="user-search" placeholder="Search by name or email..." oninput="searchUsers(this.value)">
        <div id="suggestions" class="search-suggest"></div>
    </div>
    
    <div style="border-top: 1px solid var(--border); margin-top:20px; padding-top:20px;">
        <button class="btn" onclick="transferOwnership()">Transfer Ownership</button>
        <button class="btn" style="color:var(--red); border-color:rgba(248,81,73,0.3);" onclick="deleteWiki()">Delete Partition</button>
    </div>
</div>

<script>
    const API = "https://ada-relay.andrewdinglearchive.workers.dev";
    let activeWikiId = null;
    let currentUser = null;

    // --- SECURITY BOOTSTRAP ---
    async function start() {
        if (typeof runNeuralGuard !== 'function') {
            setTimeout(start, 100);
            return;
        }

        // Run guard with the required tag
        const data = await runNeuralGuard('wiki_access'); 
        if(!data) return; // runNeuralGuard handles redirects

        currentUser = data.user;
        document.getElementById('main-content').style.display = 'block';
        loadCards();
    }

    async function loadCards() {
        const mRes = await fetch(`${API}/wiki/metadata`);
        const cards = await mRes.json();
        
        const grid = document.getElementById('wiki-grid');
        grid.innerHTML = cards.map(c => {
            const isOwner = currentUser.email === c.creator_email || currentUser.is_admin;
            
            return `
                <div class="wiki-card">
                    ${isOwner ? `<div class="menu-btn" onclick="toggleMenu('${c.id}')">⋮</div>` : ''}
                    <div class="dropdown" id="menu-${c.id}">
                        <div onclick="openEdit('${c.id}', '${c.title}', '${c.description}', '${c.image_url}')">Edit Card Meta</div>
                        <div onclick="openSettings('${c.id}')">Page Settings</div>
                        <div onclick="deleteWiki('${c.id}')">Delete Partition</div>
                    </div>
                    <img src="${c.image_url || 'https://via.placeholder.com/300x160?text=ADA+Partition'}" class="card-img" onerror="this.src='https://via.placeholder.com/300x160?text=Blocked+Image'">
                    <div class="creator-tag">
                        <span>Created by: <b>${c.creator_email}</b></span>
                    </div>
                    <h3 style="margin:0;">${c.title}</h3>
                    <p style="font-size:12px; color:#8b949e; height:36px; overflow:hidden;">${c.description}</p>
                    <a href="/wiki.html?id=${c.id}" class="btn btn-green">Open Partition</a>
                </div>
            `;
        }).join('');
    }

    async function createPartition() {
        const res = await fetch(`${API}/wiki/create`, { 
            method: 'POST', 
            body: JSON.stringify({ email: currentUser.email }) 
        });
        const d = await res.json();
        if(d.success) loadCards();
    }

    function toggleMenu(id) {
        // Close others
        document.querySelectorAll('.dropdown').forEach(d => { if(d.id !== `menu-${id}`) d.style.display = 'none'; });
        const m = document.getElementById(`menu-${id}`);
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    // MODAL LOGIC
    function openEdit(id, title, desc, img) {
        activeWikiId = id;
        document.getElementById('edit-title').value = title;
        document.getElementById('edit-desc').value = desc;
        document.getElementById('edit-img-data').value = img;
        document.getElementById('modal-overlay').style.display = 'block';
        document.getElementById('edit-modal').style.display = 'block';
    }

    function openSettings(id) {
        activeWikiId = id;
        document.getElementById('modal-overlay').style.display = 'block';
        document.getElementById('settings-modal').style.display = 'block';
    }

    function closeModals() {
        document.querySelectorAll('.modal, .overlay, .dropdown').forEach(el => el.style.display = 'none');
    }

    function handleImg(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => document.getElementById('edit-img-data').value = e.target.result;
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function saveMetadata() {
        const title = document.getElementById('edit-title').value;
        const description = document.getElementById('edit-desc').value;
        const image_url = document.getElementById('edit-img-data').value;
        
        await fetch(`${API}/wiki/metadata/save`, { 
            method: 'POST', 
            body: JSON.stringify({ id: activeWikiId, title, description, image_url }) 
        });
        closeModals();
        loadCards();
    }

    async function searchUsers(q) {
        const box = document.getElementById('suggestions');
        if(q.length < 2) { box.style.display = 'none'; return; }
        
        const res = await fetch(`${API}/search/suggest?q=${encodeURIComponent(q)}`);
        const users = await res.json();
        
        box.innerHTML = users.map(u => `
            <div class="suggest-item" onclick="grantAccess('${u.email}')">
                <img src="${u.profile_picture}">
                <span>${u.display_name || u.email}</span>
            </div>
        `).join('');
        box.style.display = 'block';
    }

    async function grantAccess(targetEmail) {
        const level = confirm(`Grant EDIT access to ${targetEmail}?\n(Cancel for VIEW only)`) ? 'edit' : 'view';
        await fetch(`${API}/wiki/access/update`, { 
            method: 'POST', 
            body: JSON.stringify({ wikiId: activeWikiId, targetEmail, level }) 
        });
        alert("Permissions updated.");
        document.getElementById('suggestions').style.display = 'none';
    }

    async function transferOwnership() {
        const newOwner = prompt("Enter email of the new owner:");
        if(newOwner) {
            await fetch(`${API}/wiki/transfer`, { 
                method: 'POST', 
                body: JSON.stringify({ id: activeWikiId, newOwner }) 
            });
            closeModals();
            loadCards();
        }
    }

    async function deleteWiki(id = null) {
        const targetId = id || activeWikiId;
        if(confirm("Are you sure? This partition and all its content will be permanently wiped.")) {
            await fetch(`${API}/wiki/delete`, { 
                method: 'POST', 
                body: JSON.stringify({ id: targetId }) 
            });
            closeModals();
            loadCards();
        }
    }

    // Start everything
    start();
</script>

</body>
</html>
