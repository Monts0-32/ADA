<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | Wiki Selector</title>
    <style>
        :root { --bg: #0d1117; --header: #161b22; --border: #30363d; --text: #c9d1d9; --btn-green: #238636; --blue: #58a6ff; }
        
        /* CUSTOM SCROLLBAR */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #444c56; }

        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; }
        
        header { background: var(--header); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 600; color: #f0f6fc; text-decoration: none; font-size: 14px; }
        
        /* USER PILL */
        .user-pill { display: flex; align-items: center; gap: 8px; background: #21262d; border: 1px solid var(--border); padding: 4px 12px; border-radius: 20px; text-decoration: none; color: var(--text); font-size: 12px; transition: 0.2s; }
        .user-pill:hover { border-color: #8b949e; background: #30363d; }
        .user-pill img { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; background: #0d1117; }

        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; text-align: center; }
        h1 { border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 40px; font-weight: 400; font-size: 24px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; justify-content: center; align-items: start; }
        .wiki-card { background: #161b22; border: 1px solid var(--border); border-radius: 6px; padding: 20px; text-align: left; width: 100%; box-sizing: border-box; transition: 0.2s; }
        .wiki-card:hover { border-color: #8b949e; }
        .wiki-card img { width: 100%; height: 140px; object-fit: cover; border-radius: 4px; margin-bottom: 15px; background: #0d1117; display: block; }
        .wiki-card h3 { margin: 0 0 10px 0; font-size: 18px; color: var(--blue); }
        .wiki-card p { font-size: 13px; color: #8b949e; margin-bottom: 20px; line-height: 1.4; }
        
        .btn { display: block; width: 100%; padding: 10px; background: var(--btn-green); color: white; border: none; border-radius: 6px; cursor: pointer; text-align: center; text-decoration: none; font-size: 13px; font-weight: 600; box-sizing: border-box; }
        .btn:hover { background: #2ea043; }
        
        .admin-edit-panel { background: #21262d; border: 1px solid var(--blue); padding: 12px; border-radius: 6px; margin-top: 12px; display: none; }
        .admin-edit-panel input { width: 100%; background: #0d1117; border: 1px solid var(--border); color: white; margin-bottom: 8px; padding: 6px; border-radius: 4px; font-size: 12px; box-sizing: border-box; outline: none; }
        
        .edit-toggle-btn { background: #21262d; border: 1px solid var(--border); color: var(--text); padding: 5px 15px; border-radius: 6px; cursor: pointer; display: none; font-size: 12px; }
    </style>
</head>
<body>
    <!-- LOADING OVERLAY -->
<div id="neural-guard" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#0d1117; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; transition: opacity 0.5s;">
    <div style="width:40px; height:40px; border:3px solid #30363d; border-top-color:#58a6ff; border-radius:50%; animation: spin 1s linear infinite;"></div>
    <p style="color:#8b949e; font-family:monospace; font-size:12px; margin-top:20px; letter-spacing:2px;">SYNCHRONIZING ARCHIVE...</p>
</div>

<style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-out { opacity: 0; pointer-events: none; }
</style>

<script>
async function initGuard(requiredTag = null) {
    const API = "https://ada-relay.andrewdinglearchive.workers.dev";
    const email = localStorage.getItem('ada_user_email');
    const path = window.location.pathname.split("/").pop() || "index.html";

    if (!email) { window.location.href = '/login.html'; return; }

    try {
        const res = await fetch(`${API}/sync?email=${encodeURIComponent(email)}`);
        const data = await res.json();

        // 1. Check if Profile is Disabled
        if (data.user.profile_disabled && !data.user.is_admin) {
            document.body.innerHTML = `<div style="color:white; text-align:center; padding:100px;"><h1>Identity Disabled</h1><p>Contact Admin.</p></div>`;
            return;
        }

        // 2. Check for Specific Path Block
        if (data.blocks.includes(path) || data.blocks.includes('ALL')) {
            window.location.href = '/blocked.html';
            return;
        }

        // 3. Check Permissions
        if (requiredTag && !data.user.is_admin && !data.permissions.includes(requiredTag)) {
            window.location.href = '/blocked.html';
            return;
        }

        // Success: Remove Loader
        const guard = document.getElementById('neural-guard');
        guard.classList.add('fade-out');
        return data; // Return data so the page can use it immediately

    } catch (e) {
        console.error("Guard Sync Error", e);
        document.body.innerHTML = `<div style="color:red; text-align:center; padding:100px;"><h1>Sync Failure</h1><p>Worker Offline.</p></div>`;
    }
}
</script>
    <div id="ada-chat-widget">
        <div id="chat-window">
            <div id="chat-header"><span>Archive Communications</span><span onclick="toggleChat()" style="cursor:pointer;opacity:0.6;">✕</span></div>
            <div id="chat-body"></div>
            <form id="chat-footer" onsubmit="event.preventDefault(); sendChatText();">
                <input type="text" id="chat-msg-input" placeholder="Type a message..." autocomplete="off">
                <button type="button" class="chat-btn" onclick="document.getElementById('chat-file').click()" title="Share Image">🖼️</button>
                <input type="file" id="chat-file" hidden accept="image/*" onchange="uploadChatImg(this)">
                <button type="submit" class="chat-btn btn-send">Send</button>
            </form>
        </div>
        <div id="chat-icon" onclick="toggleChat()">💬<div id="chat-notif"></div></div>
    </div>
    
    <style>
        #ada-chat-widget { position: fixed; bottom: 25px; right: 25px; z-index: 9999; font-family: -apple-system, sans-serif; }
        #chat-icon { width: 56px; height: 56px; background: #238636; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); position: relative; }
        #chat-notif { position: absolute; top: 2px; right: 2px; width: 14px; height: 14px; background: #f85149; border-radius: 50%; border: 2px solid #0d1117; display: none; }
        
        /* Bigger Window */
        #chat-window { width: 380px; height: 550px; background: #161b22; border: 1px solid #30363d; border-radius: 12px; display: none; flex-direction: column; margin-bottom: 15px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        #chat-header { background: #21262d; padding: 14px; font-size: 14px; font-weight: 600; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; }
        #chat-body { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #0d1117; }
        #chat-footer { padding: 12px; border-top: 1px solid #30363d; display: flex; gap: 8px; align-items: center; background: #161b22; }
        #chat-msg-input { flex: 1; background: #0d1117; border: 1px solid #30363d; color: white; padding: 8px 12px; border-radius: 6px; outline: none; font-size: 13px; }
        
        /* Styled Buttons */
        .chat-btn { background: #21262d; border: 1px solid #30363d; color: white; padding: 7px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.2s; }
        .chat-btn:hover { background: #30363d; border-color: #8b949e; }
        .btn-send { background: #238636; border: none; }
        .btn-send:hover { background: #2ea043; }
    
        /* Message Bubbles with Avatars */
        .chat-row { display: flex; gap: 10px; align-items: flex-end; max-width: 90%; }
        .chat-row.me { flex-direction: row-reverse; align-self: flex-end; }
        .chat-row img.chat-avatar { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #30363d; background: #0d1117; flex-shrink: 0; }
        .chat-bubble { padding: 8px 12px; border-radius: 12px; font-size: 13px; line-height: 1.4; word-wrap: break-word; position: relative; }
        .chat-row.other .chat-bubble { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-bottom-left-radius: 2px; }
        .chat-row.me .chat-bubble { background: #238636; color: white; border-bottom-right-radius: 2px; }
        .chat-user-label { font-size: 9px; opacity: 0.5; display: block; margin-bottom: 2px; }
    </style>
    
    <script>
        const CHAT_API = "https://ada-relay.andrewdinglearchive.workers.dev";
        const myChatEmail = localStorage.getItem('ada_user_email');
        let isChatOpen = false;
        let lastChatId = 0;
    
        function toggleChat() {
            isChatOpen = !isChatOpen;
            document.getElementById('chat-window').style.display = isChatOpen ? 'flex' : 'none';
            if(isChatOpen) {
                document.getElementById('chat-notif').style.display = 'none';
                const body = document.getElementById('chat-body');
                body.scrollTop = body.scrollHeight;
            }
        }
    
        async function syncWidget() {
            if(!myChatEmail) return;
            const res = await fetch(`${CHAT_API}/sync?email=${encodeURIComponent(myChatEmail)}`);
            const data = await res.json();
            
            const latest = data.messages[data.messages.length - 1];
            if(latest && latest.id > lastChatId) {
                if(!isChatOpen && lastChatId !== 0) document.getElementById('chat-notif').style.display = 'block';
                lastChatId = latest.id;
                
                const body = document.getElementById('chat-body');
                body.innerHTML = data.messages.map(m => `
                    <div class="chat-row ${m.user_email === myChatEmail ? 'me' : 'other'}">
                        <img src="${m.profile_picture}" class="chat-avatar" title="${m.user_email}">
                        <div class="chat-bubble">
                            <span class="chat-user-label">${m.display_name || m.user_email}</span>
                            ${m.is_image ? `<img src="${m.content}" style="max-width:100%;border-radius:6px;margin-top:5px;cursor:pointer;" onclick="window.open(this.src)">` : m.content}
                        </div>
                    </div>
                `).join('');
                if(isChatOpen) body.scrollTop = body.scrollHeight;
            }
        }
    
        async function sendChatText() {
            const inp = document.getElementById('chat-msg-input');
            if(!inp.value.trim()) return;
            await fetch(`${CHAT_API}/chat`, { method: 'POST', body: JSON.stringify({ email: myChatEmail, content: inp.value, isImage: false }) });
            inp.value = ''; syncWidget();
        }
    
        async function uploadChatImg(input) {
            if (input.files && input.files[0]) {
                const r = new FileReader();
                r.onload = async (e) => {
                    await fetch(`${CHAT_API}/chat`, { method: 'POST', body: JSON.stringify({ email: myChatEmail, content: e.target.result, isImage: true }) });
                    syncWidget();
                };
                r.readAsDataURL(input.files[0]);
            }
        }
    
        setInterval(syncWidget, 3000); syncWidget();
    </script>
<header>
    <div style="display:flex; gap:20px; align-items:center;">
        <a href="/dash.html" class="logo">ADA Archive Selector</a>
        <button id="admin-edit-btn" class="edit-toggle-btn" onclick="toggleEditMode()">Edit Card Metadata</button>
    </div>
    
    <div style="display:flex; gap:12px; align-items:center;">
        <a href="/profile.html" class="user-pill">
            <img id="pill-avatar" src="" alt="" style="display:none;">
            <span id="pill-name">Syncing...</span>
        </a>
        <button class="btn" style="background:transparent; color:#f85149; border-color:rgba(248,81,73,0.3); width:auto; padding:4px 12px;" onclick="logout()">Logout</button>
    </div>
</header>

<div class="container" id="main-content" style="display:none;">
    <h1>Wiki Archive Partitions</h1>
    <div class="grid" id="wiki-grid"></div>
</div>

<div id="error-screen" style="display:none; padding:100px; text-align:center; color:#f85149;">
    <h3>Authentication Failed</h3>
    <p id="error-msg">You do not have permission to view this partition.</p>
    <a href="/dash.html" style="color:var(--blue)">Return to Dashboard</a>
</div>

<script>
    // IMPORTANT: Update this to your exact Worker URL
    const API = "https://ada-relay.andrewdinglearchive.workers.dev";
    const email = localStorage.getItem('ada_user_email');
    let editModeActive = false;

    async function init() {
        if (!email) { window.location.href = '/login.html'; return; }

        try {
            console.log("ADA: Initiating Security Sync...");
            const res = await fetch(`${API}/sync?email=${encodeURIComponent(email)}`);
            
            if (!res.ok) throw new Error("Worker responded with an error.");
            const data = await res.json();

            if (!data.user) {
                document.getElementById('pill-name').innerText = "Unknown User";
                throw new Error("User record not found in database.");
            }

            // Security Check
            const isAdmin = data.user.is_admin === 1;
            const hasAccess = isAdmin || data.permissions.includes('wiki_access');
            const isBlocked = data.blocks.includes('wikiselector.html') || data.blocks.includes('ALL');

            if (!hasAccess || isBlocked) {
                window.location.href = '/blocked.html';
                return;
            }

            // Populate UI
            document.getElementById('pill-name').innerText = data.user.display_name || data.user.email;
            const avatar = document.getElementById('pill-avatar');
            if (data.user.profile_picture) {
                avatar.src = data.user.profile_picture;
                avatar.style.display = 'block';
            }

            if (isAdmin) document.getElementById('admin-edit-btn').style.display = 'block';

            document.getElementById('main-content').style.display = 'block';
            loadCards();

        } catch (e) {
            console.error("Sync Error:", e);
            document.getElementById('pill-name').innerText = "Sync Failed";
            document.getElementById('error-screen').style.display = 'block';
            document.getElementById('error-msg').innerText = "System Error: " + e.message;
        }
    }

    async function loadCards() {
        try {
            const res = await fetch(`${API}/wiki/metadata`);
            const cards = await res.json();
            const grid = document.getElementById('wiki-grid');
            
            grid.innerHTML = cards.map(c => `
                <div class="wiki-card">
                    <img src="${c.image_url}" alt="Partition">
                    <h3>${c.title}</h3>
                    <p>${c.description || 'System Documentation Partition'}</p>
                    <a href="/wiki.html?id=${c.id}" class="btn">Open Partition</a>
                    
                    <div class="admin-edit-panel" id="panel-${c.id}">
                        <input type="text" id="in-title-${c.id}" value="${c.title}" placeholder="Partition Title">
                        <input type="text" id="in-img-${c.id}" value="${c.image_url}" placeholder="Image URL">
                        <button class="btn" style="background:var(--blue)" onclick="saveCard('${c.id}')">Save Metadata</button>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            console.error("Cards failed to load", e);
        }
    }

    function toggleEditMode() {
        editModeActive = !editModeActive;
        document.querySelectorAll('.admin-edit-panel').forEach(panel => {
            panel.style.display = editModeActive ? 'block' : 'none';
        });
    }

    async function saveCard(id) {
        const title = document.getElementById(`in-title-${id}`).value;
        const image_url = document.getElementById(`in-img-${id}`).value;

        await fetch(`${API}/wiki/metadata/save`, {
            method: 'POST',
            body: JSON.stringify({ id, title, image_url, description: "Documentation Sector" })
        });
        
        loadCards();
    }

    function logout() {
        localStorage.clear();
        window.location.href = '/login.html';
    }

    init();
</script>
</body>
</html>
