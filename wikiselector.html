<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | Partition Network</title>
    <script>window.ADA_CONFIG = { requiredTag: 'wiki_access' };</script>
    <script src="/uplink.js"></script>
    <script src="/header-engine.js"></script>
    <script src="/chat-widget.js"></script>
    <style>
        :root { --bg: #0d1117; --header: #161b22; --border: #30363d; --text: #c9d1d9; --btn-green: #238636; --blue: #58a6ff; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; }
        #main-content { display: none; max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .wiki-card { background: #161b22; border: 1px solid var(--border); border-radius: 8px; padding: 20px; position: relative; min-height: 350px; display: flex; flex-direction: column; }
        .wiki-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 6px; background: #0d1117; margin-bottom: 15px; border: 1px solid var(--border); }
        .btn { padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; color: white; background: #21262d; border: 1px solid var(--border); text-align: center; display: block; box-sizing: border-box; }
        .btn-green { background: var(--btn-green); border: none; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #161b22; border: 1px solid var(--border); border-radius: 12px; padding: 30px; z-index: 2000; width: 400px; box-shadow: 0 0 100px #000; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1900; }
        input { width: 100%; background: #0d1117; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 6px; margin-bottom: 20px; box-sizing: border-box; outline: none; }
    </style>
</head>
<body>

<div id="ada-header-anchor"></div>

<div id="main-content">
    <div class="header-row">
        <h1>Partition Network</h1>
        <!-- THIS BUTTON CALLS window.openCreate -->
        <button class="btn btn-green" style="width:auto;" onclick="window.openCreate()">+ Create Partition</button>
    </div>
    <div class="grid" id="wiki-grid"></div>
</div>

<div class="overlay" id="modal-overlay" onclick="window.closeModals()"></div>

<div class="modal" id="create-modal">
    <h3 style="margin-top:0">Initialize Partition</h3>
    <input type="text" id="new-title" placeholder="Sector Title...">
    <button class="btn btn-green" id="btn-create-submit" onclick="window.submitCreate()">Initialize</button>
    <button class="btn" style="margin-top:10px;" onclick="window.closeModals()">Cancel</button>
</div>

<script>
    const API = "https://ada-relay.andrewdinglearchive.workers.dev";

    // --- GLOBAL SCOPE FUNCTIONS (Defined FIRST so buttons can see them) ---
    window.submitCreate = async function() {
        const titleInput = document.getElementById('new-title');
        const title = titleInput.value.trim();
        const btn = document.getElementById('btn-create-submit');
        const email = localStorage.getItem('ada_user_email');
    
        if(!title) { alert("Title is required."); return; }
        
        btn.disabled = true;
        btn.innerText = "Syncing...";
    
        try {
            const res = await fetch(`${API}/wiki/create`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, title })
            });
            
            const d = await res.json();
            
            if(d.success) {
                window.closeModals();
                window.loadCards();
                titleInput.value = '';
            } else {
                // This will now tell you exactly what column is missing or what went wrong
                alert("Archive Database Error: " + d.error);
            }
        } catch(e) {
            alert("Network Error: Could not reach Relay Node.");
            console.error(e);
        } finally {
            btn.disabled = false;
            btn.innerText = "Initialize";
        }
    };

    window.closeModals = function() {
        document.getElementById('modal-overlay').style.display = 'none';
        document.getElementById('create-modal').style.display = 'none';
    };

    window.submitCreate = async function() {
        const title = document.getElementById('new-title').value.trim();
        const email = localStorage.getItem('ada_user_email');
        const btn = document.getElementById('btn-create-submit');

        if(!title) { alert("Title is required."); return; }
        
        btn.disabled = true;
        btn.innerText = "Syncing...";

        try {
            const res = await fetch(`${API}/wiki/create`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, title })
            });
            const d = await res.json();
            if(d.success) {
                window.closeModals();
                window.loadCards();
                document.getElementById('new-title').value = '';
            }
        } catch(e) {
            alert("Connection Error. Check Worker.");
        } finally {
            btn.disabled = false;
            btn.innerText = "Initialize";
        }
    };

    window.loadCards = async function() {
        try {
            const res = await fetch(`${API}/wiki/metadata`);
            const cards = await res.json();
            const grid = document.getElementById('wiki-grid');
            grid.innerHTML = cards.map(c => `
                <div class="wiki-card">
                    <img src="${c.image_url || 'https://via.placeholder.com/300x160?text=ADA+Partition'}">
                    <h3>${c.title}</h3>
                    <p style="font-size:12px; color:#8b949e; flex:1;">${c.description || 'Sector initialized.'}</p>
                    <a href="/wiki.html?id=${c.id}" class="btn btn-green">Open Partition</a>
                </div>
            `).join('');
        } catch(e) { console.error("Load Error", e); }
    };

    // --- PAGE INITIALIZATION ---
    async function init() {
        if (typeof runNeuralGuard !== 'function') {
            setTimeout(init, 100);
            return;
        }
        const data = await runNeuralGuard('wiki_access');
        if(!data) return; // runNeuralGuard handles redirects

        document.getElementById('main-content').style.display = 'block';
        window.loadCards();
    }

    init();
</script>
</body>
</html>
