<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | Wiki Selector</title>
    <style>
        :root { --bg: #0d1117; --header: #161b22; --border: #30363d; --text: #c9d1d9; --btn-green: #238636; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; }
        header { background: var(--header); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 600; color: #f0f6fc; text-decoration: none; }
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; justify-content: center; }
        .wiki-card { background: #161b22; border: 1px solid var(--border); border-radius: 6px; padding: 20px; text-align: left; width: 100%; box-sizing: border-box; }
        .wiki-card img { width: 100%; height: 130px; object-fit: cover; border-radius: 4px; margin-bottom: 15px; background: #0d1117; }
        .btn { display: block; width: 100%; padding: 10px; background: var(--btn-green); color: white; border: none; border-radius: 6px; cursor: pointer; text-align: center; text-decoration: none; font-size: 13px; font-weight: 600; }
        .admin-edit-panel { background: #21262d; border: 1px solid #58a6ff; padding: 10px; border-radius: 4px; margin-top: 10px; display: none; }
        .admin-edit-panel input { width: 100%; background: #0d1117; border: 1px solid var(--border); color: white; margin-bottom: 5px; padding: 5px; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <a href="/dash.html" class="logo">ADA Archive Selector</a>
    <div style="display:flex; gap:12px; align-items:center;">
        <button id="admin-edit-btn" style="display:none; background:#21262d; color:white; border:1px solid #30363d; padding:5px 12px; border-radius:6px; cursor:pointer;" onclick="toggleEditMode()">Edit Cards</button>
        <div id="user-pill" style="font-size:12px; border:1px solid var(--border); padding:4px 12px; border-radius:20px;">Checking...</div>
    </div>
</header>

<div class="container" id="main-content" style="display:none;">
    <h1>Wiki Archives</h1>
    <div class="grid" id="wiki-grid"></div>
</div>

<script>
    const API = "https://ada-relay.andrewdinglearchive.workers.dev";
    let editMode = false;

    async function init() {
        // --- SECURITY CHECK ---
        const data = await gatekeeper('wiki_access'); 
        if(!data) return;

        // If passed, show content
        document.getElementById('main-content').style.display = 'block';
        document.getElementById('user-pill').innerText = data.user.display_name || data.user.email;
        if(data.user.is_admin) document.getElementById('admin-edit-btn').style.display = 'block';

        loadCards();
    }

    async function gatekeeper(tag) {
        const email = localStorage.getItem('ada_user_email');
        if (!email) { window.location.href = '/login.html'; return; }
        const res = await fetch(`${API}/sync?email=${encodeURIComponent(email)}`);
        const d = await res.json();
        if (d.blocks.includes('wikiselector.html') || d.blocks.includes('ALL') || (!d.user.is_admin && !d.permissions.includes(tag))) {
            window.location.href = '/blocked.html'; return;
        }
        return d;
    }

    async function loadCards() {
        const res = await fetch(`${API}/wiki/metadata`);
        const cards = await res.json();
        const grid = document.getElementById('wiki-grid');
        grid.innerHTML = cards.map(c => `
            <div class="wiki-card">
                <img src="${c.image_url}">
                <h3>${c.title}</h3>
                <p style="font-size:12px; color:#8b949e">${c.description}</p>
                <a href="/wiki.html?id=${c.id}" class="btn">Open Partition</a>
                <div class="admin-edit-panel" id="p-${c.id}">
                    <input type="text" id="t-${c.id}" value="${c.title}">
                    <input type="text" id="i-${c.id}" value="${c.image_url}">
                    <button class="btn" style="background:#1f6feb" onclick="saveCard('${c.id}')">Save</button>
                </div>
            </div>
        `).join('');
    }

    function toggleEditMode() {
        editMode = !editMode;
        document.querySelectorAll('.admin-edit-panel').forEach(p => p.style.display = editMode ? 'block' : 'none');
    }

    async function saveCard(id) {
        const title = document.getElementById(`t-${id}`).value;
        const image_url = document.getElementById(`i-${id}`).value;
        await fetch(`${API}/wiki/metadata/save`, { method: 'POST', body: JSON.stringify({ id, title, image_url, description: "" }) });
        loadCards();
    }

    init();
</script>
</body>
</html>
