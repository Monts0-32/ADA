<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | Partition Network</title>
    <script src="/uplink.js"></script>
    <style>
        :root { --bg: #0d1117; --header: #161b22; --border: #30363d; --text: #c9d1d9; --btn-green: #238636; --blue: #58a6ff; --red: #f85149; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; }
        #main-content { display: none; max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .wiki-card { background: #161b22; border: 1px solid var(--border); border-radius: 8px; padding: 20px; position: relative; transition: 0.2s; display: flex; flex-direction: column; min-height: 350px; box-sizing: border-box; }
        .wiki-card:hover { border-color: #8b949e; }
        .card-img { width: 100%; height: 160px; object-fit: cover; border-radius: 6px; background: #0d1117; margin-bottom: 15px; border: 1px solid var(--border); }
        .creator-tag { display: inline-flex; align-items: center; gap: 8px; font-size: 10px; color: var(--blue); background: rgba(88, 166, 255, 0.05); padding: 4px 12px; border-radius: 20px; border: 1px solid rgba(88, 166, 255, 0.2); margin-bottom: 12px; width: fit-content; }
        .menu-btn { position: absolute; bottom: 15px; right: 15px; cursor: pointer; color: #8b949e; font-size: 22px; z-index: 10; }
        .dropdown { position: absolute; bottom: 50px; right: 15px; background: #1c2128; border: 1px solid var(--border); border-radius: 6px; display: none; z-index: 100; width: 170px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .dropdown div { padding: 12px 15px; font-size: 13px; cursor: pointer; border-bottom: 1px solid var(--border); }
        .dropdown div:hover { background: #30363d; color: var(--blue); }
        .btn { padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; margin-bottom: 10px; color: white; background: #21262d; border: 1px solid var(--border); text-align: center; text-decoration: none; display: block; box-sizing: border-box; }
        .btn-green { background: var(--btn-green); border: none; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #161b22; border: 1px solid var(--border); border-radius: 12px; padding: 30px; z-index: 2000; width: 450px; box-shadow: 0 0 100px #000; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1900; }
        input, textarea { width: 100%; background: #0d1117; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 6px; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .suggest-box { position: absolute; background: #21262d; border: 1px solid var(--border); width: 100%; top: 48px; z-index: 2010; border-radius: 6px; display: none; }
        .suggest-item { padding: 10px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 12px; }
    </style>
</head>
<body>

<div id="ada-header-anchor"></div>
<script src="/header-engine.js"></script>

<div id="main-content">
    <div class="header-row">
        <h1>Partition Network</h1>
        <button class="btn btn-green" style="width:auto;" onclick="openModal('create-modal')">+ Create Partition</button>
    </div>
    <div class="grid" id="wiki-grid"></div>
</div>

<div class="overlay" id="modal-overlay" onclick="closeModals()"></div>

<div class="modal" id="create-modal">
    <h3>Initialize Partition</h3>
    <input type="text" id="new-title" placeholder="Sector Title...">
    <button class="btn btn-green" id="btn-create-submit" onclick="submitCreate()">Initialize</button>
    <button class="btn" onclick="closeModals()">Cancel</button>
</div>

<div class="modal" id="edit-modal">
    <h3>Edit Card Metadata</h3>
    <input type="text" id="edit-title">
    <textarea id="edit-desc" style="height:80px;"></textarea>
    <label class="btn" style="display:block; text-align:center;">Upload Image<input type="file" id="img-in" hidden onchange="handleImg(this)"></label>
    <input type="hidden" id="edit-img-data">
    <button class="btn btn-green" onclick="saveMetadata()">Save</button>
</div>

<div class="modal" id="settings-modal">
    <h3>Access Control</h3>
    <div style="position:relative;">
        <input type="text" placeholder="Search user to grant access..." oninput="searchUsers(this.value)">
        <div id="suggestions" class="suggest-box"></div>
    </div>
    <div id="access-list-ui" style="margin-bottom:15px; max-height:150px; overflow-y:auto; background:#000; padding:10px; border-radius:6px;"></div>
    <button class="btn" onclick="transferOwnership()" style="color:var(--blue)">Transfer Owner</button>
    <button class="btn" onclick="closeModals()">Close</button>
</div>

<script>
    const API = "https://ada-relay.andrewdinglearchive.workers.dev";
    let activeId = null, currentUser = null;

    async function init() {
        if (typeof runNeuralGuard !== 'function') { setTimeout(init, 100); return; }
        const data = await runNeuralGuard('wiki_access');
        if(!data) return;
        currentUser = data.user;
        document.getElementById('main-content').style.display = 'block';
        loadCards();
    }

    async function loadCards() {
        const mRes = await fetch(`${API}/wiki/metadata`);
        const cards = await mRes.json();
        const grid = document.getElementById('wiki-grid');
        grid.innerHTML = cards.map(c => {
            const isOwner = currentUser.email === c.creator_email || currentUser.is_admin === 1;
            return `
                <div class="wiki-card">
                    <img src="${c.image_url || 'https://via.placeholder.com/300x160?text=Partition'}" class="card-img">
                    <div class="creator-tag">OWNER: ${c.creator_email}</div>
                    <h3 style="margin:0;">${c.title}</h3>
                    <p style="font-size:12px; color:#8b949e; flex:1;">${c.description || 'System data partition.'}</p>
                    <div style="margin-top:auto">
                        <a href="/wiki.html?id=${c.id}" class="btn btn-green">Open Partition</a>
                    </div>
                    ${isOwner ? `<div class="menu-btn" onclick="toggleMenu('${c.id}')">⋮</div>` : ''}
                    <div class="dropdown" id="menu-${c.id}">
                        <div onclick="openEdit('${c.id}','${c.title}','${c.description}','${c.image_url}')">Edit Card</div>
                        <div onclick="openSettings('${c.id}')">Permissions</div>
                        <div style="color:var(--red)" onclick="deleteWiki('${c.id}')">Delete</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    async function submitCreate() {
        const title = document.getElementById('new-title').value;
        const btn = document.getElementById('btn-create-submit');
        if(!title) return alert("Title required.");
        
        btn.innerText = "Syncing...";
        btn.disabled = true;

        await fetch(`${API}/wiki/create`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: currentUser.email, title })
        });

        btn.innerText = "Initialize";
        btn.disabled = false;
        closeModals(); 
        loadCards();
    }

    function toggleMenu(id) {
        event.stopPropagation();
        const m = document.getElementById(`menu-${id}`);
        const open = m.style.display === 'block';
        document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none');
        m.style.display = open ? 'none' : 'block';
    }

    function openModal(id) { document.getElementById('modal-overlay').style.display = 'block'; document.getElementById(id).style.display = 'block'; }
    function closeModals() { document.querySelectorAll('.modal, .overlay, .dropdown').forEach(el => el.style.display = 'none'); }
    function openEdit(id, t, d, img) { activeId = id; document.getElementById('edit-title').value = t; document.getElementById('edit-desc').value = d; document.getElementById('edit-img-data').value = img; openModal('edit-modal'); }
    function openSettings(id) { activeId = id; openModal('settings-modal'); }
    function handleImg(i) { if(i.files[0]){ const r=new FileReader(); r.onload=(e)=>document.getElementById('edit-img-data').value=e.target.result; r.readAsDataURL(i.files[0]); }}
    
    async function saveMetadata() { 
        await fetch(`${API}/wiki/metadata/save`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ id: activeId, title: document.getElementById('edit-title').value, description: document.getElementById('edit-desc').value, image_url: document.getElementById('edit-img-data').value }) }); 
        closeModals(); loadCards(); 
    }

    async function deleteWiki(id) {
        if(confirm("Permanently wipe partition?")) {
            await fetch(`${API}/wiki/delete`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) });
            loadCards();
        }
    }

    init();
</script>
</body>
</html>
