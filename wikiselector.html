<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | Partition Network</title>

    <script>window.ADA_CONFIG = { requiredTag: 'wiki_access' };</script>
    <script src="/config.js"></script>
    <script src="/page-transition.js"></script>
    <script src="/uplink.js"></script>
    <script src="/announcement-engine.js"></script>
    <script src="/header-engine.js"></script>
    <script src="/chat-widget.js"></script>
    <script src="/escape-key.js"></script>

    <style>
        :root {
            --bg: #0d1117;
            --bg-elevated: #010409;
            --panel: #161b22;
            --panel-2: #1c2128;
            --panel-3: #22272e;
            --btn-bg: #21262d;
            --btn-hover: #30363d;
            --border: #30363d;
            --border-soft: #21262d;
            --border-strong: #444c56;
            --text: #e6edf3;
            --text-2: #c9d1d9;
            --muted: #8b949e;
            --muted-2: #6e7681;

            --blue: #58a6ff;
            --blue-dim: #1f6feb;
            --blue-deep: #0d419d;
            --green: #3fb950;
            --green-dim: #238636;
            --red: #f85149;
            --red-dim: #da3633;
            --orange: #d29922;
            --purple: #a371f7;
            --pink: #db61a2;
            --cyan: #39c5cf;

            --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
            --shadow: 0 4px 12px rgba(0,0,0,0.4);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.55);
            --glow-blue: 0 0 0 1px rgba(88,166,255,0.3), 0 0 24px rgba(88,166,255,0.15);
        }

        * { box-sizing: border-box; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Helvetica, Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-image:
                radial-gradient(ellipse 700px 500px at 15% 0%, rgba(88,166,255,0.08), transparent 55%),
                radial-gradient(ellipse 600px 400px at 90% 100%, rgba(163,113,247,0.06), transparent 55%);
            background-attachment: fixed;
        }

        #main-content {
            display: none;
            max-width: 1320px;
            margin: 0 auto;
            padding: 36px 40px 80px;
        }

        /* ============== PAGE HEADER ============== */
        .page-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 24px;
            padding: 0 0 24px;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border-soft);
        }
        .page-header-text { display: flex; flex-direction: column; gap: 6px; }
        .page-title {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.4px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .page-title-glyph {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, var(--blue) 0%, var(--purple) 100%);
            border-radius: 8px;
            display: inline-flex; align-items: center; justify-content: center;
            color: white;
            box-shadow: 0 4px 16px rgba(88,166,255,0.25);
        }
        .page-title-glyph svg { width: 18px; height: 18px; }
        .page-subtitle {
            margin: 0;
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 0.4px;
            text-transform: uppercase;
            font-weight: 500;
        }
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 16px;
            border-radius: 6px;
            border: 1px solid var(--green-dim);
            background: var(--green-dim);
            color: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: 0.12s;
            font-family: inherit;
        }
        .btn-primary:hover {
            background: var(--green);
            border-color: var(--green);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(63,185,80,0.25);
        }
        .btn-primary svg { width: 14px; height: 14px; }

        /* ============== CARD GRID ============== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .wiki-card {
            background: linear-gradient(180deg, var(--panel-2) 0%, var(--panel) 100%);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0;
            position: relative;
            transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .wiki-card:hover {
            border-color: var(--border-strong);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .card-img-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 3 / 2;
            background: var(--bg-elevated);
            border-bottom: 1px solid var(--border-soft);
            overflow: hidden;
        }
        .card-img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .wiki-card:hover .card-img { transform: scale(1.04); }
        .card-img-fallback {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            color: var(--muted-2);
            background: linear-gradient(135deg, var(--panel-2) 0%, var(--bg-elevated) 100%);
        }
        .card-img-fallback svg { width: 36px; height: 36px; opacity: 0.5; }

        .card-body {
            padding: 16px 18px 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }

        .user-pill-mini {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: var(--blue);
            background: rgba(88, 166, 255, 0.08);
            padding: 4px 10px 4px 4px;
            border-radius: 20px;
            border: 1px solid rgba(88, 166, 255, 0.18);
            width: fit-content;
            font-weight: 500;
        }
        .user-pill-mini img {
            width: 18px; height: 18px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--blue);
        }

        .wiki-title {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            line-height: 1.3;
            letter-spacing: -0.2px;
        }
        .wiki-desc {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.5;
            flex-grow: 1;
            margin: 0;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            margin-top: auto;
            padding: 14px 18px;
            border-top: 1px solid var(--border-soft);
            display: flex;
            gap: 8px;
            align-items: center;
            background: rgba(13,17,23,0.4);
        }
        .btn-action {
            flex: 1;
            padding: 9px 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            cursor: pointer;
            background: var(--btn-bg);
            color: var(--text);
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: 0.12s;
            font-family: inherit;
        }
        .btn-action:hover { background: var(--border); border-color: var(--border-strong); }
        .btn-action svg { width: 13px; height: 13px; }
        .btn-go {
            background: var(--green-dim);
            border-color: var(--green-dim);
            color: white;
        }
        .btn-go:hover {
            background: var(--green);
            border-color: var(--green);
        }
        .btn-locked {
            background: var(--btn-bg) !important;
            border: 1px dashed var(--border) !important;
            color: var(--muted) !important;
            cursor: not-allowed !important;
            opacity: 0.85;
        }
        .btn-locked:hover {
            border-color: var(--red) !important;
            border-style: solid !important;
            color: var(--red) !important;
            background: rgba(248,81,73,0.05) !important;
        }

        /* ============== THREE-DOTS MENU ============== */
        .menu-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: white;
            background: rgba(13,17,23,0.65);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            z-index: 10;
            line-height: 1;
            transition: 0.12s;
        }
        .menu-btn:hover { background: rgba(13,17,23,0.85); border-color: var(--border-strong); }
        .menu-btn svg { width: 14px; height: 14px; }
        .dropdown {
            position: absolute;
            top: 46px;
            right: 12px;
            background: var(--panel-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: none;
            z-index: 100;
            width: 180px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            animation: drop-in 0.15s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transform-origin: top right;
        }
        @keyframes drop-in {
            from { opacity: 0; transform: scale(0.95) translateY(-4px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .dropdown div {
            padding: 10px 14px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border-bottom: 1px solid var(--border-soft);
            color: var(--text-2);
            display: flex; align-items: center; gap: 10px;
            transition: 0.1s;
        }
        .dropdown div:hover { background: var(--panel-3); color: var(--blue); }
        .dropdown div:last-child { border-bottom: none; color: var(--red); }
        .dropdown div:last-child:hover { background: rgba(248,81,73,0.08); color: var(--red); }
        .dropdown div svg { width: 13px; height: 13px; opacity: 0.8; }

        /* ============== EMPTY STATE ============== */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 24px;
            color: var(--muted);
            border: 1px dashed var(--border);
            border-radius: 12px;
            background: rgba(22,27,34,0.4);
        }
        .empty-state-icon {
            width: 56px; height: 56px;
            margin: 0 auto 16px;
            color: var(--muted-2);
        }
        .empty-state-title {
            font-size: 14px;
            color: var(--text-2);
            font-weight: 600;
            margin: 0 0 6px;
        }
        .empty-state-sub { font-size: 12px; margin: 0; }

        /* ============== MODALS ============== */
        .modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 28px;
            z-index: 2000;
            width: 460px;
            max-width: calc(100vw - 32px);
            box-shadow: var(--shadow-lg);
            animation: modal-in 0.22s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes modal-in {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.95); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        .modal h3 {
            margin: 0 0 18px;
            font-size: 16px;
            color: var(--text);
            font-weight: 600;
            letter-spacing: -0.2px;
            display: flex; align-items: center; gap: 10px;
        }
        .modal h3::before {
            content: '';
            width: 3px; height: 16px;
            background: linear-gradient(180deg, var(--blue), var(--purple));
            border-radius: 2px;
        }
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1900;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            animation: fade-in 0.18s ease forwards;
        }
        @keyframes fade-in { to { opacity: 1; } }

        input, textarea, select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 14px;
            box-sizing: border-box;
            outline: none;
            font-size: 13px;
            font-family: inherit;
            transition: border-color 0.12s, background 0.12s;
        }
        input:focus, textarea:focus, select:focus {
            border-color: var(--blue);
            background: var(--bg-elevated);
        }
        textarea { resize: none; }
        .btn-modal {
            width: 100%;
            padding: 10px 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--btn-bg);
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 8px;
            transition: 0.12s;
            font-family: inherit;
        }
        .btn-modal:hover { background: var(--border); }
        .btn-modal-primary {
            background: var(--green-dim);
            border-color: var(--green-dim);
            color: white;
        }
        .btn-modal-primary:hover {
            background: var(--green);
            border-color: var(--green);
        }
        .btn-modal-accent {
            color: var(--blue);
            border-color: rgba(88,166,255,0.4);
        }
        .btn-modal-accent:hover {
            background: rgba(88,166,255,0.1);
            border-color: var(--blue);
        }

        .file-input-label {
            display: block;
            text-align: center;
            background: var(--bg);
            border: 1px dashed var(--border);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 14px;
            cursor: pointer;
            font-size: 12px;
            color: var(--muted);
            transition: 0.12s;
        }
        .file-input-label:hover {
            border-color: var(--blue);
            color: var(--blue);
            background: rgba(88,166,255,0.04);
        }

        /* ============== SMART SEARCH ============== */
        .search-wrap { position: relative; width: 100%; margin-bottom: 14px; }
        .search-wrap input { margin-bottom: 0; }
        .suggest-box {
            position: absolute;
            background: var(--panel-2);
            border: 1px solid var(--border);
            width: 100%;
            top: calc(100% + 4px);
            left: 0;
            z-index: 2010;
            border-radius: 6px;
            display: none;
            box-shadow: var(--shadow-lg);
            max-height: 220px;
            overflow-y: auto;
        }
        .suggest-item {
            padding: 10px 12px;
            display: flex; align-items: center; gap: 12px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-soft);
            font-size: 12px;
            color: var(--text-2);
            transition: 0.1s;
        }
        .suggest-item:hover { background: var(--panel-3); color: var(--blue); }
        .suggest-item img {
            width: 24px; height: 24px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* ============== ACCESS LIST ============== */
        .access-list {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 16px;
            max-height: 200px;
            overflow-y: auto;
        }
        .access-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-soft);
        }
        .access-row:last-child { border-bottom: none; }
        .access-user {
            display: flex; align-items: center; gap: 10px;
            font-size: 12px;
            color: var(--text);
        }
        .access-user img {
            width: 22px; height: 22px;
            border-radius: 50%;
            object-fit: cover;
        }
        .perm-select-mini {
            width: auto;
            margin: 0;
            padding: 4px 8px;
            font-size: 10px;
            background: var(--panel);
            color: var(--text-2);
            border: 1px solid var(--border);
            border-radius: 4px;
        }
        .rem-btn {
            color: var(--red);
            cursor: pointer;
            font-weight: bold;
            padding: 0 8px;
            font-size: 16px;
            line-height: 1;
        }
        .rem-btn:hover { color: var(--red-dim); }
        .access-empty {
            text-align: center;
            font-size: 11px;
            color: var(--muted-2);
            padding: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div id="ada-header-anchor"></div>
<div id="main-content">
    <div class="page-header">
        <div class="page-header-text">
            <h1 class="page-title">
                <span class="page-title-glyph">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h7a3 3 0 0 1 3 3v13a2 2 0 0 0-2-2H4z"/><path d="M20 4h-7a3 3 0 0 0-3 3v13a2 2 0 0 1 2-2h8z"/></svg>
                </span>
                Partition Network
            </h1>
            <p class="page-subtitle">Initialize · Manage · Distribute Wiki Partitions</p>
        </div>
        <button class="btn-primary" onclick="window.openModal('create-modal')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Create Partition
        </button>
    </div>
    <div class="grid" id="wiki-grid"></div>
</div>

<div class="overlay" id="modal-overlay" onclick="window.closeModals()"></div>

<div class="modal" id="create-modal">
    <h3>Initialize Partition</h3>
    <input type="text" id="new-title" placeholder="Sector Title...">
    <button class="btn-modal btn-modal-primary" id="btn-create-submit" onclick="window.submitCreate()">Initialize</button>
    <button class="btn-modal" onclick="window.closeModals()">Cancel</button>
</div>

<div class="modal" id="edit-modal">
    <h3>Edit Card Meta</h3>
    <input type="text" id="edit-title" placeholder="Title">
    <textarea id="edit-desc" placeholder="Description" style="height:80px;"></textarea>
    <label class="file-input-label">Upload Image<input type="file" id="img-in" hidden onchange="window.handleImg(this)"></label>
    <input type="hidden" id="edit-img-data">
    <button class="btn-modal btn-modal-primary" onclick="window.saveMetadata()">Save Changes</button>
    <button class="btn-modal" onclick="window.closeModals()">Cancel</button>
</div>

<div class="modal" id="settings-modal">
    <h3>Access Control</h3>
    <div class="search-wrap">
        <input type="text" id="u-search" placeholder="Search user by name..." oninput="window.searchUsers(this.value)">
        <div id="suggestions" class="suggest-box"></div>
    </div>
    <div id="access-list-ui" class="access-list"></div>
    <button class="btn-modal btn-modal-accent" onclick="window.transferOwnership()">Transfer Ownership</button>
    <button class="btn-modal" onclick="window.closeModals()">Close Settings</button>
</div>

<script>
    const API = (window.ADA_CONFIG && window.ADA_CONFIG.API) || "https://ada-relay.andrewdinglearchive.workers.dev";
    const IMG_PLACEHOLDER = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=";
    const DEFAULT_ICON = `data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzhCOTRBRSIgd3aWR0aD0iMjQiIGhlaWdodD0iMjQiPjxwYXRoIGQ9Ik0xMiAxMmMyLjIxIDAgNC0xLjc5IDQtNFM4IDMuMzQgOC03LjM0IDgtNCAxNC4yMSAxMiAxMiAxMnptMCAyYy0yLjY3IDAtOCAxLjM0LTggNHYyaDE2di0yYzAtMi42Ni01LjMzLTgtOC00eiIvPjwvc3ZnPg==`;
    const ICON_BOOK = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h7a3 3 0 0 1 3 3v13a2 2 0 0 0-2-2H4z"/><path d="M20 4h-7a3 3 0 0 0-3 3v13a2 2 0 0 1 2-2h8z"/></svg>`;
    const ICON_DOTS = `<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/></svg>`;
    const ICON_IMG  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg>`;
    const ICON_EDIT = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>`;
    const ICON_KEY  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/></svg>`;
    const ICON_TRASH= `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`;
    const ICON_GO   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>`;
    const ICON_LOCK = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`;
    let activeId = null;
    let currentUserData = null;

    // --- 1. GLOBAL UI CONTROLLERS ---
    window.openModal = (id) => {
        document.getElementById('modal-overlay').style.display = 'block';
        document.getElementById(id).style.display = 'block';
    };

    window.closeModals = () => {
        document.querySelectorAll('.modal, .overlay, .dropdown').forEach(el => el.style.display = 'none');
        const sug = document.getElementById('suggestions');
        if(sug) sug.style.display = 'none';
    };

    window.toggleMenu = (e, id) => {
        e.stopPropagation(); // Prevents clicking the card behind the menu
        const m = document.getElementById(`menu-${id}`);
        const open = m.style.display === 'block';
        document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none');
        if(!open) m.style.display = 'block';
    };

    // --- 2. DATA ACTIONS ---
    window.submitCreate = async function() {
        const title = document.getElementById('new-title').value.trim();
        const btn = document.getElementById('btn-create-submit');
        const email = localStorage.getItem('ada_user_email');
        if(!title) return alert("Title required.");

        btn.disabled = true; btn.innerText = "Syncing...";
        await fetch(`${API}/wiki/create`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, title })
        });
        window.closeModals();
        await window.loadCards();
        btn.disabled = false; btn.innerText = "Initialize";
    };

    window.loadCards = async function() {
        const myEmail = localStorage.getItem('ada_user_email');
        const res = await fetch(`${API}/wiki/metadata?email=${encodeURIComponent(myEmail)}`);
        const cards = await res.json();
        const grid = document.getElementById('wiki-grid');
        const isAdmin = currentUserData?.is_admin === 1;

        if (!cards || cards.length === 0) {
            grid.innerHTML = `
                <div class="empty-state">
                    <svg class="empty-state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h7a3 3 0 0 1 3 3v13a2 2 0 0 0-2-2H4z"/><path d="M20 4h-7a3 3 0 0 0-3 3v13a2 2 0 0 1 2-2h8z"/></svg>
                    <p class="empty-state-title">No partitions yet</p>
                    <p class="empty-state-sub">Initialize a partition to begin archiving.</p>
                </div>`;
            return;
        }

        grid.innerHTML = cards.map(c => {
            // PERMISSION LOGIC
            const isOwner = (myEmail === c.creator_email) || isAdmin;
            const hasPermission = c.my_access !== null; // If they have 'view' or 'edit'
            const canEnter = isOwner || hasPermission;

            return `
                <div class="wiki-card">
                    <div class="card-img-wrap">
                        <img src="${c.image_url || IMG_PLACEHOLDER}" class="card-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                        <div class="card-img-fallback" style="display:${c.image_url ? 'none' : 'flex'};">${ICON_IMG}</div>
                    </div>
                    <div class="card-body">
                        <div class="user-pill-mini">
                            <img src="${c.profile_picture || DEFAULT_ICON}">
                            <span>${c.display_name || c.creator_email}</span>
                        </div>
                        <h3 class="wiki-title">${c.title}</h3>
                        <p class="wiki-desc">${c.description || 'Sector initialized.'}</p>
                    </div>

                    <div class="card-footer">
                        ${canEnter ?
                            `<a href="/wiki.html?id=${c.id}" class="btn-action btn-go">${ICON_GO} Open Partition</a>` :
                            `<button class="btn-action btn-locked">${ICON_LOCK} Access Restricted</button>`
                        }
                    </div>

                    ${isOwner ? `<div class="menu-btn" onclick="window.toggleMenu(event, '${c.id}')" title="More">${ICON_DOTS}</div>` : ''}

                    <div class="dropdown" id="menu-${c.id}">
                        <div onclick="window.openEdit('${c.id}','${c.title.replace(/'/g, "\\'")}','${c.description.replace(/'/g, "\\'")}','${c.image_url}')">${ICON_EDIT} Edit Card</div>
                        <div onclick="window.openSettings('${c.id}')">${ICON_KEY} Permissions</div>
                        <div onclick="window.deleteWiki('${c.id}')">${ICON_TRASH} Delete Sector</div>
                    </div>
                </div>`;
        }).join('');
    };

    window.openEdit = (id, t, d, img) => { activeId = id; document.getElementById('edit-title').value = t; document.getElementById('edit-desc').value = d; document.getElementById('edit-img-data').value = img; window.openModal('edit-modal'); };
    window.handleImg = (i) => { if(i.files[0]){ const r=new FileReader(); r.onload=(e)=>document.getElementById('edit-img-data').value=e.target.result; r.readAsDataURL(i.files[0]); }};

    window.saveMetadata = async () => {
        await fetch(`${API}/wiki/metadata/save`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ id: activeId, title: document.getElementById('edit-title').value, description: document.getElementById('edit-desc').value, image_url: document.getElementById('edit-img-data').value }) });
        window.closeModals(); window.loadCards();
    };

    // --- 3. ACCESS CONTROL ---
    window.openSettings = async (id) => { activeId = id; window.openModal('settings-modal'); window.refreshAccessList(); };

    window.refreshAccessList = async function() {
        const res = await fetch(`${API}/wiki/load?id=${activeId}`);
        const data = await res.json();
        const uRes = await fetch(`${API}/admin/list-users`);
        const allUsers = await uRes.json();
        const listUi = document.getElementById('access-list-ui');
        listUi.innerHTML = data.allowedUsers.map(p => {
            const u = allUsers.find(user => user.email === p.user_email) || { profile_picture: DEFAULT_ICON };
            return `
                <div class="access-row">
                    <div class="access-user"><img src="${u.profile_picture || DEFAULT_ICON}"><span>${p.user_email}</span></div>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <select class="perm-select-mini" onchange="window.updatePermLevel('${p.user_email}', this.value)">
                            <option value="view" ${p.access_level === 'view' ? 'selected' : ''}>View</option>
                            <option value="edit" ${p.access_level === 'edit' ? 'selected' : ''}>Edit</option>
                        </select>
                        <span class="rem-btn" onclick="window.removeAccess('${p.user_email}')">×</span>
                    </div>
                </div>`;
        }).join('') || '<p class="access-empty">Private Partition</p>';
    };

    window.searchUsers = async (q) => {
        const box = document.getElementById('suggestions');
        if(q.length < 2) { box.style.display = 'none'; return; }
        const res = await fetch(`${API}/search/suggest?q=${encodeURIComponent(q)}`);
        const users = await res.json();
        box.innerHTML = users.map(u => `
            <div class="suggest-item" onclick="window.grant('${u.email}')">
                <img src="${u.profile_picture || DEFAULT_ICON}">
                <span>${u.display_name || u.email}</span>
            </div>`).join('');
        box.style.display = 'block';
    };

    window.grant = async (targetEmail) => {
        // Clear search and hide suggestions instantly
        document.getElementById('suggestions').style.display = 'none';
        document.getElementById('u-search').value = '';

        await fetch(`${API}/wiki/access/update`, {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ wikiId: activeId, targetEmail, level: 'view' })
        });
        window.refreshAccessList();
    };

    window.updatePermLevel = async (targetEmail, level) => {
        await fetch(`${API}/wiki/access/update`, {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ wikiId: activeId, targetEmail, level })
        });
    };

    window.removeAccess = async (e) => {
        if(confirm(`Revoke access?`)) {
            await fetch(`${API}/wiki/access/delete`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ wikiId: activeId, userEmail: e }) });
            window.refreshAccessList();
        }
    };

    window.transferOwnership = async () => {
        const e = prompt("Enter new owner email:");
        if(e && confirm(`TRANSFER WARNING: Hand control of this sector to ${e}?`)) {
            await fetch(`${API}/wiki/transfer`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ id: activeId, newOwner: e }) });
            window.closeModals(); window.loadCards();
        }
    };

    window.deleteWiki = async (id) => { if(confirm("Permanently wipe?")) { await fetch(`${API}/wiki/delete`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) }); window.loadCards(); }};

    // --- 4. BOOTSTRAP ---
    async function init() {
        if (typeof runNeuralGuard !== 'function') { setTimeout(init, 100); return; }
        const data = await runNeuralGuard('wiki_access');
        if(!data) return;
        currentUserData = data.user;
        document.getElementById('main-content').style.display = 'block';
        window.loadCards();
    }

    // Modal safety click
    window.onclick = function(e) { if (e.target.id === 'modal-overlay') window.closeModals(); };
    init();
</script>
</body>
</html>
