<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | Special Projects</title>

    <script src="/config.js"></script>
    <script src="/page-transition.js"></script>
    <script src="/uplink.js"></script>
    <script src="/announcement-engine.js"></script>
    <script src="/header-engine.js"></script>
    <script src="/chat-widget.js"></script>
    <script src="/escape-key.js"></script>

    <style>
        :root {
            --bg: #0d1117;
            --bg-elevated: #010409;
            --panel: #161b22;
            --panel-2: #1c2128;
            --panel-3: #22272e;
            --btn-bg: #21262d;
            --btn-hover: #30363d;
            --border: #30363d;
            --border-soft: #21262d;
            --border-strong: #444c56;
            --text: #e6edf3;
            --text-2: #c9d1d9;
            --muted: #8b949e;
            --muted-2: #6e7681;

            --blue: #58a6ff;
            --blue-dim: #1f6feb;
            --green: #3fb950;
            --green-dim: #238636;
            --red: #f85149;
            --red-dim: #da3633;
            --orange: #d29922;
            --purple: #a371f7;
            --cyan: #39c5cf;

            --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
            --shadow: 0 4px 12px rgba(0,0,0,0.4);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.55);
        }

        * { box-sizing: border-box; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Helvetica, Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-image:
                radial-gradient(ellipse 700px 500px at 15% 0%, rgba(163,113,247,0.08), transparent 55%),
                radial-gradient(ellipse 600px 400px at 90% 100%, rgba(57,197,207,0.06), transparent 55%);
            background-attachment: fixed;
        }

        #main-content {
            display: none;
            max-width: 1320px;
            margin: 0 auto;
            padding: 36px 40px 80px;
        }

        /* ============== PAGE HEADER ============== */
        .page-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 24px;
            padding: 0 0 24px;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border-soft);
        }
        .page-header-text { display: flex; flex-direction: column; gap: 6px; }
        .page-title {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.4px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .page-title-glyph {
            width: 32px; height: 32px;
            background: var(--panel-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: inline-flex; align-items: center; justify-content: center;
            color: var(--blue);
            transition: 0.12s;
        }
        .page-title:hover .page-title-glyph {
            border-color: var(--blue);
            color: var(--blue);
            background: rgba(88,166,255,0.08);
        }
        .page-title-glyph svg { width: 18px; height: 18px; }
        .page-subtitle {
            margin: 0;
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 0.4px;
            text-transform: uppercase;
            font-weight: 500;
        }
        .header-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            font-weight: 500;
        }
        .header-meta .meta-link {
            color: var(--cyan);
            text-decoration: none;
            border-bottom: 1px dotted var(--cyan);
            padding-bottom: 1px;
        }
        .header-meta .meta-link:hover { color: var(--blue); border-color: var(--blue); }

        /* ============== CARD GRID ============== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .spec-card {
            background: linear-gradient(180deg, var(--panel-2) 0%, var(--panel) 100%);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0;
            position: relative;
            transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .spec-card:hover {
            border-color: var(--border-strong);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }
        .spec-card.locked {
            opacity: 0.75;
        }
        .spec-card.locked:hover { opacity: 1; }

        .card-img-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 3 / 2;
            background: var(--bg-elevated);
            border-bottom: 1px solid var(--border-soft);
            overflow: hidden;
        }
        .card-img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .spec-card:hover .card-img { transform: scale(1.04); }
        .card-img-fallback {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            color: var(--muted-2);
            background: linear-gradient(135deg, var(--panel-2) 0%, var(--bg-elevated) 100%);
        }
        .card-img-fallback svg { width: 36px; height: 36px; opacity: 0.5; }

        .lock-ribbon {
            position: absolute;
            top: 12px; left: 12px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            color: var(--red);
            background: rgba(248,81,73,0.1);
            border: 1px solid var(--red);
            border-radius: 4px;
            z-index: 5;
        }
        .lock-ribbon svg { width: 11px; height: 11px; }

        .card-body {
            padding: 16px 18px 18px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }
        .spec-title {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            line-height: 1.3;
            letter-spacing: -0.2px;
        }
        .spec-desc {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.5;
            flex-grow: 1;
            margin: 0;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            padding: 14px 18px;
            border-top: 1px solid var(--border-soft);
            background: rgba(13,17,23,0.4);
        }
        .btn-action {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 9px 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--btn-bg);
            color: var(--text);
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            cursor: pointer;
            transition: 0.12s;
            font-family: inherit;
        }
        .btn-action:hover { background: var(--border); border-color: var(--border-strong); }
        .btn-action svg { width: 13px; height: 13px; }
        .btn-go {
            background: var(--green-dim);
            border-color: var(--green-dim);
            color: white;
        }
        .btn-go:hover {
            background: var(--green);
            border-color: var(--green);
        }
        .btn-override {
            background: var(--btn-bg);
            border-color: var(--orange);
            color: var(--orange);
        }
        .btn-override:hover {
            background: rgba(210,153,34,0.1);
            border-color: var(--orange);
        }
        .btn-locked {
            background: var(--btn-bg) !important;
            border: 1px dashed var(--border) !important;
            color: var(--muted) !important;
            cursor: not-allowed !important;
        }
        .btn-locked:hover {
            border-color: var(--red) !important;
            border-style: solid !important;
            color: var(--red) !important;
            background: rgba(248,81,73,0.05) !important;
        }

        /* ============== THREE-DOTS MENU ============== */
        .menu-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: white;
            background: rgba(13,17,23,0.65);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            z-index: 10;
            line-height: 1;
            transition: 0.12s;
        }
        .menu-btn:hover { background: rgba(13,17,23,0.85); border-color: var(--border-strong); }
        .menu-btn svg { width: 14px; height: 14px; }
        .dropdown {
            position: absolute;
            top: 46px;
            right: 12px;
            background: var(--panel-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: none;
            z-index: 100;
            width: 180px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            animation: drop-in 0.15s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transform-origin: top right;
        }
        @keyframes drop-in {
            from { opacity: 0; transform: scale(0.95) translateY(-4px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .dropdown div {
            padding: 10px 14px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border-bottom: 1px solid var(--border-soft);
            color: var(--text-2);
            display: flex; align-items: center; gap: 10px;
            transition: 0.1s;
        }
        .dropdown div:hover { background: var(--panel-3); color: var(--blue); }
        .dropdown div:last-child { border-bottom: none; }
        .dropdown div svg { width: 13px; height: 13px; opacity: 0.8; }

        /* ============== EMPTY STATE ============== */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 24px;
            color: var(--muted);
            border: 1px dashed var(--border);
            border-radius: 12px;
            background: rgba(22,27,34,0.4);
        }
        .empty-state-icon {
            width: 56px; height: 56px;
            margin: 0 auto 16px;
            color: var(--muted-2);
        }
        .empty-state-title {
            font-size: 14px;
            color: var(--text-2);
            font-weight: 600;
            margin: 0 0 6px;
        }
        .empty-state-sub { font-size: 12px; margin: 0; }

        /* ============== MODALS ============== */
        .modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 28px;
            z-index: 5000;
            width: 460px;
            max-width: calc(100vw - 32px);
            box-shadow: var(--shadow-lg);
            animation: modal-in 0.22s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes modal-in {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.95); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        .modal h3 {
            margin: 0 0 18px;
            font-size: 16px;
            color: var(--text);
            font-weight: 600;
            letter-spacing: -0.2px;
            display: flex; align-items: center; gap: 10px;
        }
        .modal h3::before {
            content: '';
            width: 3px; height: 16px;
            background: linear-gradient(180deg, var(--purple), var(--cyan));
            border-radius: 2px;
        }
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 4000;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            animation: fade-in 0.18s ease forwards;
        }
        @keyframes fade-in { to { opacity: 1; } }

        input, textarea, select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 14px;
            box-sizing: border-box;
            outline: none;
            font-size: 13px;
            font-family: inherit;
            transition: border-color 0.12s, background 0.12s;
        }
        input:focus, textarea:focus, select:focus {
            border-color: var(--blue);
            background: var(--bg-elevated);
        }
        textarea { resize: none; }
        .btn-modal {
            width: 100%;
            padding: 10px 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--btn-bg);
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 8px;
            transition: 0.12s;
            font-family: inherit;
        }
        .btn-modal:hover { background: var(--border); }
        .btn-modal-primary {
            background: var(--green-dim);
            border-color: var(--green-dim);
            color: white;
        }
        .btn-modal-primary:hover {
            background: var(--green);
            border-color: var(--green);
        }
        .file-input-label {
            display: block;
            text-align: center;
            background: var(--bg);
            border: 1px dashed var(--border);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 14px;
            cursor: pointer;
            font-size: 12px;
            color: var(--muted);
            transition: 0.12s;
        }
        .file-input-label:hover {
            border-color: var(--blue);
            color: var(--blue);
            background: rgba(88,166,255,0.04);
        }
    </style>

    <!-- ═══════════════════════════════════════════════════════════════
         ADA OS — Retro Windows 95/2000 chrome (Dark Mode)
         Synced from dash.html — overlay for chrome components
         ═══════════════════════════════════════════════════════════════ -->
    <style>
        :root {
            --win-bg:            #1c2128;
            --win-bg-light:      #2a313c;
            --win-bg-dark:       #11151b;
            --win-bg-darker:     #0a0d12;
            --win-title-active:  linear-gradient(90deg, #2f81f7 0%, #1f6feb 100%);
            --win-title-inactive:linear-gradient(90deg, #2a313c 0%, #1c2128 100%);
            --win-text:          #e6edf3;
            --win-text-light:    #ffffff;
            --win-border-light:  #4a525e;
            --win-border-dark:   #080a0e;
            --win-text-blue:     #58a6ff;
        }

        /* THEMED SCROLLBAR (retro) */
        ::-webkit-scrollbar { width: 16px; height: 16px; }
        ::-webkit-scrollbar-track { background: var(--win-bg-dark); }
        ::-webkit-scrollbar-thumb {
            background: var(--win-bg-light);
            border-top: 1px solid var(--win-border-light);
            border-left: 1px solid var(--win-border-light);
            border-right: 1px solid var(--win-border-dark);
            border-bottom: 1px solid var(--win-border-dark);
        }
        ::-webkit-scrollbar-button { background: var(--win-bg-light); display: block; }

        body {
            font-family: "MS Sans Serif", "Microsoft Sans Serif", "Tahoma", "Geneva", sans-serif;
        }

        /* CHISELED BUTTONS (retro) — overlay existing button classes */
        .btn-action, .btn-modal, .btn-primary, .btn-gh {
            background: var(--win-bg);
            color: var(--win-text);
            border-top:    2px solid var(--win-border-light);
            border-left:   2px solid var(--win-border-light);
            border-right:  2px solid var(--win-border-dark);
            border-bottom: 2px solid var(--win-border-dark);
            padding: 4px 14px;
            font-family: inherit;
            font-size: 12px;
            border-radius: 0;
            box-shadow: 1px 1px 0 0 #000;
            transition: none;
            transform: none;
        }
        .btn-action:active, .btn-modal:active, .btn-primary:active, .btn-gh:active {
            border-top:    2px solid var(--win-border-dark);
            border-left:   2px solid var(--win-border-dark);
            border-right:  2px solid var(--win-border-light);
            border-bottom: 2px solid var(--win-border-light);
            padding: 5px 13px 3px 15px;
        }
        .btn-action:hover, .btn-modal:hover, .btn-primary:hover, .btn-gh:hover {
            background: #232a33;
            border-color: var(--win-border-light);
            transform: none;
            box-shadow: 1px 1px 0 0 #000;
        }
        .btn-action:disabled, .btn-modal:disabled, .btn-primary:disabled, .btn-gh:disabled {
            color: var(--win-bg-light);
            text-shadow: 1px 1px 0 #000;
            cursor: not-allowed;
        }

        /* "Primary" / "Go" — flat retro (no green pill) */
        .btn-go, .btn-modal-primary {
            background: var(--win-bg);
            color: var(--win-text);
            border-top:    2px solid var(--win-border-light);
            border-left:   2px solid var(--win-border-light);
            border-right:  2px solid var(--win-border-dark);
            border-bottom: 2px solid var(--win-border-dark);
            font-weight: bold;
        }
        .btn-go:hover, .btn-modal-primary:hover {
            background: #232a33;
            border-color: var(--win-border-light);
        }

        /* Locked state — retro dashed */
        .btn-locked {
            background: var(--win-bg) !important;
            border: 1px dashed var(--win-border-light) !important;
            color: var(--win-text) !important;
            cursor: not-allowed !important;
            opacity: 1;
        }
        .btn-locked:hover {
            border-color: var(--red) !important;
            border-style: solid !important;
            color: var(--red) !important;
            background: var(--win-bg) !important;
        }

        /* Modal accent (blue) — retro */
        .btn-modal-accent {
            background: var(--win-bg);
            color: var(--win-text-blue);
            border-top:    2px solid var(--win-border-light);
            border-left:   2px solid var(--win-border-light);
            border-right:  2px solid var(--win-border-dark);
            border-bottom: 2px solid var(--win-border-dark);
        }
        .btn-modal-accent:hover {
            background: #232a33;
            color: var(--win-text-blue);
            border-color: var(--win-border-light);
        }

        /* Override (orange) — retro */
        .btn-override {
            background: var(--win-bg);
            color: var(--win-text);
            border-top:    2px solid var(--win-border-light);
            border-left:   2px solid var(--win-border-light);
            border-right:  2px solid var(--win-border-dark);
            border-bottom: 2px solid var(--win-border-dark);
        }
        .btn-override:hover {
            background: #232a33;
            color: var(--win-text);
            border-color: var(--win-border-light);
        }

        /* SUNKEN FIELDS (retro) */
        input, textarea, select, .field {
            background: #0d1117;
            color: var(--win-text);
            border-top:    1px solid var(--win-border-dark);
            border-left:   1px solid var(--win-border-dark);
            border-right:  1px solid var(--win-border-light);
            border-bottom: 1px solid var(--win-border-light);
            padding: 3px 5px;
            font-family: inherit;
            font-size: 12px;
            outline: none;
            border-radius: 0;
            margin: 0;
            transition: none;
        }
        input:focus, textarea:focus, select:focus, .field:focus {
            background: #161b22;
            border-right-color: var(--win-text-blue);
            border-bottom-color: var(--win-text-blue);
        }
        textarea { resize: vertical; min-height: 80px; font-family: "MS Sans Serif", monospace; }

        /* The page-specific `input, textarea, select` rules above set width:100% —
           keep that for full-width inputs by re-applying it here so the retro look
           is layered on top instead of replacing the layout. */
        #edit-title, #edit-desc, #edit-img-data {
            width: 100%;
            box-sizing: border-box;
        }

        /* WINDOW CHROME (retro) — available for use */
        .window {
            background: var(--win-bg);
            border-top:    2px solid var(--win-border-light);
            border-left:   2px solid var(--win-border-light);
            border-right:  2px solid var(--win-border-dark);
            border-bottom: 2px solid var(--win-border-dark);
            box-shadow: 1px 1px 0 0 #000, 0 0 0 1px #000;
            display: flex; flex-direction: column;
        }
        .titlebar {
            background: var(--win-title-inactive);
            color: var(--win-text-light);
            padding: 3px 4px 3px 6px;
            display: flex; justify-content: space-between; align-items: center;
            font-weight: bold; font-size: 12px;
            user-select: none;
            flex-shrink: 0;
        }
        .window.active .titlebar { background: var(--win-title-active); }
        .titlebar-text { display: flex; align-items: center; gap: 5px; }
        .titlebar-text .tb-icon { font-size: 13px; }
        .titlebar-buttons { display: flex; gap: 2px; }
        .titlebar-btn {
            width: 18px; height: 16px;
            background: var(--win-bg);
            border-top:    1px solid var(--win-border-light);
            border-left:   1px solid var(--win-border-light);
            border-right:  1px solid var(--win-border-dark);
            border-bottom: 1px solid var(--win-border-dark);
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; line-height: 1; cursor: pointer;
            color: var(--win-text); padding: 0;
        }
        .titlebar-btn:active {
            border-top:    1px solid var(--win-border-dark);
            border-left:   1px solid var(--win-border-dark);
            border-right:  1px solid var(--win-border-light);
            border-bottom: 1px solid var(--win-border-light);
        }
        .menubar {
            display: flex; gap: 0;
            background: var(--win-bg);
            border-bottom: 1px solid var(--win-border-dark);
            padding: 1px 2px;
            flex-shrink: 0;
        }
        .menubar span {
            padding: 2px 8px; cursor: pointer; font-size: 12px; color: var(--win-text);
        }
        .menubar span:hover { background: var(--win-text-blue); color: var(--win-bg-darker); }
        .window-body {
            flex: 1;
            padding: 10px;
            overflow: auto;
            background: var(--win-bg);
            color: var(--win-text);
            border-top:    1px solid var(--win-border-dark);
            border-left:   1px solid var(--win-border-dark);
            border-right:  1px solid var(--win-border-light);
            border-bottom: 1px solid var(--win-border-light);
            margin: 2px;
        }
        .window-body.flush { padding: 0; }
        .statusbar {
            padding: 3px 6px; font-size: 11px; color: var(--win-text);
            background: var(--win-bg);
            border-top: 1px solid var(--win-border-dark);
            display: flex; justify-content: space-between; gap: 4px;
            flex-shrink: 0;
        }
        .statusbar-cell {
            border-top:    1px solid var(--win-border-dark);
            border-left:   1px solid var(--win-border-dark);
            border-right:  1px solid var(--win-border-light);
            border-bottom: 1px solid var(--win-border-light);
            padding: 1px 6px; flex: 1;
            color: var(--win-text);
        }

        /* HIDDEN / MISC */
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="ada-header-anchor"></div>

<div id="main-content">
    <div class="page-header">
        <div class="page-header-text">
            <h1 class="page-title">
                <span class="page-title-glyph">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 1 1 8 0v4"/></svg>
                </span>
                Special Projects
            </h1>
            <p class="page-subtitle">Neural Simulation Units · Encrypted Modules</p>
        </div>
        <div class="header-meta">
            <span>For game-site games use the proxy</span>
            <a href="ADAP.html" class="meta-link">go here</a>
        </div>
    </div>
    <div class="grid" id="card-grid"></div>
</div>

<div class="overlay" id="modal-overlay" onclick="window.closeModals()"></div>

<!-- EDIT MODAL -->
<div class="modal" id="edit-modal">
    <h3>Edit Module Meta</h3>
    <input type="text" id="edit-title" placeholder="Title">
    <textarea id="edit-desc" placeholder="Description" style="height:80px;"></textarea>
    <label class="file-input-label">Change Image<input type="file" id="img-in" hidden onchange="window.handleImg(this)"></label>
    <input type="hidden" id="edit-img-data">
    <button class="btn-modal btn-modal-primary" onclick="window.saveMetadata()">Save Changes</button>
    <button class="btn-modal" onclick="window.closeModals()">Cancel</button>
</div>

<script>
    const API = (window.ADA_CONFIG && window.ADA_CONFIG.API) || "/api";
    // Internal Placeholder (Grey Box) so network blockers can't stop it loading
    const LOCAL_PLACEHOLDER = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=";

    const ICON_DOTS = `<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/></svg>`;
    const ICON_IMG  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg>`;
    const ICON_EDIT = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>`;
    const ICON_LOCK = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`;
    const ICON_GO   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>`;

    let activeId = null;
    let isAdminUser = false;

    // --- GLOBAL FUNCTIONS ATTACHED TO WINDOW ---
    window.closeModals = function() {
        document.querySelectorAll('.modal, .overlay, .dropdown').forEach(el => el.style.display = 'none');
    };

    window.toggleMenu = function(e, id) {
        e.stopPropagation();
        const m = document.getElementById(`menu-${id}`);
        const isOpen = m.style.display === 'block';
        document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none');
        if(!isOpen) m.style.display = 'block';
    };

    window.openEdit = function(id, t, d, img) {
        activeId = id;
        const modal = document.getElementById('edit-modal');
        const overlay = document.getElementById('modal-overlay');

        document.getElementById('edit-title').value = t;
        document.getElementById('edit-desc').value = d;
        document.getElementById('edit-img-data').value = img;

        overlay.style.display = 'block';
        modal.style.display = 'block';
    };

    window.handleImg = function(i) {
        if(i.files[0]){
            const r=new FileReader();
            r.onload=(e)=>document.getElementById('edit-img-data').value=e.target.result;
            r.readAsDataURL(i.files[0]);
        }
    };

    window.saveMetadata = async function() {
        await fetch(`${API}/special/metadata/save`, {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ id: activeId, title: document.getElementById('edit-title').value, description: document.getElementById('edit-desc').value, image_url: document.getElementById('edit-img-data').value })
        });
        window.closeModals();
        window.loadCards();
    };

    window.toggleLock = async function(id) {
        const myEmail = localStorage.getItem('ada_user_email');
        const res = await fetch(`${API}/special/lock`, {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ id, adminEmail: myEmail })
        });
        const result = await res.json();
        if(result.success) window.loadCards();
        else alert("Error: " + result.error);
    };

    window.loadCards = async function() {
        const res = await fetch(`${API}/special/metadata`);
        const cards = await res.json();
        const grid = document.getElementById('card-grid');

        if (!cards || cards.length === 0) {
            grid.innerHTML = `
                <div class="empty-state">
                    <svg class="empty-state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 1 1 8 0v4"/></svg>
                    <p class="empty-state-title">No modules online</p>
                    <p class="empty-state-sub">Special projects will appear here once deployed.</p>
                </div>`;
            return;
        }

        grid.innerHTML = cards.map(c => {
            const isLocked = c.is_locked === 1;
            const canEnter = !isLocked || isAdminUser;

            return `
                <div class="spec-card ${isLocked ? 'locked' : ''}">
                    <div class="card-img-wrap">
                        <img src="${c.image_url || LOCAL_PLACEHOLDER}" class="card-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                        <div class="card-img-fallback" style="display:${c.image_url ? 'none' : 'flex'};">${ICON_IMG}</div>
                        ${isLocked ? `<div class="lock-ribbon">${ICON_LOCK} Locked</div>` : ''}
                    </div>
                    <div class="card-body">
                        <h3 class="spec-title">${c.title}</h3>
                        <p class="spec-desc">${c.description || 'Sector online.'}</p>
                    </div>

                    <div class="card-footer">
                        ${canEnter ?
                            (isLocked
                                ? `<a href="/${c.id}.html" class="btn-action btn-override">${ICON_LOCK} Admin Override</a>`
                                : `<a href="/${c.id}.html" class="btn-action btn-go">${ICON_GO} Launch Module</a>`)
                            : `<button class="btn-action btn-locked">${ICON_LOCK} Access Restricted</button>`
                        }
                    </div>

                    ${isAdminUser ? `<div class="menu-btn" onclick="window.toggleMenu(event, '${c.id}')" title="More">${ICON_DOTS}</div>` : ''}

                    <div class="dropdown" id="menu-${c.id}">
                        <div onclick="window.openEdit('${c.id}','${c.title.replace(/'/g, "\\'")}','${c.description.replace(/'/g, "\\'")}','${c.image_url}')">${ICON_EDIT} Edit Card</div>
                        <div onclick="window.toggleLock('${c.id}')" style="color:${isLocked ? 'var(--green)' : 'var(--red)'}">
                            ${ICON_LOCK} ${isLocked ? 'Unlock Module' : 'Lock Module'}
                        </div>
                    </div>
                </div>`;
        }).join('');
    };

    async function init() {
        if (typeof runNeuralGuard !== 'function') { setTimeout(init, 100); return; }
        const data = await runNeuralGuard('');
        if(!data) return;

        isAdminUser = data.user.is_admin === 1;
        document.getElementById('main-content').style.display = 'block';
        window.loadCards();
    }

    window.onclick = function(e) { if (!e.target.matches('.menu-btn') && !e.target.closest('.menu-btn')) window.closeModals(); };
    init();
</script>
</body>
</html>
