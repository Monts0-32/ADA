<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | Special Projects</title>
    
    <!-- MASTER BOOTSTRAP -->
    <script>window.ADA_CONFIG = { requiredTag: 'special_access' };</script>
    <script src="/uplink.js"></script>
    <script src="/header-engine.js"></script>
    <script src="/chat-widget.js"></script>

    <style>
        :root { --bg: #0d1117; --header: #161b22; --border: #30363d; --text: #c9d1d9; --btn-green: #238636; --blue: #58a6ff; --red: #f85149; }
        
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 5px; }

        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; }
        #main-content { display: none; max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        
        /* GRID & CARD ALIGNMENT */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .spec-card { background: #161b22; border: 1px solid var(--border); border-radius: 8px; padding: 20px; position: relative; transition: 0.2s; display: flex; flex-direction: column; min-height: 380px; box-sizing: border-box; }
        .spec-card:hover { border-color: #8b949e; }
        
        .card-img { width: 100%; height: 160px; object-fit: cover; border-radius: 6px; background: #0d1117; margin-bottom: 15px; border: 1px solid var(--border); }
        
        .lock-status { font-size: 10px; font-weight: bold; color: var(--red); margin-bottom: 10px; display: none; }

        .spec-title { margin: 0 0 8px 0; font-size: 18px; color: #f0f6fc; }
        .spec-desc { font-size: 13px; color: #8b949e; flex-grow: 1; line-height: 1.4; margin-bottom: 20px; }

        /* BUTTON FOOTER ALIGNMENT */
        .card-footer { margin-top: auto; width: 100%; padding-right: 40px; box-sizing: border-box; }
        .btn { padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; color: white; background: #21262d; border: 1px solid var(--border); text-align: center; text-decoration: none; display: block; box-sizing: border-box; font-size: 13px; }
        .btn-green { background: var(--btn-green); border: none; }
        .btn-green:hover { background: #2ea043; }
        .btn-locked { background: #21262d; color: #8b949e; opacity: 0.6; cursor: not-allowed; }

        /* THREE DOTS (Bottom Right) */
        .menu-btn { position: absolute; bottom: 12px; right: 12px; cursor: pointer; color: #8b949e; font-size: 24px; padding: 5px; z-index: 10; line-height: 1; }
        .menu-btn:hover { color: white; }
        
        .dropdown { position: absolute; bottom: 50px; right: 12px; background: #1c2128; border: 1px solid var(--border); border-radius: 6px; display: none; z-index: 100; width: 170px; box-shadow: 0 8px 24px #000; overflow: hidden; }
        .dropdown div { padding: 12px 15px; font-size: 13px; cursor: pointer; border-bottom: 1px solid var(--border); color: #c9d1d9; }
        .dropdown div:hover { background: #30363d; color: var(--blue); }

        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #161b22; border: 1px solid var(--border); border-radius: 12px; padding: 30px; z-index: 2000; width: 450px; box-shadow: 0 0 100px #000; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1900; }
        input, textarea { width: 100%; background: #0d1117; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 6px; margin-bottom: 15px; box-sizing: border-box; outline: none; }
    </style>
</head>
<body>

<div id="ada-header-anchor"></div>

<div id="main-content">
    <div class="header-row">
        <h1>Special Projects</h1>
        <div style="font-size: 12px; color: #8b949e;">Neural Simulation Modules</div>
    </div>
    <div class="grid" id="card-grid"></div>
</div>

<div class="overlay" id="modal-overlay" onclick="window.closeModals()"></div>

<!-- EDIT MODAL -->
<div class="modal" id="edit-modal">
    <h3 style="margin-top:0">Edit Card Metadata</h3>
    <input type="text" id="edit-title" placeholder="Title">
    <textarea id="edit-desc" placeholder="Description" style="height:80px; resize:none;"></textarea>
    <label class="btn" style="display:block; text-align:center; background:#0d1117;">Upload Image<input type="file" id="img-in" hidden onchange="window.handleImg(this)"></label>
    <input type="hidden" id="edit-img-data">
    <button class="btn btn-green" onclick="window.saveMetadata()">Save Changes</button>
    <button class="btn" onclick="window.closeModals()">Cancel</button>
</div>

<script>
    const API = "https://ada-relay.andrewdinglearchive.workers.dev";
    const IMG_PLACEHOLDER = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=";
    
    let activeId = null;
    let isAdmin = false;

    // --- 1. CORE UI CONTROLLERS ---
    window.openModal = (id) => {
        document.getElementById('modal-overlay').style.display = 'block';
        document.getElementById(id).style.display = 'block';
    };

    window.closeModals = () => {
        document.querySelectorAll('.modal, .overlay, .dropdown').forEach(el => el.style.display = 'none');
    };

    window.toggleMenu = (e, id) => {
        e.stopPropagation();
        const m = document.getElementById(`menu-${id}`);
        const open = m.style.display === 'block';
        document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none');
        if(!open) m.style.display = 'block';
    };

    // --- 2. DATA LOADERS ---
    window.loadCards = async function() {
        const res = await fetch(`${API}/special/metadata`);
        const cards = await res.json();
        const grid = document.getElementById('card-grid');
        
        grid.innerHTML = cards.map(c => {
            const isLocked = c.is_locked === 1;
            const canEnter = !isLocked || isAdmin;

            return `
                <div class="spec-card">
                    <img src="${c.image_url || IMG_PLACEHOLDER}" class="card-img" onerror="this.src='${IMG_PLACEHOLDER}'">
                    <h3 class="spec-title">${c.title}</h3>
                    <p class="spec-desc">${c.description || 'Sector online.'}</p>
                    
                    <div class="card-footer">
                        ${canEnter ? 
                            `<a href="/${c.id}.html" class="btn btn-green">${isLocked ? '🔒 Admin Override' : 'Launch Module'}</a>` : 
                            `<button class="btn btn-locked" onclick="alert('Module Locked by System Administrator.')">🔒 Access Restricted</button>`
                        }
                    </div>

                    ${isAdmin ? `<div class="menu-btn" onclick="window.toggleMenu(event, '${c.id}')">⋮</div>` : ''}
                    
                    <div class="dropdown" id="menu-${c.id}">
                        <div onclick="window.openEdit('${c.id}','${c.title.replace(/'/g, "\\'")}','${c.description.replace(/'/g, "\\'")}','${c.image_url}')">Edit Card</div>
                        <div onclick="window.toggleLock('${c.id}')" style="color:${isLocked ? 'var(--btn-green)' : 'var(--red)'}">
                            ${isLocked ? 'Unlock Module' : 'Lock Module'}
                        </div>
                    </div>
                </div>`;
        }).join('');
    };

    // --- 3. ADMIN ACTIONS ---
    window.openEdit = (id, t, d, img) => { 
        activeId = id; 
        document.getElementById('edit-title').value = t; 
        document.getElementById('edit-desc').value = d; 
        document.getElementById('edit-img-data').value = img; 
        window.openModal('edit-modal'); 
    };

    window.handleImg = (i) => { if(i.files[0]){ const r=new FileReader(); r.onload=(e)=>document.getElementById('edit-img-data').value=e.target.result; r.readAsDataURL(i.files[0]); }};

    window.saveMetadata = async () => { 
        await fetch(`${API}/special/metadata/save`, { 
            method: 'POST', 
            headers: {'Content-Type':'application/json'}, 
            body: JSON.stringify({ id: activeId, title: document.getElementById('edit-title').value, description: document.getElementById('edit-desc').value, image_url: document.getElementById('edit-img-data').value }) 
        }); 
        window.closeModals(); 
        window.loadCards(); 
    };

    window.toggleLock = async (id) => {
        const myEmail = localStorage.getItem('ada_user_email');
        await fetch(`${API}/special/lock`, {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ id, adminEmail: myEmail })
        });
        window.loadCards();
    };

    // --- 4. BOOTSTRAP ---
    async function init() {
        if (typeof runNeuralGuard !== 'function') { setTimeout(init, 100); return; }
        const data = await runNeuralGuard('special_access');
        if(!data) return;
        isAdmin = data.user.is_admin === 1;
        document.getElementById('main-content').style.display = 'block';
        window.loadCards();
    }

    window.onclick = function(e) { if (!e.target.matches('.menu-btn')) window.closeModals(); };
    init();
</script>
</body>
</html>
