<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | Special Content</title>
    <style>
        :root { --bg: #0d1117; --header: #161b22; --border: #30363d; --text: #c9d1d9; --btn-green: #238636; --blue: #58a6ff; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; }
        header { background: var(--header); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:100; }
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; justify-content: center; }
        .card { background: #161b22; border: 1px solid var(--border); border-radius: 8px; padding: 20px; text-align: left; position: relative; }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 4px; margin-bottom: 15px; }
        .btn { display: block; width: 100%; padding: 10px; background: var(--btn-green); color: white; border: none; border-radius: 6px; cursor: pointer; text-align: center; text-decoration: none; font-size: 13px; font-weight: 600; }
        .admin-edit { display: none; background: #21262d; border: 1px solid var(--blue); padding: 10px; border-radius: 6px; margin-top: 10px; }
        .admin-edit input { width: 100%; background: #0d1117; border: 1px solid var(--border); color: white; margin-bottom: 5px; padding: 5px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>
<!-- LOADING OVERLAY -->
<div id="neural-guard" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#0d1117; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; transition: opacity 0.5s;">
    <div style="width:40px; height:40px; border:3px solid #30363d; border-top-color:#58a6ff; border-radius:50%; animation: spin 1s linear infinite;"></div>
    <p style="color:#8b949e; font-family:monospace; font-size:12px; margin-top:20px; letter-spacing:2px;">SYNCHRONIZING ARCHIVE...</p>
</div>

<style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-out { opacity: 0; pointer-events: none; }
</style>

<script>
async function initGuard(requiredTag = null) {
    const API = "https://ada-relay.andrewdinglearchive.workers.dev";
    const email = localStorage.getItem('ada_user_email');
    const path = window.location.pathname.split("/").pop() || "index.html";

    if (!email) { window.location.href = '/login.html'; return; }

    try {
        const res = await fetch(`${API}/sync?email=${encodeURIComponent(email)}`);
        const data = await res.json();

        // 1. Check if Profile is Disabled
        if (data.user.profile_disabled && !data.user.is_admin) {
            document.body.innerHTML = `<div style="color:white; text-align:center; padding:100px;"><h1>Identity Disabled</h1><p>Contact Admin.</p></div>`;
            return;
        }

        // 2. Check for Specific Path Block
        if (data.blocks.includes(path) || data.blocks.includes('ALL')) {
            window.location.href = '/blocked.html';
            return;
        }

        // 3. Check Permissions
        if (requiredTag && !data.user.is_admin && !data.permissions.includes(requiredTag)) {
            window.location.href = '/blocked.html';
            return;
        }

        // Success: Remove Loader
        const guard = document.getElementById('neural-guard');
        guard.classList.add('fade-out');
        return data; // Return data so the page can use it immediately

    } catch (e) {
        console.error("Guard Sync Error", e);
        document.body.innerHTML = `<div style="color:red; text-align:center; padding:100px;"><h1>Sync Failure</h1><p>Worker Offline.</p></div>`;
    }
}
</script>
<header>
    <a href="/dash.html" style="color:var(--blue); text-decoration:none; font-weight:600;">← Archive Dashboard</a>
    <div style="display:flex; gap:10px;">
        <button id="edit-toggle" style="display:none; background:#21262d; color:white; border:1px solid #30363d; padding:5px 12px; border-radius:6px; cursor:pointer;" onclick="toggleEdit()">Edit Cards</button>
        <div id="user-pill"></div>
    </div>
</header>

<div class="container">
    <h1>Specialized Archive Partitions</h1>
    <div class="grid" id="card-grid"></div>
</div>

<script>
    const API = "https://ada-relay.andrewdinglearchive.workers.dev";
    const email = localStorage.getItem('ada_user_email');
    let isEditMode = false;

    async function init() {
        if(!email) location.href='/login.html';
        const res = await fetch(`${API}/sync?email=${encodeURIComponent(email)}`);
        const d = await res.json();
        
        document.getElementById('user-pill').innerText = d.user.display_name || d.user.email;
        if(d.user.is_admin) document.getElementById('edit-toggle').style.display='block';
        
        loadCards();
    }

    async function loadCards() {
        const res = await fetch(`${API}/special/metadata`);
        const cards = await res.json();
        document.getElementById('card-grid').innerHTML = cards.map(c => `
            <div class="card">
                <img src="${c.image_url}">
                <h3 style="margin:0; color:var(--blue)">${c.title}</h3>
                <p style="font-size:13px; color:#8b949e;">${c.description}</p>
                <a href="/${c.id}.html" class="btn">Launch Content</a>
                
                <div class="admin-edit" id="edit-${c.id}">
                    <input id="t-${c.id}" value="${c.title}">
                    <input id="d-${c.id}" value="${c.description}">
                    <input id="i-${c.id}" value="${c.image_url}">
                    <button class="btn" style="background:var(--blue)" onclick="saveCard('${c.id}')">Save Card</button>
                </div>
            </div>
        `).join('');
    }

    function toggleEdit() {
        isEditMode = !isEditMode;
        document.querySelectorAll('.admin-edit').forEach(el => el.style.display = isEditMode ? 'block' : 'none');
    }

    async function saveCard(id) {
        const title = document.getElementById(`t-${id}`).value;
        const description = document.getElementById(`d-${id}`).value;
        const image_url = document.getElementById(`i-${id}`).value;
        await fetch(`${API}/special/metadata/save`, { method: 'POST', body: JSON.stringify({ id, title, description, image_url }) });
        loadCards();
    }

    init();
</script>
</body>
</html>
