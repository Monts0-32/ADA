<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | Profile</title>
    <style>
        :root { --bg: #0d1117; --header: #161b22; --border: #30363d; --text: #c9d1d9; --btn-green: #238636; --blue: #58a6ff; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; transition: 0.3s; }
        header { background: var(--header); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        
        .container { max-width: 1000px; margin: 40px auto; display: grid; grid-template-columns: 280px 1fr; gap: 30px; padding: 0 20px; }
        
        /* Sidebar Styling */
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .avatar-lg { width: 280px; height: 280px; border-radius: 6px; border: 1px solid var(--border); object-fit: cover; background: #0d1117; }
        .search-box { background: #161b22; border: 1px solid var(--border); padding: 15px; border-radius: 6px; }
        .search-box input { width: 100%; padding: 8px; background: #0d1117; border: 1px solid var(--border); color: white; border-radius: 4px; box-sizing: border-box; }
        
        /* Badge Corner */
        .badge-corner { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .badge { padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; border: 1px solid rgba(255,255,255,0.2); }
        .badge-admin { background: #d29922; color: black; }

        /* Main Content Area */
        .main-profile { background: rgba(22, 27, 34, 0.5); border: 1px solid var(--border); border-radius: 6px; padding: 30px; position: relative; }
        #bio-display { line-height: 1.6; min-height: 100px; }
        
        /* Editor Tools */
        .editor-tools { margin-top: 20px; border-top: 1px solid var(--border); padding-top: 20px; display: none; }
        .tool-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; align-items: center; }
        .tool-row input, .tool-row button { background: #21262d; border: 1px solid var(--border); color: white; padding: 5px 10px; border-radius: 4px; }
        
        #bio-editor { width: 100%; min-height: 200px; background: #0d1117; border: 1px solid var(--border); padding: 15px; border-radius: 6px; outline: none; margin-bottom: 10px; }
        #bio-source { width: 100%; min-height: 200px; background: #0d1117; color: var(--blue); font-family: monospace; display: none; }
        
        .btn-save { background: var(--btn-green); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body id="profile-body">

<header>
    <a href="/dash.html" style="color:var(--blue); text-decoration:none;">← Archive Dashboard</a>
    <div id="mode-label" style="font-weight:bold; font-size:14px;">Public Record</div>
</header>

<div class="container">
    <div class="sidebar">
        <img id="view-pic" class="avatar-lg" src="">
        <h2 id="view-name" style="margin: 10px 0 0 0;"></h2>
        <div id="view-email" style="color:#8b949e; font-size:14px; margin-bottom:10px;"></div>
        
        <div class="badge-corner" id="badge-list"></div>

        <div class="search-box">
            <div style="font-size:12px; margin-bottom:8px; font-weight:bold; color:#8b949e;">LOCATE IDENTITY</div>
            <input type="text" id="search-email" placeholder="Search email...">
            <button onclick="searchUser()" style="width:100%; margin-top:8px; cursor:pointer;">Search Database</button>
        </div>
        
        <button id="edit-btn" onclick="toggleEdit()" style="display:none; cursor:pointer;">Edit My Profile</button>
    </div>

    <div class="main-profile">
        <div id="bio-display"></div>

        <div id="editor" class="editor-tools">
            <h3>Identity Editor</h3>
            
            <div class="tool-row">
                <label>Display Name:</label>
                <input type="text" id="in-name">
                <label>Avatar URL:</label>
                <input type="text" id="in-pic">
                <button onclick="triggerUpload()">Upload Image</button>
                <input type="file" id="file-in" hidden onchange="handleFile(this)">
            </div>

            <div class="tool-row">
                <label>Background Color/Gradient:</label>
                <input type="text" id="in-bg" placeholder="#0d1117 or linear-gradient(...)">
                <label>Text Color:</label>
                <input type="color" id="in-color">
            </div>

            <div class="tool-row">
                <button onclick="exec('bold')">B</button>
                <button onclick="exec('italic')">I</button>
                <button onclick="toggleBioSource()">HTML Source</button>
            </div>

            <div id="bio-editor" contenteditable="true"></div>
            <textarea id="bio-source"></textarea>

            <button class="btn-save" onclick="saveProfile()">Synchronize Profile Record</button>
        </div>
    </div>
</div>

<script>
    const API = "https://ada-relay.andrewdinglearchive.workers.dev";
    const myEmail = localStorage.getItem('ada_user_email');
    const params = new URLSearchParams(window.location.search);
    const targetEmail = params.get('email') || myEmail;

    let isEditing = false;

    async function loadProfile() {
        const res = await fetch(`${API}/profile/get?email=${encodeURIComponent(targetEmail)}`);
        const data = await res.json();
        const user = data.user;

        // Apply Custom Styling
        document.getElementById('profile-body').style.background = user.bg_style || '#0d1117';
        document.getElementById('profile-body').style.color = user.text_color || '#c9d1d9';

        // Set View
        document.getElementById('view-pic').src = user.profile_picture;
        document.getElementById('view-name').innerText = user.display_name || user.email;
        document.getElementById('view-email').innerText = user.email;
        document.getElementById('bio-display').innerHTML = user.bio_html || '<p style="opacity:0.5">No biographical data found for this entity.</p>';

        // Badges
        const badges = document.getElementById('badge-list');
        badges.innerHTML = '';
        if(user.is_admin) badges.innerHTML += `<div class="badge badge-admin">ADMIN</div>`;
        data.badges.forEach(b => {
            badges.innerHTML += `<div class="badge" style="background:${b.badge_color}">${b.badge_name}</div>`;
        });

        // Toggle Editor permission
        if(targetEmail === myEmail) {
            document.getElementById('edit-btn').style.display = 'block';
            document.getElementById('mode-label').innerText = "My Profile Control";
            
            // Prefill editor
            document.getElementById('in-name').value = user.display_name || "";
            document.getElementById('in-pic').value = user.profile_picture || "";
            document.getElementById('in-bg').value = user.bg_style || "";
            document.getElementById('in-color').value = user.text_color || "#c9d1d9";
            document.getElementById('bio-editor').innerHTML = user.bio_html || "";
        }
    }

    function toggleEdit() {
        isEditing = !isEditing;
        document.getElementById('editor').style.display = isEditing ? 'block' : 'none';
        document.getElementById('bio-display').style.display = isEditing ? 'none' : 'block';
    }

    function triggerUpload() { document.getElementById('file-in').click(); }
    
    function handleFile(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('in-pic').value = e.target.result;
                document.getElementById('view-pic').src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function searchUser() {
        const email = document.getElementById('search-email').value;
        if(email) window.location.href = `/profile.html?email=${encodeURIComponent(email)}`;
    }

    async function saveProfile() {
        const isS = document.getElementById('bio-source').style.display === 'block';
        const payload = {
            email: myEmail,
            name: document.getElementById('in-name').value,
            pic: document.getElementById('in-pic').value,
            bg: document.getElementById('in-bg').value,
            color: document.getElementById('in-color').value,
            bio: isS ? document.getElementById('bio-source').value : document.getElementById('bio-editor').innerHTML
        };

        await fetch(`${API}/profile/save`, {
            method: 'POST',
            body: JSON.stringify(payload)
        });
        alert("Identity Record Updated.");
        location.reload();
    }

    function toggleBioSource() {
        const edit = document.getElementById('bio-editor');
        const source = document.getElementById('bio-source');
        const isS = source.style.display === 'block';
        if(!isS) { source.value = edit.innerHTML; edit.style.display='none'; source.style.display='block'; }
        else { edit.innerHTML = source.value; edit.style.display='block'; source.style.display='none'; }
    }

    function exec(c) { document.execCommand(c, false, null); }

    loadProfile();
</script>
</body>
</html>
