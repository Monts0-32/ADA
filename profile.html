<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | Identity Profile</title>
    <style>
        :root { --bg: #0d1117; --header: #161b22; --border: #30363d; --text: #c9d1d9; --btn-green: #238636; --blue: #58a6ff; --red: #f85149; }
        
        /* THEMED SCROLLBAR */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 5px; }

        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; min-height: 100vh; overflow-x: hidden; transition: background 0.3s; }
        header { background: var(--header); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 1100; }

        .container { max-width: 1200px; margin: 40px auto; display: grid; grid-template-columns: 320px 1fr; gap: 40px; padding: 0 20px; }
        
        /* SIDEBAR & SEARCH */
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .avatar-lg { width: 320px; height: 320px; border-radius: 8px; border: 1px solid var(--border); object-fit: cover; background: #0d1117; }
        
        .search-wrap { position: relative; background: #161b22; border: 1px solid var(--border); padding: 15px; border-radius: 8px; }
        .suggest-box { position: absolute; top: 100%; left: 0; width: 100%; background: #161b22; border: 1px solid var(--border); border-radius: 6px; z-index: 1000; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .suggest-item { display: flex; align-items: center; gap: 10px; padding: 10px; cursor: pointer; border-bottom: 1px solid var(--border); }
        .suggest-item:hover { background: #21262d; }
        .suggest-item img { width: 28px; height: 28px; border-radius: 50%; }

        /* BUTTON STYLING */
        .btn-gh { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #444c56; background: #21262d; color: white; cursor: pointer; font-weight: 600; font-size: 13px; transition: 0.2s; }
        .btn-gh:hover { background: #30363d; border-color: #8b949e; }
        .btn-primary { background: var(--btn-green); border: none; }
        .btn-primary:hover { background: #2ea043; }

        /* BIO DISPLAY & EDITOR */
        .bio-container { background: rgba(22, 27, 34, 0.8); border: 1px solid var(--border); border-radius: 8px; padding: 40px; min-height: 600px; position: relative; backdrop-filter: blur(10px); }
        
        .toolbar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 15px; align-items: center; }
        .toolbar select, .toolbar button, .toolbar input { background: #21262d; border: 1px solid var(--border); color: white; padding: 5px 10px; border-radius: 6px; cursor: pointer; height: 32px; font-size: 12px; }

        #bio-edit { width: 100%; min-height: 450px; background: #0d1117; border: 1px solid var(--border); border-radius: 8px; padding: 30px; outline: none; position: relative; overflow: visible; line-height: 1.6; }
        #bio-raw { width: 100%; min-height: 450px; background: #0d1117; color: #79c0ff; border: 1px solid var(--border); border-radius: 8px; padding: 20px; font-family: monospace; display: none; outline: none; }

        /* IMAGE ENGINE */
        .img-wrapper { position: absolute; display: inline-block; line-height: 0; padding: 2px; cursor: move; user-select: none; border: 2px solid transparent; z-index: 10; }
        .img-wrapper img { width: 100%; height: 100%; pointer-events: none; border-radius: 4px; }
        .img-wrapper.active { border-color: var(--blue); background: rgba(88, 166, 255, 0.1); z-index: 100; }
        
        .resizer { position: absolute; width: 12px; height: 12px; background: var(--blue); right: -6px; bottom: -6px; cursor: nwse-resize; border-radius: 50%; display: none; border: 2px solid var(--bg); }
        .remover { position: absolute; width: 20px; height: 20px; background: var(--red); color: white; right: -10px; top: -10px; cursor: pointer; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; border: 2px solid var(--bg); }
        .img-wrapper.active .resizer, .img-wrapper.active .remover { display: flex; }

        .badge-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; display: flex; align-items: center; gap: 6px; background: #161b22; border: 1px solid var(--border); }
    </style>
</head>
<body id="p-body">
    <div id="ada-chat-widget">
        <div id="chat-window">
            <div id="chat-header"><span>Archive Communications</span><span onclick="toggleChat()" style="cursor:pointer;opacity:0.6;">✕</span></div>
            <div id="chat-body"></div>
            <form id="chat-footer" onsubmit="event.preventDefault(); sendChatText();">
                <input type="text" id="chat-msg-input" placeholder="Type a message..." autocomplete="off">
                <button type="button" class="chat-btn" onclick="document.getElementById('chat-file').click()" title="Share Image">🖼️</button>
                <input type="file" id="chat-file" hidden accept="image/*" onchange="uploadChatImg(this)">
                <button type="submit" class="chat-btn btn-send">Send</button>
            </form>
        </div>
        <div id="chat-icon" onclick="toggleChat()">💬<div id="chat-notif"></div></div>
    </div>
    
    <style>
        #ada-chat-widget { position: fixed; bottom: 25px; right: 25px; z-index: 9999; font-family: -apple-system, sans-serif; }
        #chat-icon { width: 56px; height: 56px; background: #238636; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); position: relative; }
        #chat-notif { position: absolute; top: 2px; right: 2px; width: 14px; height: 14px; background: #f85149; border-radius: 50%; border: 2px solid #0d1117; display: none; }
        
        /* Bigger Window */
        #chat-window { width: 380px; height: 550px; background: #161b22; border: 1px solid #30363d; border-radius: 12px; display: none; flex-direction: column; margin-bottom: 15px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        #chat-header { background: #21262d; padding: 14px; font-size: 14px; font-weight: 600; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; }
        #chat-body { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #0d1117; }
        #chat-footer { padding: 12px; border-top: 1px solid #30363d; display: flex; gap: 8px; align-items: center; background: #161b22; }
        #chat-msg-input { flex: 1; background: #0d1117; border: 1px solid #30363d; color: white; padding: 8px 12px; border-radius: 6px; outline: none; font-size: 13px; }
        
        /* Styled Buttons */
        .chat-btn { background: #21262d; border: 1px solid #30363d; color: white; padding: 7px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.2s; }
        .chat-btn:hover { background: #30363d; border-color: #8b949e; }
        .btn-send { background: #238636; border: none; }
        .btn-send:hover { background: #2ea043; }
    
        /* Message Bubbles with Avatars */
        .chat-row { display: flex; gap: 10px; align-items: flex-end; max-width: 90%; }
        .chat-row.me { flex-direction: row-reverse; align-self: flex-end; }
        .chat-row img.chat-avatar { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #30363d; background: #0d1117; flex-shrink: 0; }
        .chat-bubble { padding: 8px 12px; border-radius: 12px; font-size: 13px; line-height: 1.4; word-wrap: break-word; position: relative; }
        .chat-row.other .chat-bubble { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-bottom-left-radius: 2px; }
        .chat-row.me .chat-bubble { background: #238636; color: white; border-bottom-right-radius: 2px; }
        .chat-user-label { font-size: 9px; opacity: 0.5; display: block; margin-bottom: 2px; }
    </style>
    
    <script>
        const CHAT_API = "https://ada-relay.andrewdinglearchive.workers.dev";
        const myChatEmail = localStorage.getItem('ada_user_email');
        let isChatOpen = false;
        let lastChatId = 0;
    
        function toggleChat() {
            isChatOpen = !isChatOpen;
            document.getElementById('chat-window').style.display = isChatOpen ? 'flex' : 'none';
            if(isChatOpen) {
                document.getElementById('chat-notif').style.display = 'none';
                const body = document.getElementById('chat-body');
                body.scrollTop = body.scrollHeight;
            }
        }
    
        async function syncWidget() {
            if(!myChatEmail) return;
            const res = await fetch(`${CHAT_API}/sync?email=${encodeURIComponent(myChatEmail)}`);
            const data = await res.json();
            
            const latest = data.messages[data.messages.length - 1];
            if(latest && latest.id > lastChatId) {
                if(!isChatOpen && lastChatId !== 0) document.getElementById('chat-notif').style.display = 'block';
                lastChatId = latest.id;
                
                const body = document.getElementById('chat-body');
                body.innerHTML = data.messages.map(m => `
                    <div class="chat-row ${m.user_email === myChatEmail ? 'me' : 'other'}">
                        <img src="${m.profile_picture}" class="chat-avatar" title="${m.user_email}">
                        <div class="chat-bubble">
                            <span class="chat-user-label">${m.display_name || m.user_email}</span>
                            ${m.is_image ? `<img src="${m.content}" style="max-width:100%;border-radius:6px;margin-top:5px;cursor:pointer;" onclick="window.open(this.src)">` : m.content}
                        </div>
                    </div>
                `).join('');
                if(isChatOpen) body.scrollTop = body.scrollHeight;
            }
        }
    
        async function sendChatText() {
            const inp = document.getElementById('chat-msg-input');
            if(!inp.value.trim()) return;
            await fetch(`${CHAT_API}/chat`, { method: 'POST', body: JSON.stringify({ email: myChatEmail, content: inp.value, isImage: false }) });
            inp.value = ''; syncWidget();
        }
    
        async function uploadChatImg(input) {
            if (input.files && input.files[0]) {
                const r = new FileReader();
                r.onload = async (e) => {
                    await fetch(`${CHAT_API}/chat`, { method: 'POST', body: JSON.stringify({ email: myChatEmail, content: e.target.result, isImage: true }) });
                    syncWidget();
                };
                r.readAsDataURL(input.files[0]);
            }
        }
    
        setInterval(syncWidget, 3000); syncWidget();
    </script>
<header>
    <a href="/dash.html" style="color:var(--blue); text-decoration:none; font-weight:600;">← Archive Dashboard</a>
    <div style="font-weight:bold;">Identity Record</div>
</header>

<div class="container">
    <div class="sidebar">
        <img id="avatar-view" class="avatar-lg" src="">
        <h2 id="name-view" style="margin:10px 0 0 0;"></h2>
        <div id="email-view" style="color:#8b949e; font-size:14px;"></div>
        
        <div class="badge-list" id="badges-view"></div>

        <div class="search-wrap">
            <div style="font-size:11px; font-weight:bold; color:#8b949e; margin-bottom:10px;">LOCATE IDENTITY</div>
            <input type="text" id="sq" class="btn-gh" style="text-align:left; cursor:text;" placeholder="Search names or emails..." oninput="doSuggest(this.value)">
            <div id="suggest" class="suggest-box"></div>
            <button class="btn-gh btn-primary" style="margin-top:10px;" onclick="search()">Search Database</button>
        </div>

        <button id="edit-btn" class="btn-gh" style="display:none; border-color:var(--blue); color:var(--blue);" onclick="toggleEdit()">Edit My Profile</button>
    </div>

    <div class="bio-container">
        <div id="bio-display"></div>

        <!-- EDITOR UI -->
        <div id="editor-ui" style="display:none; flex-direction:column;">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px;">
                <input type="text" id="in-name" class="btn-gh" style="text-align:left;" placeholder="Display Name">
                <div style="display:flex; gap:5px;">
                    <input type="text" id="in-bg" class="btn-gh" style="text-align:left; flex:1" placeholder="Background Hex or linear-gradient">
                    <input type="color" style="height:38px; margin-top:10px;" onchange="document.getElementById('in-bg').value=this.value">
                </div>
            </div>

            <div class="toolbar">
                <select onchange="exec('formatBlock', this.value); this.selectedIndex=0;">
                    <option value="" disabled selected>Heading</option>
                    <option value="H1">Title (H1)</option>
                    <option value="H2">Header (H2)</option>
                    <option value="P">Text (P)</option>
                </select>
                <button onclick="exec('bold')"><b>B</b></button>
                <button onclick="exec('italic')"><i>I</i></button>
                <button onclick="exec('underline')"><u>U</u></button>
                <input type="color" onchange="exec('foreColor', this.value)" title="Text Color">
                <div style="width:1px; background:var(--border); height:20px; margin:0 5px;"></div>
                <button onclick="document.getElementById('f-pic').click()">Change Avatar</button>
                <button onclick="document.getElementById('f-bio').click()">Add Image</button>
                <button onclick="toggleSource()" id="src-btn">Source Code</button>
            </div>
            
            <input type="file" id="f-pic" hidden onchange="upAvatar(this)">
            <input type="file" id="f-bio" hidden onchange="upBioImg(this)">

            <div id="bio-edit" contenteditable="true"></div>
            <textarea id="bio-raw"></textarea>

            <button class="btn-gh btn-primary" style="margin-top:20px; padding:15px;" onclick="save()">Save Identity Changes</button>
        </div>
    </div>
</div>

<script>
    const API = "https://ada-relay.andrewdinglearchive.workers.dev";
    const myEmail = localStorage.getItem('ada_user_email');
    const params = new URLSearchParams(window.location.search);
    const target = params.get('email') || myEmail;
    let isSrc = false;

    async function load() {
        const res = await fetch(`${API}/profile/get?email=${encodeURIComponent(target)}&by=${myEmail}`);
        const d = await res.json();
        if(d.disabled) { document.body.innerHTML="<h1 style='color:red; text-align:center; padding:100px;'>ACCESS RESTRICTED</h1>"; return; }
        
        const u = d.user;
        document.getElementById('p-body').style.background = u.bg_style || "#0d1117";
        document.getElementById('avatar-view').src = u.profile_picture;
        document.getElementById('name-view').innerText = u.display_name || u.email;
        document.getElementById('email-view').innerText = u.email;
        document.getElementById('bio-display').innerHTML = u.bio_html || "This record is currently empty.";

        // Badges
        const br = document.getElementById('badges-view');
        br.innerHTML = d.badges.map(b => `<div class="badge" style="border-color:${b.color}; color:${b.color}">${b.icon} ${b.name}</div>`).join('');
        if(u.is_admin) br.innerHTML += `<div class="badge" style="border-color:#d29922; color:#d29922">🛡️ ADMIN</div>`;

        if(target === myEmail) {
            document.getElementById('edit-btn').style.display = 'block';
            document.getElementById('in-name').value = u.display_name || "";
            document.getElementById('in-bg').value = u.bg_style || "";
            document.getElementById('bio-edit').innerHTML = u.bio_html || "";
            attachLogic();
        }
    }

    async function doSuggest(q) {
        if(q.length < 2) { document.getElementById('suggest').style.display='none'; return; }
        const r = await fetch(`${API}/search/suggest?q=${encodeURIComponent(q)}`);
        const items = await r.json();
        const box = document.getElementById('suggest');
        box.innerHTML = items.map(u => `<div class="suggest-item" onclick="location.href='?email=${u.email}'"><img src="${u.profile_picture}"><span>${u.display_name || u.email}</span></div>`).join('');
        box.style.display = items.length ? 'block' : 'none';
    }

    function toggleEdit() {
        const ui = document.getElementById('editor-ui');
        const view = document.getElementById('bio-display');
        const active = ui.style.display === 'flex';
        ui.style.display = active ? 'none' : 'flex';
        view.style.display = active ? 'block' : 'none';
    }

    function toggleSource() {
        isSrc = !isSrc;
        const ed = document.getElementById('bio-edit'), raw = document.getElementById('bio-raw');
        if(isSrc){ raw.value=ed.innerHTML; ed.style.display='none'; raw.style.display='block'; document.getElementById('src-btn').innerText="Visual View"; }
        else { ed.innerHTML=raw.value; ed.style.display='block'; raw.style.display='none'; document.getElementById('src-btn').innerText="Source Code"; attachLogic(); }
    }

    function upAvatar(i) { if(i.files[0]){ const r = new FileReader(); r.onload=(e)=>document.getElementById('avatar-view').src=e.target.result; r.readAsDataURL(i.files[0]); }}
    
    function upBioImg(i) {
        if(i.files[0]){
            const r = new FileReader();
            r.onload=(e)=>{
                const w = document.createElement('div');
                w.className='img-wrapper'; w.style.width='200px'; w.style.left='10px'; w.style.top='10px';
                w.innerHTML=`<img src="${e.target.result}"><div class="resizer"></div><div class="remover">×</div>`;
                document.getElementById('bio-edit').appendChild(w);
                attachLogic();
            };
            r.readAsDataURL(i.files[0]);
        }
    }

    function attachLogic() {
        document.querySelectorAll('.img-wrapper').forEach(w => {
            w.onmousedown = (e) => {
                if(e.target.className === 'remover') { w.remove(); return; }
                document.querySelectorAll('.img-wrapper').forEach(x => x.classList.remove('active'));
                w.classList.add('active');
                
                let resizing = e.target.className === 'resizer';
                let sX = e.clientX, sY = e.clientY;
                let sW = w.offsetWidth, sL = w.offsetLeft, sT = w.offsetTop;

                const move = (me) => {
                    if(resizing){ 
                        w.style.width = Math.max(50, sW + (me.clientX - sX)) + 'px'; 
                        w.style.height = 'auto'; 
                    }
                    else { 
                        w.style.left = (sL + (me.clientX - sX)) + 'px'; 
                        w.style.top = (sT + (me.clientY - sY)) + 'px'; 
                    }
                };
                const stop = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', stop); };
                window.addEventListener('mousemove', move);
                window.addEventListener('mouseup', stop);
                e.preventDefault();
            };
        });
    }

    async function save() {
        // Clean UI handles before save
        document.querySelectorAll('.img-wrapper').forEach(x => x.classList.remove('active'));
        const payload = {
            email: myEmail,
            name: document.getElementById('in-name').value,
            pic: document.getElementById('avatar-view').src,
            bg: document.getElementById('in-bg').value,
            bio: isSrc ? document.getElementById('bio-raw').value : document.getElementById('bio-edit').innerHTML,
            color: "#c9d1d9"
        };
        await fetch(`${API}/profile/save`, { method: 'POST', body: JSON.stringify(payload) });
        location.reload();
    }

    function search() { const q = document.getElementById('sq').value; if(q) location.href=`/profile.html?email=${encodeURIComponent(q)}`; }
    function exec(c, v=null) { if(!isSrc){ document.execCommand(c, false, v); }}
    
    load();
</script>
</body>
</html>
