<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | Identity Profile</title>
    
    <!-- MASTER BOOTSTRAP -->
    <script src="/uplink.js"></script>
    <script src="/header-engine.js"></script>
    <script src="/chat-widget.js"></script>
    <script src="/escape-key.js"></script>

    <style>
        :root { 
            --bg: #0d1117; --header: #161b22; --border: #30363d; --text: #c9d1d9; 
            --btn-green: #238636; --blue: #58a6ff; --red: #f85149; --gold: #d29922; 
        }
        
        /* THEMED SCROLLBAR */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #444c56; }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            margin: 0; 
            min-height: 100vh; 
            overflow-x: hidden; 
            transition: background 0.3s; 
        }

        .container { 
            max-width: 1200px; 
            margin: 40px auto; 
            display: grid; 
            grid-template-columns: 320px 1fr; 
            gap: 40px; 
            padding: 0 20px; 
            box-sizing: border-box;
        }
        
        /* --- SIDEBAR & SEARCH --- */
        .sidebar { display: flex; flex-direction: column; gap: 15px; }
        .avatar-lg { width: 320px; height: 320px; border-radius: 8px; border: 1px solid var(--border); object-fit: cover; background: #0d1117; margin-bottom: 5px; }
        
        .status-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; vertical-align: middle; margin-left: 8px; }
        .online { background: #3fb950; box-shadow: 0 0 8px #3fb950; }
        .offline { background: #8b949e; }

        .search-area { background: #161b22; border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-top: 10px; }
        .search-wrap { position: relative; width: 100%; margin-bottom: 8px; }
        .inp { width: 100%; padding: 8px 12px; background: #0d1117; border: 1px solid var(--border); color: white; border-radius: 6px; box-sizing: border-box; outline: none; font-size: 13px; }
        .inp:focus { border-color: var(--blue); }

        .suggest-box { position: absolute; top: 100%; left: 0; width: 100%; background: #161b22; border: 1px solid var(--border); border-radius: 6px; z-index: 1200; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.5); margin-top: 4px; box-sizing: border-box; }
        .suggest-item { display: flex; align-items: center; gap: 10px; padding: 10px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text); }
        .suggest-item:hover { background: #21262d; }
        .suggest-item img { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; }

        /* --- BUTTON STYLING --- */
        .btn-gh { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #444c56; background: #21262d; color: white; cursor: pointer; font-weight: 600; font-size: 13px; transition: 0.2s; box-sizing: border-box; text-align: center; display: block; text-decoration: none; }
        .btn-gh:hover { background: #30363d; border-color: #8b949e; }
        .btn-primary { background: var(--btn-green); border: none; }
        .btn-primary:hover { background: #2ea043; }
        .btn-danger { color: var(--red); border-color: rgba(248, 81, 73, 0.3); }

        /* --- BIO & EDITOR --- */
        .bio-container { background: rgba(22, 27, 34, 0.8); border: 1px solid var(--border); border-radius: 8px; padding: 40px; min-height: 600px; position: relative; backdrop-filter: blur(10px); }
        
        .toolbar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 15px; align-items: center; }
        .toolbar select, .toolbar button { background: #21262d; border: 1px solid var(--border); color: white; padding: 5px 10px; border-radius: 6px; cursor: pointer; height: 32px; font-size: 12px; }

        #bio-edit, #bio-raw { width: 100%; min-height: 450px; background: #0d1117; border: 1px solid var(--border); border-radius: 8px; padding: 30px; outline: none; position: relative; overflow: hidden; line-height: 1.6; box-sizing: border-box; color: white; }
        #bio-edit { position: relative; overflow: auto; }
        #bio-raw { color: #79c0ff; font-family: monospace; display: none; }

        /* bio-display mirrors the editor box exactly so absolute images stay contained */
        #bio-display { width: 100%; min-height: 450px; background: #0d1117; border: 1px solid var(--border); border-radius: 8px; padding: 30px; position: relative; overflow: hidden; line-height: 1.6; box-sizing: border-box; color: white; margin-bottom: 0; }

        /* --- NEURAL IMAGE ENGINE --- */
        .img-wrapper { position: relative; display: inline-block; line-height: 0; padding: 2px; cursor: move; user-select: none; border: 2px solid transparent; z-index: 10; max-width: 100%; vertical-align: top; }
        .img-wrapper img { width: 100%; height: 100%; pointer-events: none; border-radius: 4px; display: block; }
        .img-wrapper.active { border-color: var(--blue); background: rgba(88, 166, 255, 0.1); z-index: 100; }
        
        .resizer { position: absolute; width: 14px; height: 14px; background: var(--blue); right: -5px; bottom: -5px; cursor: nwse-resize; border-radius: 50%; display: none; border: 2px solid var(--bg); z-index: 10; }
        .remover { position: absolute; width: 22px; height: 22px; background: var(--red); color: white; right: -8px; top: -8px; cursor: pointer; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; border: 2px solid var(--bg); z-index: 10; }
        
        /* Only show handles if editor is active */
        #editor-ui[style*="display: flex"] .img-wrapper.active .resizer, 
        #editor-ui[style*="display: flex"] .img-wrapper.active .remover { display: flex !important; }

        /* --- THEMED COLOR PICKER --- */
        .color-picker-wrapper { display: flex; align-items: center; gap: 8px; background: #21262d; border: 1px solid #444c56; border-radius: 6px; padding: 4px 10px; cursor: pointer; height: 38px; box-sizing: border-box; }
        .color-preview { width: 20px; height: 20px; border-radius: 4px; border: 1px solid var(--border); }
        input[type="color"] { border: none; width: 0; height: 0; padding: 0; visibility: hidden; position: absolute; }

        .badge-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; display: flex; align-items: center; gap: 6px; background: #161b22; border: 1px solid var(--border); }

        /* --- REACTION BUTTONS --- */
        .reaction-bar { display: flex; gap: 10px; margin-top: 0; }
        #social-section { margin-top: 20px; }
        .react-btn { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 6px; border: 1px solid var(--border); background: #21262d; color: var(--text); cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.15s; user-select: none; }
        .react-btn:hover { background: #30363d; }
        .react-btn.liked { background: rgba(35, 134, 54, 0.2); border-color: var(--btn-green); color: #3fb950; }
        .react-btn.disliked { background: rgba(248, 81, 73, 0.15); border-color: var(--red); color: var(--red); }
        .react-count { font-size: 12px; opacity: 0.8; }

        /* --- COMMENTS SECTION --- */
        .comments-section { margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px; }
        .comments-title { font-size: 12px; font-weight: bold; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 15px; }
        .comment-input-row { display: flex; gap: 10px; margin-bottom: 18px; align-items: flex-start; }
        .comment-input-row img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; flex-shrink: 0; margin-top: 2px; }
        .comment-input-wrap { flex: 1; }
        .comment-textarea { width: 100%; background: #0d1117; border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 8px 12px; font-size: 13px; resize: none; outline: none; box-sizing: border-box; font-family: inherit; min-height: 36px; transition: border-color 0.15s, min-height 0.15s; }
        .comment-textarea:focus { border-color: var(--blue); min-height: 70px; }
        .comment-submit-row { display: none; justify-content: flex-end; margin-top: 6px; }
        .comment-textarea:focus ~ .comment-submit-row, .comment-submit-row.show { display: flex; }
        .comment-list { display: flex; flex-direction: column; gap: 14px; }
        .comment-item { display: flex; gap: 10px; }
        .comment-item img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; flex-shrink: 0; cursor: pointer; transition: opacity 0.15s; }
        .comment-item img:hover { opacity: 0.8; }
        .comment-body { flex: 1; background: #161b22; border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; }
        .comment-header { display: flex; align-items: center; justify-content: space-between; }
        .comment-meta { display: flex; align-items: center; gap: 0; flex-wrap: wrap; }
        .comment-delete { background: none; border: none; color: #8b949e; cursor: pointer; font-size: 11px; padding: 2px 6px; border-radius: 4px; transition: 0.15s; flex-shrink: 0; }
        .comment-delete:hover { background: rgba(248,81,73,0.15); color: var(--red); }
        .comment-author { font-size: 12px; font-weight: bold; color: var(--blue); cursor: pointer; text-decoration: none; }
        .comment-author:hover { text-decoration: underline; }
        .comment-time { font-size: 11px; color: #8b949e; margin-left: 8px; }
        .comment-text { font-size: 13px; margin-top: 4px; color: var(--text); white-space: pre-wrap; word-break: break-word; }
        .no-comments { font-size: 13px; color: #8b949e; text-align: center; padding: 20px 0; }

        /* --- ADMIN SETTINGS MODAL --- */
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(3px); }
        .modal-box { background:#161b22; border:1px solid var(--border); border-radius:12px; width:460px; max-width:95vw; max-height:85vh; overflow-y:auto; padding:24px; display:flex; flex-direction:column; gap:18px; }
        .modal-title { font-size:15px; font-weight:bold; color:var(--text); display:flex; align-items:center; justify-content:space-between; }
        .modal-close { background:none; border:none; color:#8b949e; font-size:18px; cursor:pointer; padding:2px 6px; border-radius:4px; }
        .modal-close:hover { color:var(--text); background:#30363d; }
        .modal-section { display:flex; flex-direction:column; gap:10px; }
        .modal-section-title { font-size:11px; font-weight:bold; color:#8b949e; text-transform:uppercase; letter-spacing:.05em; border-bottom:1px solid var(--border); padding-bottom:6px; }
        .modal-row { display:flex; align-items:center; justify-content:space-between; gap:12px; }
        .modal-row label { font-size:13px; color:var(--text); }
        .modal-row .inp-sm { width:80px; background:#0d1117; border:1px solid var(--border); color:var(--text); border-radius:6px; padding:5px 8px; font-size:13px; text-align:center; outline:none; }
        .modal-row .inp-sm:focus { border-color:var(--blue); }

        /* Toggle switch */
        .toggle-wrap { display:flex; align-items:center; gap:8px; }
        .toggle { position:relative; width:36px; height:20px; flex-shrink:0; }
        .toggle input { opacity:0; width:0; height:0; }
        .toggle-slider { position:absolute; inset:0; background:#30363d; border-radius:20px; cursor:pointer; transition:.2s; }
        .toggle-slider:before { content:''; position:absolute; width:14px; height:14px; left:3px; top:3px; background:white; border-radius:50%; transition:.2s; }
        .toggle input:checked + .toggle-slider { background:var(--btn-green); }
        .toggle input:checked + .toggle-slider:before { transform:translateX(16px); }
        .toggle input:disabled + .toggle-slider { opacity:.4; cursor:not-allowed; }

        /* Reaction buttons — hidden until config confirms they're enabled */
        #like-btn, #dislike-btn { display: none; }
        #like-btn.react-visible, #dislike-btn.react-visible { display: flex; }

        /* Runaway like button — no position transition, JS handles movement */
        #like-btn.runaway { position:fixed; pointer-events:auto; z-index:500; }
    </style>
</head>
<body id="p-body">

<div id="ada-header-anchor"></div>

<div class="container">
    <!-- SIDEBAR -->
    <div class="sidebar">
        <img id="avatar-view" class="avatar-lg" src="">
        
        <div>
            <h2 id="name-view" style="margin:0;"></h2>
            <div id="email-view" style="color:#8b949e; font-size:14px;"></div>
            <div class="badge-list" id="badges-view"></div>
        </div>

        <button id="edit-btn" class="btn-gh" style="display:none; border-color:var(--blue); color:var(--blue);" onclick="toggleEdit()">Edit My Profile</button>
        
        <div id="admin-actions" style="display:none;">
            <button id="toggle-disabled-btn" class="btn-gh btn-danger" onclick="toggleProfileStatus()">Disable Profile Access</button>
            <button class="btn-gh" style="border-color:#8b949e;color:#8b949e;margin-top:6px;" onclick="openSettings()">⚙ Profile Settings</button>
        </div>

        <!-- ADMIN SETTINGS MODAL -->
        <div id="settings-modal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeSettings()">
            <div class="modal-box">
                <div class="modal-title">
                    <span>⚙ Profile Settings</span>
                    <button class="modal-close" onclick="closeSettings()">×</button>
                </div>

                <!-- Reactions -->
                <div class="modal-section">
                    <div class="modal-section-title">Reactions</div>
                    <div class="modal-row">
                        <label>Enable Like Button</label>
                        <label class="toggle"><input type="checkbox" id="cfg-likes-enabled" onchange="onLikesToggle()"><span class="toggle-slider"></span></label>
                    </div>
                    <div class="modal-row">
                        <label>Enable Dislike Button</label>
                        <label class="toggle"><input type="checkbox" id="cfg-dislikes-enabled"><span class="toggle-slider"></span></label>
                    </div>
                    <div class="modal-row">
                        <label>Override Like Count</label>
                        <input type="number" id="cfg-like-count" class="inp-sm" min="0" placeholder="auto">
                    </div>
                    <div class="modal-row">
                        <label>Override Dislike Count</label>
                        <input type="number" id="cfg-dislike-count" class="inp-sm" min="0" placeholder="auto">
                    </div>
                </div>

                <!-- Comments -->
                <div class="modal-section">
                    <div class="modal-section-title">Comments</div>
                    <div class="modal-row">
                        <label>Enable Comment Section</label>
                        <label class="toggle"><input type="checkbox" id="cfg-comments-enabled"><span class="toggle-slider"></span></label>
                    </div>
                </div>

                <!-- Fun -->
                <div class="modal-section">
                    <div class="modal-section-title">Fun</div>
                    <div class="modal-row">
                        <label>🏃 Runaway Like Button <span style="font-size:11px;color:#8b949e;">(like must be enabled)</span></label>
                        <label class="toggle"><input type="checkbox" id="cfg-runaway" onchange="onRunawayToggle()"><span class="toggle-slider"></span></label>
                    </div>
                </div>

                <!-- Profile override -->
                <div class="modal-section">
                    <div class="modal-section-title">Edit Profile Info</div>
                    <div class="modal-row" style="flex-direction:column;align-items:flex-start;gap:6px;">
                        <label style="font-size:11px;color:#8b949e;">Display Name</label>
                        <input type="text" id="cfg-display-name" class="inp" style="width:100%;" placeholder="Display name">
                    </div>
                    <div class="modal-row" style="flex-direction:column;align-items:flex-start;gap:6px;">
                        <label style="font-size:11px;color:#8b949e;">Background Style</label>
                        <input type="text" id="cfg-bg-style" class="inp" style="width:100%;" placeholder="#0d1117 or gradient...">
                    </div>
                </div>

                <button class="btn-gh btn-primary" style="padding:10px;" onclick="saveSettings()">Save Settings</button>
            </div>
        </div>

        <div class="search-area">
            <div style="font-size:11px; font-weight:bold; color:#8b949e; margin-bottom:10px; text-transform: uppercase;">Locate Identity</div>
            <div class="search-wrap">
                <input type="text" id="sq" class="inp" placeholder="Name or email..." oninput="doSuggest(this.value)">
                <div id="suggest" class="suggest-box"></div>
            </div>
            <button class="btn-gh btn-primary" onclick="search()">Search Database</button>
        </div>
    </div>

    <!-- BIO AREA -->
    <div class="bio-container">
        <div id="bio-display"></div>

        <!-- REACTIONS & COMMENTS (view mode only) -->
        <div id="social-section" style="display:none;">
            <div class="reaction-bar" id="reaction-bar">
                <button class="react-btn" id="like-btn" onclick="react('like')">
                    <span>👍</span> <span id="like-count" class="react-count">0</span>
                </button>
                <button class="react-btn" id="dislike-btn" onclick="react('dislike')">
                    <span>👎</span> <span id="dislike-count" class="react-count">0</span>
                </button>
            </div>

            <div class="comments-section" id="comments-section">
                <div class="comments-title">Comments</div>
                <div id="comments-off-msg" style="display:none; font-size:13px; color:#8b949e; text-align:center; padding:20px 0; background:#161b22; border:1px solid var(--border); border-radius:8px;">
                    💬 Comments have been turned off for this profile.
                </div>
                <div id="comments-live">
                    <div class="comment-input-row" id="comment-input-area" style="display:none;">
                        <img id="commenter-avatar" src="" alt="">
                        <div class="comment-input-wrap">
                            <textarea class="comment-textarea" id="comment-text" placeholder="Leave a comment..." rows="1" oninput="autoResize(this)" onfocus="document.getElementById('comment-submit-row').classList.add('show')" onblur="scheduleHideSubmit()"></textarea>
                            <div class="comment-submit-row" id="comment-submit-row">
                                <button class="btn-gh" style="width:auto; padding:6px 16px; font-size:12px;" onclick="submitComment()">Comment</button>
                            </div>
                        </div>
                    </div>
                    <div class="comment-list" id="comment-list">
                        <div class="no-comments">No comments yet.</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- EDITOR UI -->
        <div id="editor-ui" style="display:none; flex-direction:column;">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px;">
                <div>
                    <label style="font-size:11px; color:#8b949e; display:block; margin-bottom:5px;">Display Name</label>
                    <input type="text" id="in-name" class="inp" placeholder="Display Name">
                </div>
                <div>
                    <label style="font-size:11px; color:#8b949e; display:block; margin-bottom:5px;">Background Style</label>
                    <div style="display:flex; gap:8px;">
                        <input type="text" id="in-bg" class="inp" style="flex:1" placeholder="#0d1117 or gradient...">
                        <label class="color-picker-wrapper">
                            <div id="picker-preview" class="color-preview"></div>
                            <input type="color" onchange="updateBgFromPicker(this.value)">
                        </label>
                    </div>
                </div>
            </div>

            <div class="toolbar">
                <select onchange="exec('formatBlock', this.value); this.selectedIndex=0;">
                    <option value="" disabled selected>Heading</option>
                    <option value="H1">Title (H1)</option>
                    <option value="H2">Header (H2)</option>
                    <option value="P">Text (P)</option>
                </select>
                <button onclick="exec('bold')"><b>B</b></button>
                <button onclick="exec('italic')"><i>I</i></button>
                <button onclick="exec('underline')"><u>U</u></button>
                <input type="color" onchange="exec('foreColor', this.value)" title="Text Color">
                <div style="width:1px; background:var(--border); height:20px; margin:0 5px;"></div>
                <button onclick="document.getElementById('f-pic').click()">Avatar</button>
                <button onclick="document.getElementById('f-bio').click()">+Image</button>
                <button onclick="toggleBioSource()" id="src-btn">HTML Source</button>
            </div>
            
            <input type="file" id="f-pic" hidden onchange="upAvatar(this)">
            <input type="file" id="f-bio" hidden onchange="upBioImg(this)">

            <div id="bio-edit" contenteditable="true"></div>
            <textarea id="bio-raw"></textarea>

            <button class="btn-gh btn-primary" style="margin-top:20px; padding:15px;" onclick="save()">Save Identity Changes</button>
        </div>
    </div>
</div>

<script>
    const API = "https://ada-relay.andrewdinglearchive.workers.dev";
    const myEmail = localStorage.getItem('ada_user_email');
    const params = new URLSearchParams(window.location.search);
    const target = params.get('email') || myEmail;
    let isSrc = false;
    let currentProfile = null;
    let myProfileData  = null;
    let reactionsData  = { likes: [], dislikes: [] };
    let commentsData   = [];
    let profileConfig  = { likesEnabled:true, dislikesEnabled:true, commentsEnabled:true, likeOverride:null, dislikeOverride:null, runaway:false };
    let runawayActive  = false;
    let runawayHome    = null; // { left, top } of like-btn original position

    // ── Utility ──────────────────────────────────────────────────────────────
    function postJSON(url, data) {
        return fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
    }
    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function timeAgo(ts) {
        if (!ts) return '';
        const d = Math.floor((Date.now() - new Date(ts)) / 1000);
        if (d < 60) return 'just now';
        if (d < 3600) return Math.floor(d/60) + 'm ago';
        if (d < 86400) return Math.floor(d/3600) + 'h ago';
        return Math.floor(d/86400) + 'd ago';
    }
    const FALLBACK_AVG = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzhCOTRBRSI+PHBhdGggZD0iTTEyIDEyYzIuMjEgMCA0LTEuNzkgNC00cy0xLjc5LTQtNC00LTQgMS43OS00IDQgMS43OSA0IDQgNHptMCAyYy0yLjY3IDAtOCAxLjM0LTggNHYyaDE2di0yYzAtMi42Ni01LjMzLTQtOC00eiIvPjwvc3ZnPg==';

    // ── Admin Settings ────────────────────────────────────────────────────────
    async function loadProfileConfig() {
        try {
            const r = await fetch(`${API}/sync?email=${encodeURIComponent(myEmail || 'guest')}`);
            if (r.ok) {
                const sd = await r.json();
                const raw = sd.widgets?.['pconfig__' + target];
                if (raw) profileConfig = { ...profileConfig, ...JSON.parse(raw) };
            }
        } catch(e) {}
    }

    // Saves any key/value into system_data using the chat endpoint as a workaround.
    // Uses /admin/system/save — if that 404s in your worker, add the route below.
    async function saveSystemData(id, content) {
        // Try the direct endpoint first
        let res = await postJSON(`${API}/admin/system/save`, { id, content });
        if (res.ok) return true;
        // Fallback: use /profile/data/save (add this to your worker — see worker-social-routes.js)
        res = await postJSON(`${API}/profile/data/save`, { id, content });
        return res.ok;
    }

    function applyProfileConfig() {
        const cfg = profileConfig;
        const likeBtn    = document.getElementById('like-btn');
        const dislikeBtn = document.getElementById('dislike-btn');

        // Show/hide using class so CSS default (hidden) prevents flash on load
        likeBtn.classList.toggle('react-visible',    !!cfg.likesEnabled);
        dislikeBtn.classList.toggle('react-visible', !!cfg.dislikesEnabled);

        // Comments
        const commentsOff  = document.getElementById('comments-off-msg');
        const commentsLive = document.getElementById('comments-live');
        if (!cfg.commentsEnabled) {
            commentsOff.style.display  = 'block';
            commentsLive.style.display = 'none';
        } else {
            commentsOff.style.display  = 'none';
            commentsLive.style.display = 'block';
        }

        // Runaway (only if likes enabled)
        if (cfg.likesEnabled && cfg.runaway) {
            enableRunaway();
        } else {
            disableRunaway();
        }
    }

    function openSettings() {
        const cfg = profileConfig;
        document.getElementById('cfg-likes-enabled').checked    = !!cfg.likesEnabled;
        document.getElementById('cfg-dislikes-enabled').checked = !!cfg.dislikesEnabled;
        document.getElementById('cfg-comments-enabled').checked = !!cfg.commentsEnabled;
        document.getElementById('cfg-like-count').value         = cfg.likeOverride ?? '';
        document.getElementById('cfg-dislike-count').value      = cfg.dislikeOverride ?? '';
        document.getElementById('cfg-display-name').value       = currentProfile?.display_name || '';
        document.getElementById('cfg-bg-style').value           = currentProfile?.bg_style || '';

        // Runaway toggle — disabled if likes are off
        const runawayEl = document.getElementById('cfg-runaway');
        runawayEl.checked  = !!cfg.runaway;
        runawayEl.disabled = !cfg.likesEnabled;

        document.getElementById('settings-modal').style.display = 'flex';
    }

    function closeSettings() {
        document.getElementById('settings-modal').style.display = 'none';
    }

    // Keep runaway toggle disabled when likes are turned off in the modal
    function onLikesToggle() {
        const likesOn  = document.getElementById('cfg-likes-enabled').checked;
        const runawayEl = document.getElementById('cfg-runaway');
        runawayEl.disabled = !likesOn;
        if (!likesOn) runawayEl.checked = false;
    }

    function onRunawayToggle() {
        // No extra logic needed; saving handles it
    }

    async function saveSettings() {
        const likesEnabled    = document.getElementById('cfg-likes-enabled').checked;
        const dislikesEnabled = document.getElementById('cfg-dislikes-enabled').checked;
        const commentsEnabled = document.getElementById('cfg-comments-enabled').checked;
        const likeOverrideRaw = document.getElementById('cfg-like-count').value.trim();
        const dislikeOverrideRaw = document.getElementById('cfg-dislike-count').value.trim();
        const runaway         = likesEnabled && document.getElementById('cfg-runaway').checked;
        const newName         = document.getElementById('cfg-display-name').value.trim();
        const newBg           = document.getElementById('cfg-bg-style').value.trim();

        const likeOvParsed    = likeOverrideRaw    !== '' ? parseInt(likeOverrideRaw,    10) : null;
        const dislikeOvParsed = dislikeOverrideRaw !== '' ? parseInt(dislikeOverrideRaw, 10) : null;

        profileConfig = {
            likesEnabled,
            dislikesEnabled,
            commentsEnabled,
            likeOverride:    (likeOvParsed    !== null && !isNaN(likeOvParsed))    ? likeOvParsed    : null,
            dislikeOverride: (dislikeOvParsed !== null && !isNaN(dislikeOvParsed)) ? dislikeOvParsed : null,
            runaway
        };

        // Save config
        await saveSystemData('pconfig__' + target, JSON.stringify(profileConfig));

        // Save profile info if changed
        if (newName !== (currentProfile?.display_name || '') || newBg !== (currentProfile?.bg_style || '')) {
            await postJSON(`${API}/profile/save`, {
                email: target,
                name:  newName  || currentProfile?.display_name,
                pic:   currentProfile?.profile_picture || '',
                bg:    newBg    || currentProfile?.bg_style,
                bio:   currentProfile?.bio_html || '',
                color: currentProfile?.text_color || '#c9d1d9'
            });
        }

        closeSettings();
        applyProfileConfig();

        // Refresh display name / bg if changed
        if (newName) document.getElementById('name-view').innerHTML = `${escHtml(newName)}<span class="status-dot ${currentProfile?.sec_ago < 60 ? 'online' : 'offline'}"></span>`;
        if (newBg)   document.getElementById('p-body').style.background = newBg;
    }

    // ── Runaway Like Button ───────────────────────────────────────────────────
    function enableRunaway() {
        if (runawayActive) return;
        runawayActive = true;

        const btn = document.getElementById('like-btn');

        let curL = null; // null = not yet initialised
        let curT = null;
        let mouseX = -9999;
        let mouseY = -9999;
        let rafId  = null;

        const PROXIMITY  = 120;
        const FLEE_SPEED = 11;
        const GLIDE_EASE = 0.07;
        const SNAP_DIST  = 0.5;

        function tick() {
            if (!runawayActive) return;
            rafId = requestAnimationFrame(tick);

            // ── First frame: snapshot home now that button is definitely painted ──
            if (curL === null) {
                // Must NOT have .runaway yet when we read BCR — remove it temporarily,
                // read, then re-apply so the button is in normal flow for the measurement.
                btn.classList.remove('runaway');
                btn.style.left = '';
                btn.style.top  = '';

                const rect = btn.getBoundingClientRect();

                // Only proceed if the button has a real position (not hidden/zero)
                if (rect.width === 0) return; // not painted yet, try next frame

                runawayHome = { left: rect.left, top: rect.top };
                curL = rect.left;
                curT = rect.top;

                // Now switch to fixed at that exact spot
                btn.classList.add('runaway');
                btn.style.left = curL + 'px';
                btn.style.top  = curT + 'px';
                return; // skip movement on init frame
            }

            const bW = btn.offsetWidth  || 72;
            const bH = btn.offsetHeight || 32;
            const cx = curL + bW / 2;
            const cy = curT + bH / 2;

            const distToMouse = Math.hypot(mouseX - cx, mouseY - cy);

            const margin = 8;
            const maxL   = window.innerWidth  - bW  - margin;
            const maxT   = window.innerHeight - bH  - margin;

            if (distToMouse < PROXIMITY) {
                // FLEE
                let dx = cx - mouseX;
                let dy = cy - mouseY;
                const len = Math.hypot(dx, dy) || 1;
                curL = Math.max(margin, Math.min(maxL, curL + (dx / len) * FLEE_SPEED));
                curT = Math.max(margin, Math.min(maxT, curT + (dy / len) * FLEE_SPEED));
            } else {
                // GLIDE HOME
                const distToHome = Math.hypot(runawayHome.left - curL, runawayHome.top - curT);
                if (distToHome > SNAP_DIST) {
                    curL += (runawayHome.left - curL) * GLIDE_EASE;
                    curT += (runawayHome.top  - curT) * GLIDE_EASE;
                } else {
                    curL = runawayHome.left;
                    curT = runawayHome.top;
                }
            }

            btn.style.left = curL + 'px';
            btn.style.top  = curT + 'px';
        }

        function onMouseMove(e) { mouseX = e.clientX; mouseY = e.clientY; }
        document.addEventListener('mousemove', onMouseMove);
        rafId = requestAnimationFrame(tick);

        btn._runawayCleanup = () => {
            document.removeEventListener('mousemove', onMouseMove);
            cancelAnimationFrame(rafId);
        };
    }

    function disableRunaway() {
        if (!runawayActive) return;
        runawayActive = false;
        const btn = document.getElementById('like-btn');
        if (btn._runawayCleanup) { btn._runawayCleanup(); delete btn._runawayCleanup; }
        btn.classList.remove('runaway');
        btn.style.left = '';
        btn.style.top  = '';
    }

    // ── Page Load ─────────────────────────────────────────────────────────────
    async function load() {
        if (typeof runNeuralGuard !== 'function') { setTimeout(load, 100); return; }
        await runNeuralGuard();

        const res = await fetch(`${API}/profile/get?email=${encodeURIComponent(target)}&by=${encodeURIComponent(myEmail || '')}`);
        const d = await res.json();

        if (d.disabled) {
            document.body.innerHTML = `<div style="text-align:center;padding:100px;color:white;background:#0d1117;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;"><h1>Profile Disabled</h1><p style="color:#8b949e;">This profile is not available.</p><button onclick="location.href='/dash.html'" style="margin-top:20px;padding:12px 30px;background:#238636;color:white;border:none;border-radius:6px;cursor:pointer;font-size:14px;">Return</button></div>`;
            return;
        }

        const u = d.user;
        currentProfile = u;
        const isOnline = u.sec_ago !== null && u.sec_ago < 60;

        document.getElementById('p-body').style.background = u.bg_style || '#0d1117';
        document.getElementById('avatar-view').src = u.profile_picture;
        document.getElementById('name-view').innerHTML = `${escHtml(u.display_name || u.email)}<span class="status-dot ${isOnline ? 'online' : 'offline'}"></span>`;
        document.getElementById('email-view').innerText = u.email;
        document.getElementById('bio-display').innerHTML = u.bio_html || '<span style="color:#8b949e">Entity record is empty.</span>';
        document.getElementById('badges-view').innerHTML = d.badges.map(b => `<div class="badge" style="border-color:${b.color};color:${b.color}">${b.icon} ${escHtml(b.name)}</div>`).join('');
        if (u.is_admin) document.getElementById('badges-view').innerHTML += `<div class="badge" style="border-color:#d29922;color:#d29922">🛡️ ADMIN</div>`;

        if (localStorage.getItem('ada_admin') === '1') {
            document.getElementById('admin-actions').style.display = 'block';
            document.getElementById('toggle-disabled-btn').innerText = u.profile_disabled ? 'Enable Profile Access' : 'Disable Profile Access';
        }

        if (target === myEmail) {
            document.getElementById('edit-btn').style.display = 'block';
            document.getElementById('in-name').value = u.display_name || '';
            document.getElementById('in-bg').value   = u.bg_style || '';
            document.getElementById('picker-preview').style.backgroundColor = u.bg_style || '#0d1117';
            document.getElementById('bio-edit').innerHTML = u.bio_html || '';
            attachLogic();
        }

        // Load config FIRST so renderReactions knows the overrides before rendering counts,
        // and so applyProfileConfig can show/hide buttons before they ever become visible.
        await loadProfileConfig();
        applyProfileConfig();

        // Show social section only AFTER config applied (prevents button flash)
        document.getElementById('social-section').style.display = 'block';
        if (myEmail) {
            // Load own profile for avatar/name in comments
            try {
                const mr = await fetch(`${API}/profile/get?email=${encodeURIComponent(myEmail)}&by=${encodeURIComponent(myEmail)}`);
                if (mr.ok) { const md = await mr.json(); myProfileData = md.user || null; }
            } catch(e) {}

            document.getElementById('comment-input-area').style.display = 'flex';
            const avatarEl = document.getElementById('commenter-avatar');
            avatarEl.src = myProfileData?.profile_picture || FALLBACK_AVG;
            avatarEl.onerror = () => { avatarEl.src = FALLBACK_AVG; };
        }

        fetchReactions();
        loadComments();
    }

    // ── Reactions ─────────────────────────────────────────────────────────────
    // Uses existing /admin/system/save (POST) and /sync (GET via widgets) endpoints.
    // Key stored in system_data: "react__{target}"

    async function fetchReactions() {
        // Read from system_data via /sync — widgets map contains all system_data rows
        try {
            const r = await fetch(`${API}/sync?email=${encodeURIComponent(myEmail || 'guest')}`);
            if (r.ok) {
                const sd = await r.json();
                const raw = sd.widgets?.['react__' + target];
                if (raw) reactionsData = JSON.parse(raw);
            }
        } catch(e) {}
        renderReactions();
    }

    async function react(type) {
        if (!myEmail) return;
        const likes    = [...(reactionsData.likes    || [])];
        const dislikes = [...(reactionsData.dislikes || [])];

        // Remove from opposite list
        if (type === 'like')    { const i = dislikes.indexOf(myEmail); if (i > -1) dislikes.splice(i, 1); }
        if (type === 'dislike') { const i = likes.indexOf(myEmail);    if (i > -1) likes.splice(i, 1); }

        // Toggle in own list
        const own = type === 'like' ? likes : dislikes;
        const idx = own.indexOf(myEmail);
        if (idx > -1) own.splice(idx, 1); else own.push(myEmail);

        reactionsData = { likes, dislikes };
        renderReactions();

        // Save via existing /admin/system/save endpoint
        await saveSystemData('react__' + target, JSON.stringify(reactionsData));
    }

    function renderReactions() {
        const likes    = reactionsData.likes    || [];
        const dislikes = reactionsData.dislikes || [];
        const cfg = profileConfig;

        // If an override is set, display override + real count so new reactions add to it
        const likeDisplay    = (cfg.likeOverride    !== null && cfg.likeOverride    !== '') ? (cfg.likeOverride    + likes.length)    : likes.length;
        const dislikeDisplay = (cfg.dislikeOverride !== null && cfg.dislikeOverride !== '') ? (cfg.dislikeOverride + dislikes.length) : dislikes.length;

        document.getElementById('like-count').textContent    = likeDisplay;
        document.getElementById('dislike-count').textContent = dislikeDisplay;

        // Toggle state classes WITHOUT wiping react-visible or runaway — those are set by applyProfileConfig
        const likeBtn    = document.getElementById('like-btn');
        const dislikeBtn = document.getElementById('dislike-btn');
        likeBtn.classList.toggle('liked',       likes.includes(myEmail));
        dislikeBtn.classList.toggle('disliked', dislikes.includes(myEmail));
    }

    // ── Comments ──────────────────────────────────────────────────────────────
    // Key stored in system_data: "comments__{target}"

    async function loadComments() {
        try {
            const r = await fetch(`${API}/sync?email=${encodeURIComponent(myEmail || 'guest')}`);
            if (r.ok) {
                const sd = await r.json();
                const raw = sd.widgets?.['comments__' + target];
                commentsData = raw ? JSON.parse(raw) : [];
            }
        } catch(e) { commentsData = []; }
        renderComments();
    }

    function renderComments() {
        const list = document.getElementById('comment-list');
        const isAdmin = localStorage.getItem('ada_admin') === '1';
        if (!Array.isArray(commentsData) || !commentsData.length) {
            list.innerHTML = '<div class="no-comments">No comments yet.</div>';
            return;
        }
        list.innerHTML = commentsData.map((c, i) => {
            const canDelete = myEmail && (myEmail === c.email || isAdmin);
            // Use index as fallback id for old comments that predate the id field
            const cid = c.id || i;
            return `
            <div class="comment-item" data-cid="${escHtml(String(cid))}">
                <img src="${escHtml(c.profile_picture || FALLBACK_AVG)}" alt=""
                     onerror="this.src='${FALLBACK_AVG}'"
                     onclick="location.href='/profile.html?email=${encodeURIComponent(c.email)}'">
                <div class="comment-body">
                    <div class="comment-header">
                        <div class="comment-meta">
                            <a class="comment-author" href="/profile.html?email=${encodeURIComponent(c.email)}">${escHtml(c.display_name || c.email)}</a>
                            <span class="comment-time">${timeAgo(c.created_at)}</span>
                        </div>
                        ${canDelete ? `<button class="comment-delete" onclick="deleteComment('${escHtml(String(cid))}')">🗑 Delete</button>` : ''}
                    </div>
                    <div class="comment-text">${escHtml(c.text)}</div>
                </div>
            </div>`;
        }).join('');
    }

    async function deleteComment(cid) {
        const updated = commentsData.filter((c, i) => {
            const thisCid = c.id || String(i);
            return thisCid !== cid;
        });

        const ok = await saveSystemData('comments__' + target, JSON.stringify(updated));
        if (ok) {
            commentsData = updated;
            renderComments();
        }
    }

    async function submitComment() {
        const textarea = document.getElementById('comment-text');
        const text = textarea.value.trim();
        if (!text || !myEmail) return;

        const newComment = {
            id:              Date.now() + '_' + Math.random().toString(36).slice(2, 7),
            email:           myEmail,
            display_name:    myProfileData?.display_name    || myEmail,
            profile_picture: myProfileData?.profile_picture || FALLBACK_AVG,
            text,
            created_at: new Date().toISOString()
        };

        const updated = [...(Array.isArray(commentsData) ? commentsData : []), newComment].slice(-500);

        const ok = await saveSystemData('comments__' + target, JSON.stringify(updated));

        if (ok) {
            commentsData = updated;
            textarea.value = '';
            textarea.style.height = 'auto';
            document.getElementById('comment-submit-row').classList.remove('show');
            renderComments();
        }
    }

    function autoResize(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }

    function scheduleHideSubmit() {
        setTimeout(() => {
            if (!document.getElementById('comment-text').value.trim())
                document.getElementById('comment-submit-row').classList.remove('show');
        }, 200);
    }

    // ── Profile actions ───────────────────────────────────────────────────────
    async function doSuggest(q) {
        const box = document.getElementById('suggest');
        if (q.length < 2) { box.style.display = 'none'; return; }
        const r = await fetch(`${API}/search/suggest?q=${encodeURIComponent(q)}`);
        const items = await r.json();
        box.innerHTML = items.map(u => `<div class="suggest-item" onclick="location.href='?email=${encodeURIComponent(u.email)}'"><img src="${u.profile_picture || FALLBACK_AVG}"><span>${escHtml(u.display_name || u.email)}</span></div>`).join('');
        box.style.display = items.length ? 'block' : 'none';
    }

    function search() { const q = document.getElementById('sq').value; if (q) location.href = `/profile.html?email=${encodeURIComponent(q)}`; }
    function exec(c, v=null) { if (!isSrc) document.execCommand(c, false, v); }

    function updateBgFromPicker(val) {
        document.getElementById('in-bg').value = val;
        document.getElementById('picker-preview').style.backgroundColor = val;
        document.getElementById('p-body').style.background = val;
    }

    async function toggleProfileStatus() {
        const s = currentProfile.profile_disabled ? 0 : 1;
        await postJSON(`${API}/admin/profile/toggle-status`, { email: target, status: s });
        location.reload();
    }

    function toggleEdit() {
        const ui   = document.getElementById('editor-ui');
        const view = document.getElementById('bio-display');
        const soc  = document.getElementById('social-section');
        const active = ui.style.display === 'flex';
        ui.style.display   = active ? 'none'  : 'flex';
        view.style.display = active ? 'block' : 'none';
        soc.style.display  = active ? 'block' : 'none';
        if (!active) attachLogic();
    }

    function toggleBioSource() {
        isSrc = !isSrc;
        const ed = document.getElementById('bio-edit'), raw = document.getElementById('bio-raw'), btn = document.getElementById('src-btn');
        if (isSrc) { raw.value = ed.innerHTML; ed.style.display = 'none'; raw.style.display = 'block'; btn.innerText = 'Visual View'; }
        else { ed.innerHTML = raw.value; ed.style.display = 'block'; raw.style.display = 'none'; btn.innerText = 'HTML Source'; attachLogic(); }
    }

    function upAvatar(i) {
        if (i.files[0]) { const r = new FileReader(); r.onload = e => document.getElementById('avatar-view').src = e.target.result; r.readAsDataURL(i.files[0]); }
    }

    // ── Image Engine ──────────────────────────────────────────────────────────
    function upBioImg(input) {
        if (!input.files[0]) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const bioBox = document.getElementById('bio-edit');
            const w = document.createElement('div');
            w.className = 'img-wrapper';
            // Always absolute from the start, positioned top-left of bio box
            w.style.cssText = 'position:absolute; left:10px; top:10px; width:200px;';
            w.innerHTML = `<img src="${e.target.result}" style="width:100%;display:block;border-radius:4px;pointer-events:none;"><div class="resizer"></div><div class="remover">×</div>`;
            bioBox.appendChild(w);
            attachLogic();
        };
        reader.readAsDataURL(input.files[0]);
    }

    function attachLogic() {
        const editorUI = document.getElementById('editor-ui');
        if (editorUI.style.display !== 'flex') return;
        const bioBox = document.getElementById('bio-edit');

        // bio-edit must be position:relative so absolute children are scoped to it
        bioBox.style.position = 'relative';

        bioBox.querySelectorAll('.img-wrapper').forEach(w => {
            // Avoid double-binding
            w.onmousedown = null;
            w.onmousedown = (e) => {
                const target = e.target;

                // Remove button
                if (target.classList.contains('remover')) { w.remove(); return; }

                // Select this wrapper
                bioBox.querySelectorAll('.img-wrapper').forEach(x => x.classList.remove('active'));
                w.classList.add('active');
                e.preventDefault();

                const boxRect = bioBox.getBoundingClientRect();

                if (target.classList.contains('resizer')) {
                    // ── Resize ──
                    const startX = e.clientX;
                    const startW = w.offsetWidth;
                    const onMove = (me) => {
                        const newW = Math.max(50, startW + (me.clientX - startX));
                        // Cap so image doesn't overflow box width
                        const maxW = bioBox.clientWidth - parseInt(w.style.left || 0) - 4;
                        w.style.width = Math.min(newW, maxW) + 'px';
                    };
                    const onUp = () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
                    window.addEventListener('mousemove', onMove);
                    window.addEventListener('mouseup', onUp);
                } else {
                    // ── Drag (constrained inside bio-edit) ──
                    const startX   = e.clientX;
                    const startY   = e.clientY;
                    const startL   = parseInt(w.style.left) || 0;
                    const startT   = parseInt(w.style.top)  || 0;
                    const onMove = (me) => {
                        const maxL = bioBox.scrollWidth  - w.offsetWidth  - 4;
                        const maxT = bioBox.scrollHeight - w.offsetHeight - 4;
                        w.style.left = Math.max(0, Math.min(startL + (me.clientX - startX), maxL)) + 'px';
                        w.style.top  = Math.max(0, Math.min(startT + (me.clientY - startY), maxT)) + 'px';
                    };
                    const onUp = () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
                    window.addEventListener('mousemove', onMove);
                    window.addEventListener('mouseup', onUp);
                }
            };
        });

        // Click anywhere else in bio-edit deselects
        bioBox.onmousedown = (e) => {
            if (!e.target.closest('.img-wrapper')) {
                bioBox.querySelectorAll('.img-wrapper').forEach(x => x.classList.remove('active'));
            }
        };
    }

    async function save() {
        document.querySelectorAll('.img-wrapper').forEach(x => x.classList.remove('active'));
        const payload = {
            email: myEmail,
            name:  document.getElementById('in-name').value,
            pic:   document.getElementById('avatar-view').src,
            bg:    document.getElementById('in-bg').value,
            bio:   isSrc ? document.getElementById('bio-raw').value : document.getElementById('bio-edit').innerHTML,
            color: '#c9d1d9'
        };
        await postJSON(`${API}/profile/save`, payload);
        location.reload();
    }

    load();
</script>
