<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | Profile</title>
    <style>
        :root { --bg: #0d1117; --header: #161b22; --border: #30363d; --text: #c9d1d9; --btn-green: #238636; --blue: #58a6ff; --red: #f85149; }
        
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; min-height: 100vh; }
        header { background: var(--header); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }

        .container { max-width: 1100px; margin: 40px auto; display: grid; grid-template-columns: 300px 1fr; gap: 40px; padding: 0 20px; }
        
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .avatar-main { width: 300px; height: 300px; border-radius: 8px; border: 1px solid var(--border); object-fit: cover; background: #0d1117; }
        
        /* Styled Search & Edit Buttons */
        .action-box { background: #161b22; border: 1px solid var(--border); padding: 20px; border-radius: 8px; }
        .btn-github { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #444c56; background: #21262d; color: white; cursor: pointer; font-weight: 600; margin-top: 10px; transition: 0.2s; }
        .btn-github:hover { background: #30363d; border-color: #8b949e; }
        .btn-primary { background: var(--btn-green); border: none; }
        .btn-primary:hover { background: #2ea043; }

        .search-input { width: 100%; padding: 8px; background: #0d1117; border: 1px solid var(--border); color: white; border-radius: 6px; box-sizing: border-box; outline: none; }

        /* Bio/Content Area */
        .bio-area { background: rgba(22,27,34,0.7); border: 1px solid var(--border); border-radius: 8px; padding: 40px; min-height: 400px; position: relative; }
        
        /* Image Logic (Same as Wiki) */
        .img-container { position: absolute; display: inline-block; cursor: move; line-height: 0; border: 2px solid transparent; }
        .img-container.active { border-color: var(--blue); }
        .resize-handle { position: absolute; width: 10px; height: 10px; background: var(--blue); bottom: -5px; right: -5px; cursor: nwse-resize; display: none; }
        .delete-btn { position: absolute; width: 18px; height: 18px; background: var(--red); color: white; top: -9px; right: -9px; cursor: pointer; display: none; border-radius: 50%; font-size: 11px; align-items: center; justify-content: center; }
        .img-container.active .resize-handle, .img-container.active .delete-btn { display: flex; }

        .editor-tools { display: none; flex-direction: column; gap: 15px; margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px; }
        #bio-editor { width: 100%; min-height: 300px; background: #0d1117; border: 1px solid var(--border); border-radius: 8px; padding: 20px; outline: none; position: relative; }
    </style>
</head>
<body id="p-body">

<header>
    <a href="/dash.html" style="color:var(--blue); text-decoration:none; font-weight:600;">← Archive Dashboard</a>
    <div style="font-size:14px; font-weight:bold;" id="header-label">Identity Profile</div>
</header>

<div class="container">
    <div class="sidebar">
        <img id="profile-pic" class="avatar-main" src="">
        <h2 id="display-name" style="margin:0;"></h2>
        <div id="email-label" style="color:#8b949e; font-size:14px;"></div>

        <div class="action-box">
            <div style="font-size:11px; font-weight:bold; color:#8b949e; margin-bottom:8px;">LOCATE IDENTITY</div>
            <input type="text" id="search-q" class="search-input" placeholder="User email...">
            <button class="btn-github" onclick="search()">Search Database</button>
        </div>

        <button id="edit-mode-btn" class="btn-github" style="display:none;" onclick="toggleEdit()">Edit My Profile</button>
    </div>

    <div class="bio-area">
        <div id="bio-view"></div>

        <div id="editor-ui" class="editor-tools">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div>
                    <label style="font-size:12px;">Display Name</label>
                    <input type="text" id="in-name" class="search-input">
                </div>
                <div>
                    <label style="font-size:12px;">Background (Hex or Gradient)</label>
                    <input type="text" id="in-bg" class="search-input" placeholder="#0d1117 or linear-gradient(...)">
                </div>
            </div>
            
            <div style="display:flex; gap:10px; align-items:center;">
                <button class="btn-github" onclick="document.getElementById('file-up').click()">Upload Profile Image</button>
                <input type="file" id="file-up" hidden onchange="handleImgUpload(this)">
                <button class="btn-github" onclick="document.getElementById('file-bio').click()">Add Bio Image</button>
                <input type="file" id="file-bio" hidden onchange="uploadBioImg(this)">
            </div>

            <div id="bio-editor" contenteditable="true"></div>
            <button class="btn-github btn-primary" onclick="save()">Save Identity Record</button>
        </div>
    </div>
</div>

<script>
    const API = "https://ada-relay.andrewdinglearchive.workers.dev";
    const myEmail = localStorage.getItem('ada_user_email');
    const params = new URLSearchParams(window.location.search);
    const targetEmail = params.get('email') || myEmail;

    async function load() {
        const res = await fetch(`${API}/profile/get?email=${encodeURIComponent(targetEmail)}`);
        const data = await res.json();
        const u = data.user;

        document.getElementById('p-body').style.background = u.bg_style || "#0d1117";
        document.getElementById('profile-pic').src = u.profile_picture;
        document.getElementById('display-name').innerText = u.display_name || u.email;
        document.getElementById('email-label').innerText = u.email;
        document.getElementById('bio-view').innerHTML = u.bio_html || "No bio data.";

        if(targetEmail === myEmail) {
            document.getElementById('edit-mode-btn').style.display = 'block';
            document.getElementById('in-name').value = u.display_name || "";
            document.getElementById('in-bg').value = u.bg_style || "";
            document.getElementById('bio-editor').innerHTML = u.bio_html || "";
            attachImageLogic();
        }
    }

    function toggleEdit() {
        const ui = document.getElementById('editor-ui');
        const view = document.getElementById('bio-view');
        const active = ui.style.display === 'flex';
        ui.style.display = active ? 'none' : 'flex';
        view.style.display = active ? 'block' : 'none';
    }

    function handleImgUpload(input) {
        if (input.files[0]) {
            const r = new FileReader();
            r.onload = (e) => { document.getElementById('profile-pic').src = e.target.result; };
            r.readAsDataURL(input.files[0]);
        }
    }

    function uploadBioImg(input) {
        if (input.files[0]) {
            const r = new FileReader();
            r.onload = (e) => {
                const c = document.createElement('div');
                c.className = 'img-container';
                c.style.left = '10px'; c.style.top = '10px'; c.style.width = '150px';
                c.innerHTML = `<img src="${e.target.result}"><div class="resize-handle"></div><div class="delete-btn">×</div>`;
                document.getElementById('bio-editor').appendChild(c);
                attachImageLogic();
            };
            r.readAsDataURL(input.files[0]);
        }
    }

    function attachImageLogic() {
        document.querySelectorAll('.img-container').forEach(el => {
            el.onmousedown = (e) => {
                if (e.target.className === 'delete-btn') { el.remove(); return; }
                document.querySelectorAll('.img-container').forEach(c => c.classList.remove('active'));
                el.classList.add('active');
                let resizing = e.target.className === 'resize-handle';
                let sX = e.clientX, sY = e.clientY, sW = el.offsetWidth, sH = el.offsetHeight, sL = el.offsetLeft, sT = el.offsetTop;
                document.onmousemove = (me) => {
                    if (resizing) { el.style.width = (sW + (me.clientX - sX)) + 'px'; el.style.height = (sH + (me.clientY - sY)) + 'px'; }
                    else { el.style.left = (sL + (me.clientX - sX)) + 'px'; el.style.top = (sT + (me.clientY - sY)) + 'px'; }
                };
                document.onmouseup = () => document.onmousemove = null;
            };
        });
    }

    async function save() {
        document.querySelectorAll('.img-container').forEach(el => el.classList.remove('active'));
        const payload = {
            email: myEmail,
            name: document.getElementById('in-name').value,
            pic: document.getElementById('profile-pic').src,
            bg: document.getElementById('in-bg').value,
            bio: document.getElementById('bio-editor').innerHTML,
            color: "#c9d1d9"
        };
        await fetch(`${API}/profile/save`, { method: 'POST', body: JSON.stringify(payload) });
        location.reload();
    }

    function search() {
        const q = document.getElementById('search-q').value;
        if(q) window.location.href = `/profile.html?email=${encodeURIComponent(q)}`;
    }

    load();
</script>
</body>
</html>
