<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | Identity Profile</title>
    <style>
        :root { --bg: #0d1117; --header: #161b22; --border: #30363d; --text: #c9d1d9; --btn-green: #238636; --blue: #58a6ff; --red: #f85149; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; min-height: 100vh; }
        header { background: var(--header); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }

        .container { max-width: 1200px; margin: 40px auto; display: grid; grid-template-columns: 320px 1fr; gap: 40px; padding: 0 20px; }
        
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .avatar-lg { width: 320px; height: 320px; border-radius: 8px; border: 1px solid var(--border); object-fit: cover; background: #0d1117; }
        
        .action-card { background: #161b22; border: 1px solid var(--border); padding: 20px; border-radius: 8px; }
        .btn-gh { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #444c56; background: #21262d; color: white; cursor: pointer; font-weight: 600; margin-bottom: 10px; transition: 0.2s; }
        .btn-gh:hover { border-color: #8b949e; background: #30363d; }
        .btn-primary { background: var(--btn-green); border: none; }

        /* The Bio Display/Editor */
        .bio-container { background: rgba(22, 27, 34, 0.8); border: 1px solid var(--border); border-radius: 8px; padding: 40px; min-height: 500px; position: relative; }
        
        .img-wrapper { position: absolute; cursor: move; line-height: 0; border: 2px solid transparent; }
        .img-wrapper img { width: 100%; height: 100%; pointer-events: none; }
        .img-wrapper.active { border-color: var(--blue); }
        .resizer { position: absolute; width: 10px; height: 10px; background: var(--blue); right: -5px; bottom: -5px; cursor: nwse-resize; display: none; }
        .remover { position: absolute; width: 18px; height: 18px; background: var(--red); color: white; right: -9px; top: -9px; cursor: pointer; display: none; border-radius: 50%; align-items: center; justify-content: center; font-size: 11px; }
        .img-wrapper.active .resizer, .img-wrapper.active .remover { display: flex; }

        .editor-panel { display: none; flex-direction: column; gap: 15px; border-top: 1px solid var(--border); padding-top: 25px; margin-top: 25px; }
        #bio-edit { width: 100%; min-height: 350px; background: #0d1117; border: 1px solid var(--border); border-radius: 8px; padding: 20px; outline: none; position: relative; overflow: visible; }
        #bio-raw { width: 100%; min-height: 350px; background: #0d1117; color: #79c0ff; border: 1px solid var(--border); border-radius: 8px; padding: 20px; font-family: monospace; display: none; outline: none; }

        .tool-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .inp { background: #0d1117; border: 1px solid var(--border); color: white; padding: 8px; border-radius: 6px; outline: none; }
    </style>
</head>
<body id="main-body">

<header>
    <a href="/dash.html" style="color:var(--blue); text-decoration:none; font-weight:600;">← Archive Dashboard</a>
    <div style="font-weight:bold;">Identity Record</div>
</header>

<div class="container">
    <div class="sidebar">
        <img id="avatar-view" class="avatar-lg" src="">
        <h2 id="name-view" style="margin:0;"></h2>
        <div id="email-view" style="color:#8b949e; font-size:14px;"></div>

        <div class="action-card">
            <div style="font-size:11px; font-weight:bold; color:#8b949e; margin-bottom:10px;">LOCATE IDENTITY</div>
            <input type="text" id="sq" class="inp" style="width:100%; margin-bottom:10px;" placeholder="Email address...">
            <button class="btn-gh" onclick="search()">Search Database</button>
            <button id="edit-btn" class="btn-gh" style="display:none;" onclick="toggleEdit()">Edit Identity Profile</button>
        </div>
    </div>

    <div class="bio-container">
        <div id="bio-display"></div>

        <div id="editor-ui" class="editor-panel">
            <div class="tool-row">
                <input type="text" id="in-name" class="inp" placeholder="Display Name">
                <input type="text" id="in-bg" class="inp" style="flex:1" placeholder="Hex Color or linear-gradient(...)">
                <input type="color" id="bg-picker" onchange="document.getElementById('in-bg').value = this.value">
            </div>

            <div class="tool-row">
                <button class="btn-gh" style="width:auto" onclick="exec('bold')">B</button>
                <button class="btn-gh" style="width:auto" onclick="exec('italic')">I</button>
                <input type="color" onchange="exec('foreColor', this.value)" title="Text Color">
                <button class="btn-gh" style="width:auto" onclick="document.getElementById('f-pic').click()">Upload Avatar</button>
                <button class="btn-gh" style="width:auto" onclick="document.getElementById('f-bio').click()">Add Bio Image</button>
                <button class="btn-gh" style="width:auto" onclick="toggleBioSource()" id="src-btn">HTML Source</button>
            </div>
            
            <input type="file" id="f-pic" hidden onchange="upAvatar(this)">
            <input type="file" id="f-bio" hidden onchange="upBioImg(this)">

            <div id="bio-edit" contenteditable="true"></div>
            <textarea id="bio-raw"></textarea>

            <button class="btn-gh btn-primary" onclick="save()">Save Profile Changes</button>
        </div>
    </div>
</div>

<script>
    const API = "https://ada-relay.andrewdinglearchive.workers.dev";
    const myEmail = localStorage.getItem('ada_user_email');
    const params = new URLSearchParams(window.location.search);
    const target = params.get('email') || myEmail;
    let isSrc = false;

    async function load() {
        const res = await fetch(`${API}/profile/get?email=${encodeURIComponent(target)}`);
        const d = await res.json();
        const u = d.user;

        document.getElementById('main-body').style.background = u.bg_style || "#0d1117";
        document.getElementById('avatar-view').src = u.profile_picture;
        document.getElementById('name-view').innerText = u.display_name || u.email;
        document.getElementById('email-view').innerText = u.email;
        document.getElementById('bio-display').innerHTML = u.bio_html || "Record is empty.";

        if(target === myEmail) {
            document.getElementById('edit-btn').style.display = 'block';
            document.getElementById('in-name').value = u.display_name || "";
            document.getElementById('in-bg').value = u.bg_style || "";
            document.getElementById('bio-edit').innerHTML = u.bio_html || "";
            attachLogic();
        }
    }

    function toggleEdit() {
        const ui = document.getElementById('editor-ui');
        const view = document.getElementById('bio-display');
        const active = ui.style.display === 'flex';
        ui.style.display = active ? 'none' : 'flex';
        view.style.display = active ? 'block' : 'none';
    }

    function upAvatar(i) { if(i.files[0]){ const r = new FileReader(); r.onload=(e)=>document.getElementById('avatar-view').src=e.target.result; r.readAsDataURL(i.files[0]); }}
    
    function upBioImg(i) {
        if(i.files[0]){
            const r = new FileReader();
            r.onload=(e)=>{
                const w = document.createElement('div');
                w.className='img-wrapper'; w.style.width='150px'; w.style.left='10px'; w.style.top='10px';
                w.innerHTML=`<img src="${e.target.result}"><div class="resizer"></div><div class="remover">×</div>`;
                document.getElementById('bio-edit').appendChild(w);
                attachLogic();
            };
            r.readAsDataURL(i.files[0]);
        }
    }

    function toggleBioSource() {
        isSrc = !isSrc;
        const ed = document.getElementById('bio-edit'), raw = document.getElementById('bio-raw');
        if(isSrc){ raw.value=ed.innerHTML; ed.style.display='none'; raw.style.display='block'; }
        else { ed.innerHTML=raw.value; ed.style.display='block'; raw.style.display='none'; attachLogic(); }
    }

    function attachLogic() {
        document.querySelectorAll('.img-wrapper').forEach(w => {
            w.onmousedown = (e) => {
                if(e.target.className === 'remover') { w.remove(); return; }
                document.querySelectorAll('.img-wrapper').forEach(x => x.classList.remove('active'));
                w.classList.add('active');
                let res = e.target.className === 'resizer', sX = e.clientX, sY = e.clientY, sW = w.offsetWidth, sL = w.offsetLeft, sT = w.offsetTop;
                function move(me) {
                    if(res){ w.style.width = (sW + (me.clientX - sX)) + 'px'; w.style.height = 'auto'; }
                    else { w.style.left = (sL + (me.clientX - sX)) + 'px'; w.style.top = (sT + (me.clientY - sY)) + 'px'; }
                }
                function stop() { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', stop); }
                window.addEventListener('mousemove', move); window.addEventListener('mouseup', stop);
            };
        });
    }

    async function save() {
        document.querySelectorAll('.img-wrapper').forEach(x => x.classList.remove('active'));
        const payload = {
            email: myEmail, name: document.getElementById('in-name').value,
            pic: document.getElementById('avatar-view').src, bg: document.getElementById('in-bg').value,
            bio: isSrc ? document.getElementById('bio-raw').value : document.getElementById('bio-edit').innerHTML, color: "#c9d1d9"
        };
        await fetch(`${API}/profile/save`, { method: 'POST', body: JSON.stringify(payload) });
        location.reload();
    }

    function search() { const q = document.getElementById('sq').value; if(q) location.href=`/profile.html?email=${encodeURIComponent(q)}`; }
    function exec(c, v=null) { document.execCommand(c, false, v); }
    load();
</script>
</body>
</html>
