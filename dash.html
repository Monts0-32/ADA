<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | Dashboard</title>
    <style>
        :root { --bg: #0d1117; --header: #161b22; --border: #30363d; --text: #c9d1d9; --btn-green: #238636; }
        body { background-color: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--header); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 600; color: #f0f6fc; text-decoration: none; }
        .container { display: flex; flex: 1; overflow: hidden; }
        .gallery { flex: 2; padding: 24px; overflow-y: auto; border-right: 1px solid var(--border); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; }
        .card { background: #161b22; border: 1px solid var(--border); border-radius: 6px; padding: 16px; position: relative; }
        .card img { width: 100%; height: 120px; border-radius: 4px; object-fit: cover; background: #0d1117; margin-bottom: 12px; }
        .lock-badge { position: absolute; top: 10px; right: 10px; font-size: 11px; color: #f85149; display: none; background: rgba(248,81,73,0.1); padding: 2px 6px; border-radius: 4px; border: 1px solid #f85149; }
        .chat-panel { flex: 1; display: flex; flex-direction: column; width: 350px; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 8px 12px; border-radius: 12px; font-size: 13px; line-height: 1.4; word-wrap: break-word; }
        .msg.other { background: #21262d; align-self: flex-start; border: 1px solid var(--border); }
        .msg.me { background: #238636; color: white; align-self: flex-end; }
        .chat-input-area { padding: 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
        input#chat-input { flex: 1; background: #0d1117; border: 1px solid var(--border); border-radius: 6px; color: white; padding: 8px; }
        .btn { padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; background: #21262d; color: white; font-size: 12px; text-decoration: none; }
        .btn-green { background: var(--btn-green); border: none; }
        .admin-controls { display: none; gap: 8px; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:20px;">
        <a href="/" class="logo">ADA Archive</a>
        <div id="admin-tools" class="admin-controls">
            <a href="/account-creator.html" class="btn">Account Creator</a>
            <a href="/account-manager.html" class="btn">Account Manager</a>
        </div>
    </div>
    <div style="display:flex; gap:10px; align-items:center;">
        <span id="user-pill" style="font-size:12px; border:1px solid var(--border); padding:2px 8px; border-radius:10px;"></span>
        <button class="btn" onclick="logout()">Logout</button>
    </div>
</header>

<div class="container">
    <div class="gallery">
        <h2>Archive Content</h2>
        <div class="grid">
            <div class="card">
                <span class="lock-badge" id="lock-page1">🔒 Locked</span>
                <img src="..." alt="Archive 1">
                <h3>Max Lore</h3>
                <button class="btn btn-green" onclick="navTo('page1')">View Gallery</button>
                <button class="btn admin-controls" style="margin-top:5px; width:100%" onclick="toggleLock('page1')">Toggle Lock</button>
            </div>
            <div class="card">
                <span class="lock-badge" id="lock-page1">🔒 Locked</span>
                <img src="..." alt="Archive 1">
                <h3>Internal Content</h3>
                <button class="btn btn-green" onclick="navTo('page1')">View Gallery</button>
                <button class="btn admin-controls" style="margin-top:5px; width:100%" onclick="toggleLock('page1')">Toggle Lock</button>
            </div>
            <div class="card">
                <span class="lock-badge" id="lock-page1">🔒 Locked</span>
                <img src="..." alt="Archive 1">
                <h3>Comming Soon...</h3>
                <button class="btn btn-green" onclick="navTo('page1')">View Gallery</button>
                <button class="btn admin-controls" style="margin-top:5px; width:100%" onclick="toggleLock('page1')">Toggle Lock</button>
            </div>
        </div>
    </div>

    <div class="chat-panel">
        <div id="chat-messages"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Comms...">
            <button class="btn btn-green" onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
    const API = "https://ada-relay.andrewdinglearchive.workers.dev";
    const email = localStorage.getItem('ada_user_email');
    const isAdmin = localStorage.getItem('ada_admin') === '1';

    if (!email) window.location.href = '/login.html';
    document.getElementById('user-pill').innerText = email;

    if (isAdmin) document.getElementById('admin-tools').style.display = 'flex';

    async function loadData() {
        const res = await fetch(`${API}/sync?email=${encodeURIComponent(email)}`);
        const data = await res.json();
        
        // --- THE BLOCK CHECK ---
        // Checks if current filename is in the blocked list
        const path = window.location.pathname.split("/").pop() || "index.html";
        if (data.blocks.includes(path) || data.blocks.includes("ALL")) {
            window.location.href = "/blocked.html";
            return;
        }

        // Render Chat...
        const chatBox = document.getElementById('chat-messages');
        chatBox.innerHTML = data.messages.map(m => `
            <div class="msg ${m.user_email === email ? 'me' : 'other'}">
                <span style="font-size:9px; opacity:0.6; display:block;">${m.user_email}</span>
                ${m.content}
            </div>`).join('');

        // Render Page Locks
        data.locks.forEach(l => {
            const el = document.getElementById(`lock-${l.page_id}`);
            if (el) el.style.display = l.is_locked ? 'block' : 'none';
        });
    }

    // --- RESTORED TOGGLE LOCK FUNCTION ---
    async function toggleLock(pageId) {
        if (!isAdmin) return;
        await fetch(`${API}/admin/lock`, {
            method: 'POST',
            body: JSON.stringify({ page_id: pageId })
        });
        loadData(); // Refresh UI
    }

    function navTo(page) { window.location.href = `/${page}.html`; }
    function logout() { localStorage.clear(); window.location.href = '/login.html'; }
    setInterval(loadData, 3000);
    loadData();
</script>
</body>
</html>
