<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | Dashboard</title>
    <style>
        :root { --bg: #0d1117; --header: #161b22; --border: #30363d; --text: #c9d1d9; --btn-green: #238636; }
        body { background-color: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: var(--header); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 600; color: #f0f6fc; text-decoration: none; }
        .container { display: flex; flex: 1; overflow: hidden; }
        .gallery { flex: 2; padding: 24px; overflow-y: auto; border-right: 1px solid var(--border); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; }
        .card { background: #161b22; border: 1px solid var(--border); border-radius: 6px; padding: 16px; position: relative; }
        .card img { width: 100%; height: 120px; border-radius: 4px; object-fit: cover; background: #0d1117; margin-bottom: 12px; }
        .lock-badge { position: absolute; top: 10px; right: 10px; font-size: 11px; color: #f85149; display: none; background: rgba(248,81,73,0.1); padding: 2px 6px; border-radius: 4px; border: 1px solid #f85149; }
        .chat-panel { flex: 1; display: flex; flex-direction: column; width: 350px; background: #0d1117; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 8px 12px; border-radius: 12px; font-size: 13px; line-height: 1.4; word-wrap: break-word; }
        .msg.other { background: #21262d; align-self: flex-start; border: 1px solid var(--border); }
        .msg.me { background: #238636; color: white; align-self: flex-end; }
        .chat-input-area { padding: 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
        input#chat-input { flex: 1; background: #0d1117; border: 1px solid var(--border); border-radius: 6px; color: white; padding: 8px; outline: none; }
        .btn { padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; background: #21262d; color: white; font-size: 12px; text-decoration: none; text-align: center; }
        .btn-green { background: var(--btn-green); border: none; width: 100%; }
        .btn-disabled { background-color: #21262d !important; color: #8b949e !important; cursor: not-allowed !important; }
        .user-pill { display: flex; align-items: center; gap: 8px; background: #21262d; border: 1px solid var(--border); padding: 3px 12px; border-radius: 20px; text-decoration: none; color: var(--text); font-size: 12px; }
        .user-pill img { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:20px;">
        <a href="/" class="logo">ADA Archive</a>
        <div id="admin-tools" style="display:none; gap:8px;">
            <a href="/account-creator.html" class="btn">Creator</a>
            <a href="/account-manager.html" class="btn">Manager</a>
        </div>
    </div>
    <div style="display:flex; gap:10px; align-items:center;">
        <a href="/profile.html" class="user-pill">
            <img id="pill-avatar" src="https://via.placeholder.com/20">
            <span id="pill-name">User</span>
        </a>
        <button class="btn" onclick="logout()">Logout</button>
    </div>
</header>

<div class="container">
    <div class="gallery">
        <h2>Archive Records</h2>
        <div class="grid">
            <div class="card">
                <span class="lock-badge" id="lock-page1">🔒 Locked</span>
                <img src="https://www.image2url.com/r2/default/images/1776505998723-00163f13-07b6-4401-bf53-a51adc97d574.png" style="width:200px; height:120px">
                <h3>Wiki Sector</h3>
                <button class="btn btn-green" id="nav-page1">Access Archives</button>
                <button class="btn admin-only" style="margin-top:8px; display:none;" onclick="toggleLock('page1')">Toggle Lock</button>
            </div>
            <!-- Additional partitions here -->
        </div>
    </div>
    <div class="chat-panel">
        <div id="chat-messages"></div>
        <form class="chat-input-area" onsubmit="event.preventDefault(); sendMessage();">
            <input type="text" id="chat-input" placeholder="Comms..." autocomplete="off">
            <button type="submit" class="btn btn-green" style="width:auto">Send</button>
        </form>
    </div>
</div>

<script>
    const API = "https://ada-relay.andrewdinglearchive.workers.dev";
    const email = localStorage.getItem('ada_user_email');
    if (!email) window.location.href = '/login.html';

    async function loadData() {
        const res = await fetch(`${API}/sync?email=${encodeURIComponent(email)}`);
        const data = await res.json();
        const isAdmin = data.user.is_admin === 1;

        // Security Path Check
        if (data.blocks.includes('dash.html') || data.blocks.includes('ALL')) window.location.href = '/blocked.html';

        // Update UI
        document.getElementById('pill-name').innerText = data.user.display_name || data.user.email;
        if(data.user.profile_picture) document.getElementById('pill-avatar').src = data.user.profile_picture;
        if(isAdmin) {
            document.getElementById('admin-tools').style.display = 'flex';
            document.querySelectorAll('.admin-only').forEach(e => e.style.display = 'block');
        }

        // Wiki Permission Check
        const wikiBtn = document.getElementById('nav-page1');
        const hasWikiAccess = isAdmin || data.permissions.includes('wiki_access');
        if(!hasWikiAccess) {
            wikiBtn.classList.add('btn-disabled'); wikiBtn.innerText = "Restricted"; wikiBtn.onclick = () => alert("Permission required.");
        } else {
            wikiBtn.classList.remove('btn-disabled'); wikiBtn.innerText = "Access Selector"; wikiBtn.onclick = () => window.location.href = '/wikiselector.html';
        }

        // Chat & Locks
        document.getElementById('chat-messages').innerHTML = data.messages.map(m => `<div class="msg ${m.user_email === email ? 'me' : 'other'}"><span style="font-size:9px;opacity:0.6;display:block">${m.user_email}</span>${m.content}</div>`).join('');
        data.locks.forEach(l => {
            const b = document.getElementById(`lock-${l.page_id}`); if(b) b.style.display = l.is_locked ? 'block' : 'none';
        });
    }

    async function sendMessage() {
        const i = document.getElementById('chat-input'); if(!i.value) return;
        await fetch(`${API}/chat`, { method: 'POST', body: JSON.stringify({ email, content: i.value }) });
        i.value = ''; loadData();
    }

    async function toggleLock(id) { await fetch(`${API}/admin/lock`, { method: 'POST', body: JSON.stringify({ page_id: id }) }); loadData(); }
    function logout() { localStorage.clear(); window.location.href = '/login.html'; }
    setInterval(loadData, 3000); loadData();
</script>
</body>
</html>
