<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | Dashboard</title>
    <style>
        :root { --bg: #0d1117; --header: #161b22; --border: #30363d; --text: #c9d1d9; --btn-green: #238636; --blue: #58a6ff; }
        
        /* THEMED SCROLLBAR */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 5px; }

        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: var(--header); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 600; color: #f0f6fc; text-decoration: none; font-size: 16px; }
        
        .user-pill { display: flex; align-items: center; gap: 8px; background: #21262d; border: 1px solid var(--border); padding: 4px 12px; border-radius: 20px; text-decoration: none; color: var(--text); font-size: 12px; transition: 0.2s; }
        .user-pill:hover { border-color: #8b949e; }
        .user-pill img { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; }

        .container { max-width: 1200px; margin: 0 auto; width: 100%; padding: 20px; box-sizing: border-box; }

        /* WIDGETS */
        .widgets-row { display: grid; grid-template-columns: 1fr 350px; gap: 20px; margin-bottom: 30px; }
        .widget-box { background: #161b22; border: 1px solid var(--border); border-radius: 8px; padding: 20px; position: relative; }
        .widget-title { font-size: 11px; font-weight: bold; color: #8b949e; text-transform: uppercase; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }

        /* THEMED EDIT BUTTONS */
        .btn-edit { background: #21262d; border: 1px solid var(--border); color: #8b949e; padding: 3px 10px; border-radius: 6px; font-size: 10px; cursor: pointer; transition: 0.2s; }
        .btn-edit:hover { border-color: var(--blue); color: var(--blue); }

        /* Forecast */
        .forecast-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .day-card { text-align: center; background: #0d1117; border: 1px solid var(--border); padding: 10px; border-radius: 6px; }
        .day-img { width: 30px; height: 30px; margin: 8px auto; display: block; object-fit: contain; }
        .day-status { font-size: 10px; color: var(--blue); font-family: monospace; }

        /* Calendar */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; font-size: 11px; }
        .cal-today { background: var(--blue); color: #000; font-weight: bold; border-radius: 4px; }

        /* Admin Overlay */
        .edit-overlay { display: none; background: rgba(13, 17, 23, 0.95); position: absolute; top:0; left:0; width:100%; height:100%; z-index: 10; border-radius: 8px; padding: 20px; box-sizing: border-box; }
        .edit-input-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        .edit-input-group input { background: #0d1117; border: 1px solid var(--border); color: white; padding: 5px; font-size: 11px; border-radius: 4px; }

        /* Standard Controls */
        .btn { padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; background: #21262d; color: white; font-size: 13px; font-weight: 600; text-decoration: none; text-align: center; display: block; }
        .btn-green { background: var(--btn-green); border: none; }
        .admin-only { display: none; }
    </style>
</head>
<body>

<!-- PASTE THE NEURAL GUARD HTML/CSS/JS HERE -->

<header>
    <div style="display:flex; align-items:center; gap:20px;">
        <a href="/" class="logo">ADA Archive</a>
        <div id="admin-tools" style="display:none; gap:8px;">
            <a href="/account-creator.html" class="btn">Creator</a>
            <a href="/account-manager.html" class="btn">Manager</a>
        </div>
    </div>
    <div style="display:flex; gap:10px; align-items:center;">
        <a href="/profile.html" class="user-pill">
            <img id="pill-avatar" src="">
            <span id="pill-name">...</span>
        </a>
        <button class="btn" style="color:#f85149" onclick="logout()">Logout</button>
    </div>
</header>

<div class="container">
    
    <div class="widgets-row">
        <!-- FORECAST -->
        <div class="widget-box">
            <div class="widget-title">
                System Load Forecast
                <button class="admin-only btn-edit" onclick="toggleEdit('forecast')">Edit Forecast</button>
            </div>
            <div class="forecast-grid" id="forecast-display"></div>
            
            <div class="edit-overlay" id="edit-forecast">
                <div id="forecast-edit-list" style="max-height: 200px; overflow-y:auto;"></div>
                <button class="btn btn-green" style="margin-top:10px; font-size:11px;" onclick="saveForecast()">Save Forecast Data</button>
            </div>
        </div>

        <!-- CALENDAR -->
        <div class="widget-box">
            <div class="widget-title">
                Archive Calendar
                <button class="admin-only btn-edit" onclick="toggleEdit('calendar')">Edit Note</button>
            </div>
            <div class="calendar-grid" id="calendar-display"></div>
            <div id="calendar-note" style="font-size:11px; color:#8b949e; margin-top:10px; font-style:italic;"></div>
            
            <div class="edit-overlay" id="edit-calendar">
                <textarea id="in-cal-note" style="width:100%; height:100px; background:#000; color:white; border:1px solid var(--border); border-radius:6px;"></textarea>
                <button class="btn btn-green" style="margin-top:10px; font-size:11px;" onclick="saveCalendarNote()">Update System Note</button>
            </div>
        </div>
    </div>

    <!-- MAIN CARDS -->
    <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:20px;">
        <div class="widget-box">
            <img src="https://via.placeholder.com/300x160?text=Wiki" style="width:100%; border-radius:4px; margin-bottom:15px;">
            <h3 style="margin:0; color:var(--blue);">Wiki Network</h3>
            <button class="btn btn-green" style="margin-top:15px;" onclick="location.href='/wikiselector.html'">Launch Archives</button>
        </div>
    </div>
</div>

<script>
    const API = "https://ada-relay.andrewdinglearchive.workers.dev";
    let forecastJSON = {};

    async function start() {
        // --- RUN NEURAL GUARD ---
        const data = await initGuard(); // No specific tag needed for dash
        if(!data) return;

        // Populate User Info
        document.getElementById('pill-name').innerText = data.user.display_name || data.user.email;
        document.getElementById('pill-avatar').src = data.user.profile_picture;

        if (data.user.is_admin) {
            document.getElementById('admin-tools').style.display = 'flex';
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
        }

        // Render Widgets
        forecastJSON = JSON.parse(data.widgets.forecast || "{}");
        renderForecast();
        renderCalendar();
        document.getElementById('calendar-note').innerText = data.widgets.calendar_note || "Status: Nominal.";
        document.getElementById('in-cal-note').value = data.widgets.calendar_note || "";
    }

    function renderForecast() {
        const days = ['mon', 'tue', 'wed', 'thu', 'fri'];
        const display = document.getElementById('forecast-display');
        const editor = document.getElementById('forecast-edit-list');
        display.innerHTML = ''; editor.innerHTML = '';

        days.forEach(d => {
            const dayData = forecastJSON[d] || { text: "Stable", img: "" };
            display.innerHTML += `
                <div class="day-card">
                    <div style="font-size:10px; font-weight:bold; color:#8b949e;">${d.toUpperCase()}</div>
                    <img src="${dayData.img || 'https://via.placeholder.com/30?text=?'}" class="day-img">
                    <div class="day-status">${dayData.text}</div>
                </div>`;
            
            editor.innerHTML += `
                <div class="edit-input-group">
                    <label style="font-size:10px; color:var(--blue)">${d.toUpperCase()}</label>
                    <input type="text" id="edit-text-${d}" value="${dayData.text}" placeholder="Status Text">
                    <input type="text" id="edit-img-${d}" value="${dayData.img}" placeholder="Icon Image URL (or Base64)">
                </div>`;
        });
    }

    function renderCalendar() {
        const display = document.getElementById('calendar-display');
        const now = new Date();
        const today = now.getDate();
        const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
        let html = ['S','M','T','W','T','F','S'].map(d => `<div style="color:#8b949e; font-weight:bold;">${d}</div>`).join('');
        for(let i=1; i<=daysInMonth; i++) {
            html += `<div class="${i === today ? 'cal-today' : ''}" style="padding:4px;">${i}</div>`;
        }
        display.innerHTML = html;
    }

    function toggleEdit(id) {
        const el = document.getElementById(`edit-${id}`);
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    async function saveForecast() {
        const days = ['mon', 'tue', 'wed', 'thu', 'fri'];
        let updated = {};
        days.forEach(d => {
            updated[d] = {
                text: document.getElementById(`edit-text-${d}`).value,
                img: document.getElementById(`edit-img-${d}`).value
            };
        });
        await fetch(`${API}/admin/system/save`, {
            method: 'POST',
            body: JSON.stringify({ id: 'forecast', content: JSON.stringify(updated) })
        });
        location.reload();
    }

    async function saveCalendarNote() {
        const content = document.getElementById('in-cal-note').value;
        await fetch(`${API}/admin/system/save`, {
            method: 'POST',
            body: JSON.stringify({ id: 'calendar_note', content })
        });
        location.reload();
    }

    function logout() { localStorage.clear(); location.href='/login.html'; }

    start();
</script>
</body>
</html>
