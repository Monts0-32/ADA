<style>
    /* ... existing body and layout styles ... */

    /* CUSTOM SCROLLBAR (Theme Matched) */
    #chatMessages::-webkit-scrollbar {
        width: 8px;
    }
    #chatMessages::-webkit-scrollbar-track {
        background: #0d1117;
    }
    #chatMessages::-webkit-scrollbar-thumb {
        background: #30363d;
        border-radius: 10px;
    }
    #chatMessages::-webkit-scrollbar-thumb:hover {
        background: #484f58;
    }

    /* CHAT PANEL REFINEMENT */
    .chat-panel { 
        flex: 0 0 380px; 
        background-color: #161b22; 
        border: 1px solid #30363d; 
        border-radius: 8px; 
        display: flex; 
        flex-direction: column; 
        height: 550px; 
        overflow: hidden;
    }

    #chatMessages { 
        flex: 1; 
        padding: 15px; 
        overflow-y: auto; 
        display: flex; 
        flex-direction: column; 
        gap: 12px; /* Space between bubbles */
        background-color: #0d1117; /* Slightly darker for contrast */
    }

    /* CHAT BUBBLES */
    .chat-msg { 
        max-width: 85%;
        padding: 10px 14px; 
        border-radius: 18px; 
        font-size: 13px; 
        line-height: 1.4;
        position: relative;
        background: #21262d; 
        border: 1px solid #30363d;
        align-self: flex-start; /* Messages stay left */
        color: #e6edf3;
        word-wrap: break-word;
    }

    /* Style for YOUR messages (Optional - aligns them to the right) */
    .chat-msg.is-me {
        align-self: flex-end;
        background: #238636; /* Success green */
        border-color: #2ea043;
        color: white;
    }

    .chat-msg b { 
        display: block; 
        font-size: 10px; 
        margin-bottom: 4px; 
        color: #7ee787; 
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .chat-msg.is-me b {
        color: #aff5b4;
        text-align: right;
    }
</style>

<script>
    /* ... existing init and handleSendMessage functions ... */

    function appendMsg(msg) {
        const container = document.getElementById('chatMessages');
        const div = document.createElement('div');
        
        // Check if the message is from the current user
        const isMe = msg.user_email === userEmail;
        
        div.className = isMe ? 'chat-msg is-me' : 'chat-msg';
        
        // Construct the bubble
        div.innerHTML = `
            <b>${isMe ? 'You' : msg.user_email}</b> 
            <span>${msg.message}</span>
        `;
        
        container.appendChild(div);
        
        // Smooth scroll to bottom
        container.scrollTo({
            top: container.scrollHeight,
            behavior: 'smooth'
        });
    }
</script>
