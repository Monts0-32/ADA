<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | Archive Dashboard</title>
    
    <!-- MASTER SCRIPTS -->
    <script src="/uplink.js"></script>
    <script src="/header-engine.js"></script>

    <style>
        :root { 
            --bg: #0d1117; --header: #161b22; --border: #30363d; 
            --text: #c9d1d9; --btn-green: #238636; --blue: #58a6ff; --red: #f85149; 
        }
        
        /* THEMED SCROLLBAR */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #444c56; }

        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        .container { max-width: 1200px; margin: 0 auto; width: 100%; padding: 30px 20px; box-sizing: border-box; }

        /* WIDGETS LAYOUT */
        .widgets-row { display: grid; grid-template-columns: 1fr 350px; gap: 20px; margin-bottom: 40px; }
        .widget-box { background: #161b22; border: 1px solid var(--border); border-radius: 8px; padding: 20px; position: relative; }
        .widget-title { font-size: 11px; font-weight: bold; color: #8b949e; text-transform: uppercase; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; letter-spacing: 0.5px; }

        /* Forecast Styles */
        .forecast-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .day-card { text-align: center; background: #0d1117; border: 1px solid var(--border); padding: 10px; border-radius: 6px; }
        .day-name { font-size: 10px; color: #8b949e; font-weight: bold; margin-bottom: 5px; }
        .day-img { width: 32px; height: 32px; margin: 5px auto; display: block; object-fit: contain; }
        .day-status { font-size: 10px; color: var(--blue); font-family: 'SFMono-Regular', monospace; margin-top: 5px; }

        /* Calendar Styles */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; font-size: 11px; }
        .cal-header { color: #8b949e; font-weight: bold; padding-bottom: 5px; }
        .cal-date { padding: 5px; border-radius: 4px; }
        .cal-today { background: var(--blue); color: #000; font-weight: bold; }
        .cal-note { font-size: 11px; color: #8b949e; margin-top: 15px; font-style: italic; border-top: 1px solid var(--border); padding-top: 12px; line-height: 1.4; }

        /* Admin Overlays */
        .edit-overlay { display: none; background: rgba(13, 17, 23, 0.98); position: absolute; top:0; left:0; width:100%; height:100%; z-index: 50; border-radius: 8px; padding: 20px; box-sizing: border-box; border: 1px solid var(--blue); }
        .edit-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
        .edit-group label { font-size: 9px; color: var(--blue); font-weight: bold; }
        .edit-group input { background: #0d1117; border: 1px solid var(--border); color: white; padding: 6px; font-size: 11px; border-radius: 4px; outline: none; }
        .edit-group input:focus { border-color: var(--blue); }

        /* Resource Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
        .card { background: #161b22; border: 1px solid var(--border); border-radius: 8px; padding: 20px; position: relative; transition: 0.2s; }
        .card:hover { border-color: #8b949e; }
        .card-img-placeholder { width: 100%; height: 160px; border-radius: 4px; background: #0d1117; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; color: #30363d; font-weight: bold; border: 1px solid var(--border); font-size: 12px; letter-spacing: 2px; }
        .card h3 { margin: 0 0 10px 0; font-size: 18px; color: var(--blue); }
        .card p { font-size: 13px; color: #8b949e; line-height: 1.5; margin-bottom: 20px; }

        /* Buttons */
        .btn-action { padding: 10px 16px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; background: #21262d; color: white; font-size: 13px; font-weight: 600; text-decoration: none; text-align: center; display: block; width: 100%; box-sizing: border-box; transition: 0.2s; }
        .btn-green { background: var(--btn-green); border: none; }
        .btn-green:hover { background: #2ea043; }
        .btn-edit { background: #21262d; border: 1px solid var(--border); color: #8b949e; padding: 2px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; }
        .btn-edit:hover { color: var(--blue); border-color: var(--blue); }
        .btn-disabled { opacity: 0.4; cursor: not-allowed !important; }

        .lock-badge { position: absolute; top: 15px; right: 15px; font-size: 10px; color: var(--red); display: none; background: rgba(248,81,73,0.1); padding: 3px 8px; border-radius: 4px; border: 1px solid var(--red); }
        .admin-only { display: none; }
    </style>
</head>

                </div>

        </div>

        <!-- CALENDAR WIDGET -->
        <div class="widget-box">
            <div class="widget-title">
                Archive Calendar
                <button class="btn-edit admin-only" onclick="toggleOverlay('edit-calendar')">Edit Note</button>
            </div>
            <div class="calendar-grid" id="calendar-display"></div>
            <div id="calendar-note-display" class="cal-note"></div>
            
            <!-- Edit Overlay -->
            <div class="edit-overlay" id="edit-calendar">
                <label style="font-size:10px; color:var(--blue); font-weight:bold; display:block; margin-bottom:5px;">GLOBAL SYSTEM NOTE</label>
                <textarea id="in-cal-note" style="width:100%; height:120px; background:#000; color:white; border:1px solid var(--border); border-radius:6px; font-size:12px; outline:none; padding:10px; box-sizing:border-box;"></textarea>
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button class="btn-action btn-green" style="font-size:11px; padding:6px;" onclick="saveCalendarNote()">Update</button>
                    <button class="btn-action" style="font-size:11px; padding:6px;" onclick="toggleOverlay('edit-calendar')">Cancel</button>
                </div>
            </div>
        </div>
    </div>

            <p>Shhh...</p>
            <button class="btn-action btn-green" id="nav-page2" onclick="location.href='/visuals.html'">Access Content</button>
            <button class="btn-action admin-only" style="margin-top:10px;" onclick="toggleLock('page2')">Toggle System Lock</button>
        </div>
        <div class="card">
            <span class="lock-badge" id="lock-page3">🔒 Restricted</span>
            <div class="card-img-placeholder" style="border-left: 4px solid var(--btn-green);">SEC_SPEC_OPS</div>
            <h3>ADAP</h3>
            <p>Access ADAP</p>
            <button class="btn-action btn-green" id="nav-page3" onclick="location.href='/ADAP.html'">Access Special</button>
            <button class="btn-action admin-only" style="margin-top:10px;" onclick="toggleLock('page3')">Toggle System Lock</button>
        </div>
    </div>
</div>

<script>
    var ADA_API = "https://ada-relay.andrewdinglearchive.workers.dev";
    var forecastData = {};

    async function init() {
        // 1. Recursive check to ensure runNeuralGuard is defined from uplink.js
        if (typeof runNeuralGuard !== 'function') {
            setTimeout(init, 100);
            return;
        }

        // 2. Execute Guard
        const data = await runNeuralGuard();
        if (!data) return;

        const isAdmin = data.user.is_admin === 1;

        // 3. Show Admin UI
        if (isAdmin) {
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
        }

        // 4. Render Widgets
        if (data.widgets) {
            forecastData = JSON.parse(data.widgets.forecast || "{}");
            renderForecast();
            
            document.getElementById('calendar-note-display').innerText = data.widgets.calendar_note || "System running nominal parameters.";
            document.getElementById('in-cal-note').value = data.widgets.calendar_note || "";
        }
        renderCalendar();

        // 5. Apply Page Locks
        data.locks.forEach(l => {
            const badge = document.getElementById(`lock-${l.page_id}`);
            const btn = document.getElementById(`nav-${l.page_id}`);
            if(badge) badge.style.display = l.is_locked ? 'block' : 'none';
            
            if (l.is_locked && !isAdmin && btn) {
                btn.classList.add('btn-disabled');
                btn.innerText = "Access Restricted";
                btn.onclick = (e) => { e.preventDefault(); alert("Cleared personnel only."); };
            }
        });
    }

    function renderForecast() {
        const days = ['mon', 'tue', 'wed', 'thu', 'fri'];
        const display = document.getElementById('forecast-display');
        const editor = document.getElementById('forecast-editor-inputs');
        display.innerHTML = ''; editor.innerHTML = '';

        days.forEach(d => {
            const day = forecastData[d] || { text: "Stable", img: "" };
            display.innerHTML += `
                <div class="day-card">
                    <div class="day-name">${d.toUpperCase()}</div>
                    <img src="${day.img || ''}" class="day-img" onerror="this.style.opacity='0'">
                    <div class="day-status">${day.text}</div>
                </div>`;
            
            editor.innerHTML += `
                <div class="edit-group">
                    <label>${d.toUpperCase()} CONFIG</label>
                    <input type="text" id="edit-text-${d}" value="${day.text}" placeholder="Status Text">
                    <input type="text" id="edit-img-${d}" value="${day.img}" placeholder="Icon URL / Base64">
                </div>`;
        });
    }

    function renderCalendar() {
        const display = document.getElementById('calendar-display');
        const now = new Date();
        const today = now.getDate();
        const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
        
        let html = ['S','M','T','W','T','F','S'].map(d => `<div class="cal-header">${d}</div>`).join('');
        for(let i=1; i<=daysInMonth; i++) {
            const isToday = i === today ? 'cal-today' : '';
            html += `<div class="cal-date ${isToday}">${i}</div>`;
        }
        display.innerHTML = html;
    }

    function toggleOverlay(id) {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    async function saveForecast() {
        var updated = {};
        ['mon','tue','wed','thu','fri'].forEach(d => {
            updated[d] = {
                text: document.getElementById('edit-text-'+d).value,
                img: document.getElementById('edit-img-'+d).value
            };
        });
        await fetch(ADA_API + "/admin/system/save", {
            method: 'POST',
            body: JSON.stringify({ id: 'forecast', content: JSON.stringify(updated) })
        });
        location.reload();
    }

    async function saveCalendarNote() {
        const val = document.getElementById('in-cal-note').value;
        await fetch(ADA_API + "/admin/system/save", {
            method: 'POST',
            body: JSON.stringify({ id: 'calendar_note', content: val })
        });
        location.reload();
    }

    async function toggleLock(id) {
        await fetch(ADA_API + "/admin/lock", {
            method: 'POST',
            body: JSON.stringify({ page_id: id })
        });
        location.reload();
    }

    // Initialize Page
    init();
</script>

<!-- 5. CHAT WIDGET -->
<script src="/chat-widget.js"></script>

</body>
</html>
