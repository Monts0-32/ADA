<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | Archive Dashboard</title>
    <style>
        :root { --bg: #0d1117; --header: #161b22; --border: #30363d; --text: #c9d1d9; --btn-green: #238636; }
        body { background-color: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background: var(--header); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 600; color: #f0f6fc; text-decoration: none; font-size: 16px; }
        
        /* USER PILL */
        .user-pill { display: flex; align-items: center; gap: 8px; background: #21262d; border: 1px solid var(--border); padding: 4px 12px; border-radius: 20px; text-decoration: none; color: var(--text); font-size: 12px; transition: 0.2s; }
        .user-pill:hover { border-color: #8b949e; background: #30363d; }
        .user-pill img { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; background: #0d1117; }

        .container { max-width: 1200px; margin: 0 auto; width: 100%; box-sizing: border-box; padding: 40px 20px; }
        h2 { border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 30px; font-weight: 400; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
        .card { background: #161b22; border: 1px solid var(--border); border-radius: 6px; padding: 20px; position: relative; transition: 0.2s; }
        .card:hover { border-color: #8b949e; }
        .card img { width: 100%; height: 160px; border-radius: 4px; object-fit: cover; background: #0d1117; margin-bottom: 15px; }
        .card h3 { margin: 0 0 10px 0; font-size: 18px; color: #58a6ff; }
        .card p { font-size: 13px; color: #8b949e; margin-bottom: 20px; line-height: 1.5; }

        .lock-badge { position: absolute; top: 15px; right: 15px; font-size: 11px; color: #f85149; display: none; background: rgba(248,81,73,0.1); padding: 3px 8px; border-radius: 4px; border: 1px solid #f85149; }
        
        .btn { padding: 6px 16px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; background: #21262d; color: white; font-size: 13px; font-weight: 600; text-decoration: none; text-align: center; display: block; }
        .btn-green { background: var(--btn-green); border: none; width: 100%; box-sizing: border-box; }
        .btn-disabled { background-color: #21262d !important; color: #8b949e !important; cursor: not-allowed !important; opacity: 0.6; }
        .admin-only { display: none; }

        /* CHAT WIDGET STYLES */
        #ada-chat-widget { position: fixed; bottom: 25px; right: 25px; z-index: 9999; font-family: -apple-system, sans-serif; }
        #chat-icon { width: 56px; height: 56px; background: #238636; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); position: relative; }
        #chat-notif { position: absolute; top: 2px; right: 2px; width: 14px; height: 14px; background: #f85149; border-radius: 50%; border: 2px solid #0d1117; display: none; }
        
        /* Bigger Window */
        #chat-window { width: 380px; height: 550px; background: #161b22; border: 1px solid #30363d; border-radius: 12px; display: none; flex-direction: column; margin-bottom: 15px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        #chat-header { background: #21262d; padding: 14px; font-size: 14px; font-weight: 600; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; }
        #chat-body { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #0d1117; }
        #chat-footer { padding: 12px; border-top: 1px solid #30363d; display: flex; gap: 8px; align-items: center; background: #161b22; }
        #chat-msg-input { flex: 1; background: #0d1117; border: 1px solid #30363d; color: white; padding: 8px 12px; border-radius: 6px; outline: none; font-size: 13px; }
        
        /* Styled Buttons */
        .chat-btn { background: #21262d; border: 1px solid #30363d; color: white; padding: 7px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.2s; }
        .chat-btn:hover { background: #30363d; border-color: #8b949e; }
        .btn-send { background: #238636; border: none; }
        .btn-send:hover { background: #2ea043; }
    
        /* Message Bubbles with Avatars */
        .chat-row { display: flex; gap: 10px; align-items: flex-end; max-width: 90%; }
        .chat-row.me { flex-direction: row-reverse; align-self: flex-end; }
        .chat-row img.chat-avatar { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #30363d; background: #0d1117; flex-shrink: 0; }
        .chat-bubble { padding: 8px 12px; border-radius: 12px; font-size: 13px; line-height: 1.4; word-wrap: break-word; position: relative; }
        .chat-row.other .chat-bubble { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-bottom-left-radius: 2px; }
        .chat-row.me .chat-bubble { background: #238636; color: white; border-bottom-right-radius: 2px; }
        .chat-user-label { font-size: 9px; opacity: 0.5; display: block; margin-bottom: 2px; }
    </style>
</head>
<body>
    <div id="ada-chat-widget">
        <div id="chat-window">
            <div id="chat-header"><span>Archive Communications</span><span onclick="toggleChat()" style="cursor:pointer;opacity:0.6;">✕</span></div>
            <div id="chat-body"></div>
            <form id="chat-footer" onsubmit="event.preventDefault(); sendChatText();">
                <input type="text" id="chat-msg-input" placeholder="Type a message..." autocomplete="off">
                <button type="button" class="chat-btn" onclick="document.getElementById('chat-file').click()" title="Share Image">🖼️</button>
                <input type="file" id="chat-file" hidden accept="image/*" onchange="uploadChatImg(this)">
                <button type="submit" class="chat-btn btn-send">Send</button>
            </form>
        </div>
        <div id="chat-icon" onclick="toggleChat()">💬<div id="chat-notif"></div></div>
    </div>
    
    <script>
        const CHAT_API = "https://ada-relay.andrewdinglearchive.workers.dev";
        const myChatEmail = localStorage.getItem('ada_user_email');
        let isChatOpen = false;
        let lastChatId = 0;
    
        function toggleChat() {
            isChatOpen = !isChatOpen;
            document.getElementById('chat-window').style.display = isChatOpen ? 'flex' : 'none';
            if(isChatOpen) {
                document.getElementById('chat-notif').style.display = 'none';
                const body = document.getElementById('chat-body');
                body.scrollTop = body.scrollHeight;
            }
        }
    
        async function syncWidget() {
            if(!myChatEmail) return;
            const res = await fetch(`${CHAT_API}/sync?email=${encodeURIComponent(myChatEmail)}`);
            const data = await res.json();
            
            const latest = data.messages[data.messages.length - 1];
            if(latest && latest.id > lastChatId) {
                if(!isChatOpen && lastChatId !== 0) document.getElementById('chat-notif').style.display = 'block';
                lastChatId = latest.id;
                
                const body = document.getElementById('chat-body');
                body.innerHTML = data.messages.map(m => `
                    <div class="chat-row ${m.user_email === myChatEmail ? 'me' : 'other'}">
                        <img src="${m.profile_picture}" class="chat-avatar" title="${m.user_email}">
                        <div class="chat-bubble">
                            <span class="chat-user-label">${m.display_name || m.user_email}</span>
                            ${m.is_image ? `<img src="${m.content}" style="max-width:100%;border-radius:6px;margin-top:5px;cursor:pointer;" onclick="window.open(this.src)">` : m.content}
                        </div>
                    </div>
                `).join('');
                if(isChatOpen) body.scrollTop = body.scrollHeight;
            }
        }
    
        async function sendChatText() {
            const inp = document.getElementById('chat-msg-input');
            if(!inp.value.trim()) return;
            await fetch(`${CHAT_API}/chat`, { method: 'POST', body: JSON.stringify({ email: myChatEmail, content: inp.value, isImage: false }) });
            inp.value = ''; syncWidget();
        }
    
        async function uploadChatImg(input) {
            if (input.files && input.files[0]) {
                const r = new FileReader();
                r.onload = async (e) => {
                    await fetch(`${CHAT_API}/chat`, { method: 'POST', body: JSON.stringify({ email: myChatEmail, content: e.target.result, isImage: true }) });
                    syncWidget();
                };
                r.readAsDataURL(input.files[0]);
            }
        }
    
        setInterval(syncWidget, 3000); syncWidget();
    </script>
<header>
    <div style="display:flex; align-items:center; gap:20px;">
        <a href="/" class="logo">ADA Archive System</a>
        <div id="admin-tools" style="display:none; gap:8px;">
            <a href="/account-creator.html" class="btn">Creator</a>
            <a href="/account-manager.html" class="btn">Manager</a>
        </div>
    </div>
    <div style="display:flex; gap:10px; align-items:center;">
        <a href="/profile.html" class="user-pill">
            <img id="pill-avatar" src="https://via.placeholder.com/20">
            <span id="pill-name">Syncing...</span>
        </a>
        <button class="btn" style="color:#f85149" onclick="logout()">Logout</button>
    </div>
</header>

<div class="container">
    <h2>Available Partitions</h2>
    <div class="grid">
        <!-- Wiki Card -->
        <div class="card">
            <span class="lock-badge" id="lock-page1">🔒 Locked</span>
            <img src="https://via.placeholder.com/300x160?text=Wiki+Archives" alt="Wikis">
            <h3>Wiki Records</h3>
            <p>Access collaborative archive documentation and community records.</p>
            <button class="btn btn-green" id="nav-page1">Access Archives</button>
            <button class="btn admin-only" style="margin-top:10px; width:100%" onclick="toggleLock('page1')">Toggle System Lock</button>
        </div>

        <!-- Placeholder for other cards -->
        <div class="card">
            <span class="lock-badge" id="lock-page2">🔒 Locked</span>
            <img src="https://via.placeholder.com/300x160?text=Visual+Logs" alt="Logs">
            <h3>Visual Logs</h3>
            <p>Classified image repository and photographic evidence logs.</p>
            <button class="btn btn-green" id="nav-page2" onclick="window.location.href='/visuals.html'">Read Logs</button>
            <button class="btn admin-only" style="margin-top:10px; width:100%" onclick="toggleLock('page2')">Toggle System Lock</button>
        </div>
    </div>
</div>

<!-- FLOATING CHAT WIDGET -->

<script>
    const API = "https://ada-relay.andrewdinglearchive.workers.dev";
    const email = localStorage.getItem('ada_user_email');
    if (!email) window.location.href = '/login.html';

    let chatOpen = false;
    let lastMsgId = 0;

    async function loadData() {
        try {
            const res = await fetch(`${API}/sync?email=${encodeURIComponent(email)}`);
            const data = await res.json();
            const isAdmin = data.user.is_admin === 1;

            // Security check
            if (data.blocks.includes('dash.html') || data.blocks.includes('ALL')) window.location.href = '/blocked.html';

            // User identity
            document.getElementById('pill-name').innerText = data.user.display_name || data.user.email;
            if(data.user.profile_picture) document.getElementById('pill-avatar').src = data.user.profile_picture;
            
            if(isAdmin) {
                document.getElementById('admin-tools').style.display = 'flex';
                document.querySelectorAll('.admin-only').forEach(e => e.style.display = 'block');
            }

            // Wiki Permission Gate
            const wikiBtn = document.getElementById('nav-page1');
            const hasWikiAccess = isAdmin || data.permissions.includes('wiki_access');
            if(!hasWikiAccess) {
                wikiBtn.classList.add('btn-disabled'); 
                wikiBtn.innerText = "Access Restricted"; 
                wikiBtn.onclick = () => alert("Permission 'wiki_access' required.");
            } else {
                wikiBtn.classList.remove('btn-disabled'); 
                wikiBtn.innerText = "Access Archives"; 
                wikiBtn.onclick = () => window.location.href = '/wikiselector.html';
            }

            // Lock rendering
            data.locks.forEach(l => {
                const b = document.getElementById(`lock-${l.page_id}`); 
                if(b) b.style.display = l.is_locked ? 'block' : 'none';
                
                // If standard user and page locked, disable button
                if(!isAdmin && l.is_locked) {
                    const btn = document.getElementById(`nav-${l.page_id}`);
                    if(btn) { btn.classList.add('btn-disabled'); btn.innerText = "System Locked"; btn.onclick = null; }
                }
            });

            // Handle Chat Syncing for Widget

        } catch (e) { console.error("Sync Error", e); }
    }

    // Widget Chat Functions



    async function toggleLock(id) { await fetch(`${API}/admin/lock`, { method: 'POST', body: JSON.stringify({ page_id: id }) }); loadData(); }
    function logout() { localStorage.clear(); window.location.href = '/login.html'; }

    setInterval(loadData, 3000);
    loadData();
</script>
</body>
</html>
