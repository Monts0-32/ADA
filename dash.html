<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | Dashboard</title>
    <style>
        :root { --bg: #0d1117; --header: #161b22; --border: #30363d; --text: #c9d1d9; --btn-green: #238636; }
        body { background-color: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: var(--header); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 600; color: #f0f6fc; text-decoration: none; }
        .container { display: flex; flex: 1; overflow: hidden; }
        .gallery { flex: 2; padding: 24px; overflow-y: auto; border-right: 1px solid var(--border); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; }
        .card { background: #161b22; border: 1px solid var(--border); border-radius: 6px; padding: 16px; position: relative; }
        .card img { width: 100%; height: 120px; border-radius: 4px; object-fit: cover; background: #0d1117; margin-bottom: 12px; }
        .lock-badge { position: absolute; top: 10px; right: 10px; font-size: 11px; color: #f85149; display: none; background: rgba(248,81,73,0.1); padding: 2px 6px; border-radius: 4px; border: 1px solid #f85149; z-index: 5; }
        
        /* Chat Panel Styling */
        .chat-panel { flex: 1; display: flex; flex-direction: column; width: 350px; background: #0d1117; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .msg { max-width: 85%; padding: 8px 12px; border-radius: 12px; font-size: 13px; line-height: 1.4; word-wrap: break-word; position: relative; }
        .msg.other { background: #21262d; align-self: flex-start; border: 1px solid var(--border); }
        .msg.me { background: #238636; color: white; align-self: flex-end; }
        .msg-user { font-size: 9px; opacity: 0.6; display: block; margin-bottom: 2px; }

        .chat-input-area { padding: 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
        input#chat-input { flex: 1; background: #0d1117; border: 1px solid var(--border); border-radius: 6px; color: white; padding: 8px; outline: none; }
        
        .btn { padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; background: #21262d; color: white; font-size: 12px; text-decoration: none; text-align: center; }
        .btn-green { background: var(--btn-green); border: none; }
        .btn-disabled { background-color: #21262d !important; color: #8b949e !important; cursor: not-allowed !important; }
        .admin-controls { display: none; gap: 8px; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:20px;">
        <a href="/" class="logo">ADA Archive</a>
        <div id="admin-tools" class="admin-controls">
            <a href="/account-creator.html" class="btn">Account Creator</a>
            <a href="/account-manager.html" class="btn">Account Manager</a>
        </div>
    </div>
    <div style="display:flex; gap:10px; align-items:center;">
        <span id="user-pill" style="font-size:12px; border:1px solid var(--border); padding:2px 8px; border-radius:10px;"></span>
        <button class="btn" onclick="logout()">Logout</button>
    </div>
</header>

<div class="container">
    <div class="gallery">
        <h2>Archive Content</h2>
        <div class="grid">
            <div class="card">
                <span class="lock-badge" id="lock-page1">🔒 Locked</span>
                <img src="https://via.placeholder.com/200x120?text=Visuals" alt="1">
                <h3>Wiki Pages</h3>
                <button class="btn btn-green" style="width:100%" id="nav-page1" onclick="navTo('wiki')">View Gallery</button>
                <button class="btn admin-only" style="margin-top:8px; width:100%; display:none;" onclick="toggleLock('wiki')">Toggle Lock</button>
            </div>
            <div class="card">
                <span class="lock-badge" id="lock-page2">🔒 Locked</span>
                <img src="https://via.placeholder.com/200x120?text=Docs" alt="2">
                <h3>Document Leak</h3>
                <button class="btn btn-green" style="width:100%" id="nav-page2" onclick="navTo('page2')">Read Docs</button>
                <button class="btn admin-only" style="margin-top:8px; width:100%; display:none;" onclick="toggleLock('page2')">Toggle Lock</button>
            </div>
            <div class="card">
                <span class="lock-badge" id="lock-page3">🔒 Locked</span>
                <img src="https://via.placeholder.com/200x120?text=Core" alt="3">
                <h3>System Core</h3>
                <button class="btn btn-green" style="width:100%" id="nav-page3" onclick="navTo('page3')">Access Core</button>
                <button class="btn admin-only" style="margin-top:8px; width:100%; display:none;" onclick="toggleLock('page3')">Toggle Lock</button>
            </div>
        </div>
    </div>

    <div class="chat-panel">
        <div id="chat-messages"></div>
        <form class="chat-input-area" id="chat-form">
            <input type="text" id="chat-input" placeholder="Comms..." autocomplete="off">
            <button type="submit" class="btn btn-green">Send</button>
        </form>
    </div>
</div>

<script>
    const API = "https://ada-relay.andrewdinglearchive.workers.dev";
    const email = localStorage.getItem('ada_user_email');
    const isAdmin = localStorage.getItem('ada_admin') === '1';

    if (!email) window.location.href = '/login.html';
    document.getElementById('user-pill').innerText = email;

    if (isAdmin) {
        document.getElementById('admin-tools').style.display = 'flex';
        document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
    }

    async function loadData() {
        try {
            const res = await fetch(`${API}/sync?email=${encodeURIComponent(email)}`);
            const data = await res.json();
            
            // Block Check
            const path = window.location.pathname.split("/").pop() || "index.html";
            if (data.blocks.includes(path) || data.blocks.includes("ALL")) {
                window.location.href = "/blocked.html"; return;
            }

            // Chat Rendering
            const chatBox = document.getElementById('chat-messages');
            const isAtBottom = chatBox.scrollHeight - chatBox.clientHeight <= chatBox.scrollTop + 1;

            chatBox.innerHTML = data.messages.map(m => `
                <div class="msg ${m.user_email === email ? 'me' : 'other'}">
                    <span class="msg-user">${m.user_email}</span>
                    ${m.content}
                </div>`).join('');

            // Scroll if user was already at bottom or just sent a message
            if (isAtBottom) chatBox.scrollTop = chatBox.scrollHeight;

            // Locks & Button States
            data.locks.forEach(l => {
                const badge = document.getElementById(`lock-${l.page_id}`);
                const navBtn = document.getElementById(`nav-${l.page_id}`);
                if (badge) badge.style.display = l.is_locked ? 'block' : 'none';
                if (navBtn) {
                    if (l.is_locked) {
                        navBtn.classList.add('btn-disabled');
                        navBtn.innerText = "Locked";
                        navBtn.onclick = null;
                    } else {
                        navBtn.classList.remove('btn-disabled');
                        navBtn.onclick = () => navTo(l.page_id);
                        navBtn.innerText = l.page_id === 'page1' ? "View Gallery" : l.page_id === 'page2' ? "Read Docs" : "Access Core";
                    }
                }
            });
        } catch (e) { console.error("Sync failed", e); }
    }

    // Handle Message Sending
    document.getElementById('chat-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const input = document.getElementById('chat-input');
        const val = input.value.trim();
        if (!val) return;

        input.value = ''; // Clear immediately for UX
        
        await fetch(`${API}/chat`, {
            method: 'POST',
            body: JSON.stringify({ email, content: val }),
            headers: { 'Content-Type': 'application/json' }
        });

        await loadData(); // Refresh chat
        const chatBox = document.getElementById('chat-messages');
        chatBox.scrollTop = chatBox.scrollHeight; // Force scroll to bottom
    });

    async function toggleLock(pageId) {
        await fetch(`${API}/admin/lock`, { method: 'POST', body: JSON.stringify({ page_id: pageId }) });
        loadData();
    }

    function navTo(page) { window.location.href = `/${page}.html`; }
    function logout() { localStorage.clear(); window.location.href = '/login.html'; }
    
    setInterval(loadData, 3000);
    loadData();
</script>
</body>
</html>
