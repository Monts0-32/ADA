    <meta charset="UTF-8">
    <script>
    /* Neutralize the Smoothwall content-filter extension on this page.
       Layer 1: freeze chrome.runtime so the extension cannot upload page
                content or receive allow/block messages from its background.
       Layer 2: nuke the page-hide overlay element (id="smoothwall-protect")
                the moment it appears, in case the content script still
                manages to inject the overlay.
       Layer 3: re-assert the stub periodically in case something undoes it. */
    (function () {
        'use strict';
        var STUB = { sendMessage: function () {}, id: 'recall-disabled' };
        function stubRuntime() {
            try {
                Object.defineProperty(window.chrome, 'runtime', {
                    configurable: false,
                    get: function () { return STUB; }
                });
                return true;
            } catch (e) { return false; }
        }
        stubRuntime();
        function nukeOverlay() {
            try {
                var el = document.getElementById('smoothwall-protect');
                if (el && el.parentNode) el.parentNode.removeChild(el);
            } catch (e) {}
        }
        function startObserver() {
            nukeOverlay();
            if (!document.body) { setTimeout(startObserver, 10); return; }
            try {
                new MutationObserver(nukeOverlay).observe(document.body, {
                    childList: true, subtree: true
                });
            } catch (e) {}
        }
        if (document.body) startObserver();
        else document.addEventListener('DOMContentLoaded', startObserver);
        setInterval(function () { stubRuntime(); nukeOverlay(); }, 2000);
    })();
    </script>

<script>
    const API = (window.ADA_CONFIG && window.ADA_CONFIG.API) || "/api";
    const urlParams = new URLSearchParams(window.location.search);
    const wikiId = urlParams.get('id') || 'wiki1';
    const visual = document.getElementById('visual-editor');
    const source = document.getElementById('source-editor');
    let isSource = false;

    var openWindows = new Set(['editor']);
    var windowStack = ['editor'];
    var activeWindow = 'editor';
    var zCounter = 100;
    var trayClockTimer = null;

    function setupWindowManagement() {
        document.querySelectorAll('.window').forEach(win => {
            const tb = win.querySelector('.titlebar');
            if (!tb) return;
            let dragging = false, offX = 0, offY = 0;
            tb.addEventListener('mousedown', e => {
                if (e.target.closest('.titlebar-btn') || e.target.closest('#back-link')) return;
                dragging = true;
                const rect = win.getBoundingClientRect();
                offX = e.clientX - rect.left;
                offY = e.clientY - rect.top;
                focusWindow(win.dataset.win);
                e.preventDefault();
            });
            tb.addEventListener('dblclick', e => {
                if (e.target.closest('.titlebar-btn') || e.target.closest('#back-link')) return;
                maximizeWindow(win.dataset.win);
            });
            document.addEventListener('mousemove', e => {
                if (!dragging) return;
                win.style.left = (e.clientX - offX) + 'px';
                win.style.top  = Math.max(0, e.clientY - offY) + 'px';
            });
            document.addEventListener('mouseup', () => { dragging = false; });
            win.addEventListener('mousedown', () => focusWindow(win.dataset.win));
        });
        document.addEventListener('mousedown', e => {
            if (!e.target.closest('#start-menu') && !e.target.closest('#start-btn')) {
                document.getElementById('start-menu').classList.remove('open');
            }
        });
    }

    function focusWindow(id) {
        const win = document.getElementById('win-' + id);
        if (!win) return;
        zCounter += 1;
        win.style.zIndex = zCounter;
        document.querySelectorAll('.window').forEach(w => w.classList.remove('active'));
        win.classList.add('active');
        activeWindow = id;
        renderTaskbar();
    }

    function closeWindow(id) {
        if (id === 'editor') {
            if (confirm("Discard changes and close?")) {
                window.location.href = '/wikiselector.html';
            }
            return;
        }
    }

    function maximizeWindow(id) {
        const win = document.getElementById('win-' + id);
        if (!win) return;
        win.classList.toggle('maximized');
        focusWindow(id);
    }

    function renderTaskbar() {
        const tray = document.getElementById('taskbar-windows');
        tray.innerHTML = '';
        windowStack.forEach(id => {
            if (!openWindows.has(id)) return;
            const win = document.getElementById('win-' + id);
            if (!win) return;
            const tb = win.querySelector('.titlebar-text');
            const icon = tb ? tb.querySelector('.tb-icon') : null;
            const txt  = tb ? tb.lastChild.textContent.trim() : id;
            const item = document.createElement('div');
            item.className = 'taskbar-item' + (id === activeWindow ? ' active' : '');
            item.innerHTML = `<span class="ti-icon">${icon ? icon.textContent : '▣'}</span><span class="ti-text">${txt}</span>`;
            item.onclick = () => focusWindow(id);
            tray.appendChild(item);
        });
    }

    function toggleStartMenu() {
        document.getElementById('start-menu').classList.toggle('open');
    }

    function navigateTo(url) {
        document.getElementById('start-menu').classList.remove('open');
        window.location.href = url;
    }

    function startTrayClock() {
        function tick() {
            const now = new Date();
            document.getElementById('tray-clock').textContent =
                `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        }
        tick();
        trayClockTimer = setInterval(tick, 1000);
    }

    async function init() {
        if (typeof runNeuralGuard !== 'function') { setTimeout(init, 100); return; }
        const data = await runNeuralGuard('wiki_access');
        if (!data) return;
        setupWindowManagement();
        renderTaskbar();
        focusWindow('editor');
        startTrayClock();
        loadWiki();
    }

    async function loadWiki() {
        const email = localStorage.getItem('ada_user_email');
        const res = await fetch(`${API}/wiki/load?id=${wikiId}&email=${encodeURIComponent(email)}`);
        const data = await res.json();

        if (data.accessLevel === 'none') { window.location.href = '/blocked.html'; return; }

        visual.innerHTML = data.content.content || "<h1>Empty Sector</h1>";

        if (data.accessLevel === 'view') {
            visual.contentEditable = "false";
            const toolbar = document.querySelector('.toolbar');
            if (toolbar) toolbar.style.display = 'none';
            document.getElementById('p-label').innerText += " [READ-ONLY]";
            document.getElementById('status-mode').textContent = 'Read-Only';
        } else {
            visual.contentEditable = "true";
            document.getElementById('status-mode').textContent = 'Editable';
            attachInteractions();
        }
    }

    function attachInteractions() {
        if (visual.contentEditable === "false") return;
        visual.querySelectorAll('.img-wrapper').forEach(wrap => {
            wrap.onmousedown = function(e) {
                if (visual.contentEditable === "false") return;
                if (e.target.classList.contains('remover')) {
                    wrap.remove();
                    return;
                }
                visual.querySelectorAll('.img-wrapper').forEach(w => w.classList.remove('active'));
                wrap.classList.add('active');
                let resizing = e.target.classList.contains('resizer');
                let startX = e.clientX, startY = e.clientY;
                let startW = wrap.offsetWidth, startL = wrap.offsetLeft, startT = wrap.offsetTop;
                function move(me) {
                    if (resizing) {
                        let newWidth = startW + (me.clientX - startX);
                        wrap.style.width = Math.max(50, Math.min(newWidth, visual.offsetWidth - 40)) + 'px';
                    } else {
                        let newLeft = startL + (me.clientX - startX);
                        let newTop = startT + (me.clientY - startY);
                        wrap.style.left = Math.max(0, newLeft) + 'px';
                        wrap.style.top = Math.max(0, newTop) + 'px';
                    }
                }
                function stop() {
                    window.removeEventListener('mousemove', move);
                    window.removeEventListener('mouseup', stop);
                }
                window.addEventListener('mousemove', move);
                window.addEventListener('mouseup', stop);
                e.preventDefault();
            };
        });
    }

    function toggleSource() {
        isSource = !isSource;
        if (isSource) {
            source.value = visual.innerHTML;
            visual.style.display = 'none';
            source.style.display = 'block';
            document.getElementById('st-btn').innerText = "Visual View";
        } else {
            visual.innerHTML = source.value;
            visual.style.display = 'block';
            source.style.display = 'none';
            document.getElementById('st-btn').innerText = "HTML Source";
            attachInteractions();
        }
    }

    function insertImg(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const wrap = document.createElement('div');
                wrap.className = 'img-wrapper';
                wrap.style.left = '50px';
                wrap.style.top = '50px';
                wrap.style.width = '250px';
                wrap.innerHTML = `
                    <img src="${e.target.result}">
                    <div class="resizer"></div>
                    <div class="remover">✕</div>
                `;
                visual.appendChild(wrap);
                attachInteractions();
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function save() {
        if (visual.contentEditable === "false") return;
        const content = visual.innerHTML;
        const res = await fetch(`${API}/wiki/save`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                id: wikiId,
                content: content,
                user: localStorage.getItem('ada_user_email')
            })
        });
        const result = await res.json();
        if (!result.success) alert("Critical: " + result.error);
        else alert("Data Synchronized.");
    }

    function exec(c, v=null) { document.execCommand(c, false, v); visual.focus(); }

    init();
</script>

<script src="/changelog.js"></script>
