<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | Archive Editor</title>
    <style>
        :root { --bg: #0d1117; --header: #161b22; --border: #30363d; --text: #c9d1d9; --btn-green: #238636; --blue: #58a6ff; --red: #f85149; }
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 5px; }

        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; overflow-x: hidden; }
        header { background: var(--header); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        
        .toolbar { background: #161b22; border-bottom: 1px solid var(--border); padding: 8px 24px; display: flex; gap: 8px; position: sticky; top: 0; z-index: 1000; align-items: center; flex-wrap: wrap; }
        .toolbar button, .toolbar select, .toolbar label, .toolbar input[type="color"] { background: #21262d; border: 1px solid var(--border); color: white; padding: 5px 12px; border-radius: 6px; cursor: pointer; height: 32px; font-size: 13px; display: flex; align-items: center; box-sizing: border-box; }
        .toolbar button:hover { background: #30363d; }

        .editor-wrap { max-width: 1100px; margin: 40px auto; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; min-height: 85vh; position: relative; }
        
        /* The Canvas */
        #visual-editor { width: 100%; min-height: 85vh; padding: 60px; box-sizing: border-box; outline: none; line-height: 1.6; position: relative; overflow: visible; }
        #source-editor { width: 100%; min-height: 85vh; padding: 40px; background: #0d1117; color: #79c0ff; border: none; font-family: monospace; display: none; width: 100%; box-sizing: border-box; resize: none; outline: none; }

        /* Robust Image System */
        /* --- ADVANCED IMAGE UI --- */
        .img-wrapper { 
            position: absolute; 
            display: inline-block; 
            line-height: 0; 
            cursor: move; 
            user-select: none; 
            border: 2px solid transparent; 
            transition: border 0.2s, box-shadow 0.2s;
        }
        
        .img-wrapper img { 
            width: 100%; 
            height: 100%; 
            display: block; 
            pointer-events: none; 
            border-radius: 4px;
        }
        
        /* selection state */
        .img-wrapper.active { 
            border: 2px solid var(--blue); 
            box-shadow: 0 0 15px rgba(88, 166, 255, 0.3);
            z-index: 1000;
        }
        
        /* Circular UI Handles */
        .resizer { 
            position: absolute; 
            width: 14px; 
            height: 14px; 
            background: var(--blue); 
            border: 2px solid var(--bg);
            border-radius: 50%; 
            right: -8px; 
            bottom: -8px; 
            cursor: nwse-resize; 
            display: none; 
        }
        
        .remover { 
            position: absolute; 
            width: 22px; 
            height: 22px; 
            background: var(--red); 
            border: 2px solid var(--bg);
            border-radius: 50%; 
            right: -11px; 
            top: -11px; 
            cursor: pointer; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            font-size: 14px; 
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        
        /* Only show buttons when the editor is ACTIVE and image is SELECTED */
        #visual-editor[contenteditable="true"] .img-wrapper.active .resizer,
        #visual-editor[contenteditable="true"] .img-wrapper.active .remover { 
            display: flex !important; 
        }

        .btn-save { background: var(--btn-green) !important; border: none !important; font-weight: bold; margin-left: auto; color: white; }
    </style>
</head>
<body>
<script>window.ADA_CONFIG = { requiredTag: 'wiki_access' };</script>
<script src="/uplink.js"></script>
<script src="/chat-widget.js"></script>
<header>
    <a href="/wikiselector.html" style="color:var(--blue); text-decoration:none; font-size:14px;">← Back to Selector</a>
    <div id="p-label" style="font-weight:600;">Partition Editor</div>
</header>

<div class="toolbar">
    <select onchange="exec('formatBlock', this.value); this.selectedIndex=0;">
        <option value="" disabled selected>Heading</option>
        <option value="H1">H1</option><option value="H2">H2</option><option value="P">P</option>
    </select>
    <button onclick="exec('bold')">B</button>
    <button onclick="exec('italic')">I</button>
    <input type="color" onchange="exec('foreColor', this.value)" title="Text Color">
    <div style="width:1px; background:var(--border); height:20px; margin:0 5px;"></div>
    <button onclick="exec('justifyLeft')">L</button>
    <button onclick="exec('justifyCenter')">C</button>
    <label for="img-up">🖼 Add Image</label>
    <input type="file" id="img-up" accept="image/*" onchange="insertImg(this)" style="display:none">
    <button onclick="toggleSource()" id="st-btn">HTML Source</button>
    <button class="btn-save" onclick="save()">Sync Partition</button>
</div>

<div class="editor-wrap">
    <div id="visual-editor" contenteditable="true"></div>
    <textarea id="source-editor"></textarea>
</div>
<script>
    async function init() {
        const data = await runNeuralGuard('wiki_access');
        if(!data) return;

        // Run your wiki loading code
        loadWiki(); 
    }
    init();
</script>
<script>
    const API = "https://ada-relay.andrewdinglearchive.workers.dev";
    const urlParams = new URLSearchParams(window.location.search);
    const wikiId = urlParams.get('id') || 'wiki1';
    const visual = document.getElementById('visual-editor');
    const source = document.getElementById('source-editor');
    let isSource = false;

    async function loadWiki() {
        const email = localStorage.getItem('ada_user_email');
        const res = await fetch(`${API}/wiki/load?id=${wikiId}&email=${encodeURIComponent(email)}`);
        const data = await res.json();

        if (data.accessLevel === 'none') { window.location.href = '/blocked.html'; return; }

        visual.innerHTML = data.content.content || "<h1>Empty Sector</h1>";

        if (data.accessLevel === 'view') {
            visual.contentEditable = "false";
            const toolbar = document.querySelector('.toolbar');
            if(toolbar) toolbar.style.display = 'none';
            document.getElementById('p-label').innerText += " [READ-ONLY]";
            // DO NOT call attachInteractions() here
        } else {
            visual.contentEditable = "true";
            attachInteractions(); // Only call for editors
        }
    }

    function attachInteractions() {
        if (visual.contentEditable === "false") return;
    
        visual.querySelectorAll('.img-wrapper').forEach(wrap => {
            wrap.onmousedown = function(e) {
                if (visual.contentEditable === "false") return;
                
                // Handle deletion
                if (e.target.classList.contains('remover')) {
                    wrap.remove();
                    return;
                }
    
                // Select this image, deselect others
                visual.querySelectorAll('.img-wrapper').forEach(w => w.classList.remove('active'));
                wrap.classList.add('active');
    
                let resizing = e.target.classList.contains('resizer');
                let startX = e.clientX, startY = e.clientY;
                let startW = wrap.offsetWidth, startL = wrap.offsetLeft, startT = wrap.offsetTop;
    
                function move(me) {
                    if (resizing) {
                        let newWidth = startW + (me.clientX - startX);
                        // Constrain width to editor size
                        wrap.style.width = Math.max(50, Math.min(newWidth, visual.offsetWidth - 40)) + 'px';
                    } else {
                        let newLeft = startL + (me.clientX - startX);
                        let newTop = startT + (me.clientY - startY);
                        // Keep image inside editor bounds
                        wrap.style.left = Math.max(0, newLeft) + 'px';
                        wrap.style.top = Math.max(0, newTop) + 'px';
                    }
                }
    
                function stop() {
                    window.removeEventListener('mousemove', move);
                    window.removeEventListener('mouseup', stop);
                }
    
                window.addEventListener('mousemove', move);
                window.addEventListener('mouseup', stop);
                e.preventDefault();
            };
        });
    }
    function toggleSource() {
        isSource = !isSource;
        if (isSource) {
            source.value = visual.innerHTML;
            visual.style.display = 'none';
            source.style.display = 'block';
            document.getElementById('st-btn').innerText = "Visual View";
        } else {
            visual.innerHTML = source.value;
            visual.style.display = 'block';
            source.style.display = 'none';
            document.getElementById('st-btn').innerText = "HTML Source";
            attachInteractions();
        }
    }

    function insertImg(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const wrap = document.createElement('div');
                wrap.className = 'img-wrapper';
                // Default safe starting point
                wrap.style.left = '50px'; 
                wrap.style.top = '50px'; 
                wrap.style.width = '250px'; 
                // Injects UI structure
                wrap.innerHTML = `
                    <img src="${e.target.result}">
                    <div class="resizer"></div>
                    <div class="remover">✕</div>
                `;
                visual.appendChild(wrap);
                attachInteractions();
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function save() {
        // Double-check if the UI was tampered with
        if (visual.contentEditable === "false") return;

        const content = visual.innerHTML;
        const res = await fetch(`${API}/wiki/save`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                id: wikiId, 
                content: content, 
                user: localStorage.getItem('ada_user_email') 
            })
        });
        const result = await res.json();
        if(!result.success) alert("Critical: " + result.error);
        else alert("Data Synchronized.");
    }

    function exec(c, v=null) { document.execCommand(c, false, v); visual.focus(); }
    loadWiki();
</script>
</body>
</html>
