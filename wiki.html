<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | Wiki Editor</title>
    <style>
        :root { --bg: #0d1117; --header: #161b22; --border: #30363d; --text: #c9d1d9; --btn-green: #238636; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; }
        header { background: var(--header); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        .toolbar { background: #161b22; border-bottom: 1px solid var(--border); padding: 8px 24px; display: flex; gap: 6px; position: sticky; top: 0; z-index: 1000; }
        .toolbar button, .toolbar select, .toolbar input { background: #21262d; border: 1px solid var(--border); color: white; padding: 5px 10px; border-radius: 6px; cursor: pointer; height: 32px; }
        .editor-wrap { max-width: 1100px; margin: 40px auto; background: #0d1117; border: 1px solid var(--border); border-radius: 6px; min-height: 80vh; position: relative; }
        #visual-editor { width: 100%; min-height: 80vh; padding: 60px; box-sizing: border-box; outline: none; }
        #source-editor { width: 100%; min-height: 80vh; padding: 40px; background: #0d1117; color: #79c0ff; border: none; font-family: monospace; display: none; width: 100%; }
        .ada-img { position: absolute; cursor: move; border: 2px solid transparent; }
        .ada-img.active { border-color: #58a6ff; resize: both; overflow: auto; }
        .btn-save { background: var(--btn-green) !important; font-weight: bold; margin-left: auto; border: none; color: white; }
    </style>
</head>
<body>

<header>
    <a href="/wikiselector.html" style="color:#58a6ff; text-decoration:none;">← Back to Selector</a>
    <div id="p-label" style="font-weight:bold; color:white;">Checking Permissions...</div>
</header>

<div id="editor-ui" style="display:none;">
    <div class="toolbar">
        <select onchange="exec('formatBlock', this.value); this.selectedIndex=0;"><option value="" disabled selected>Heading</option><option value="H1">H1</option><option value="H2">H2</option><option value="P">P</option></select>
        <button onclick="exec('bold')">B</button>
        <input type="color" onchange="exec('foreColor', this.value)">
        <button onclick="exec('justifyCenter')">Center</button>
        <button onclick="toggleSource()" id="ts">Source</button>
        <button class="btn-save" onclick="saveWiki()">Save Partition</button>
    </div>

    <div class="editor-wrap">
        <div id="visual-editor" contenteditable="true"></div>
        <textarea id="source-editor"></textarea>
    </div>
</div>

<script>
    const API = "https://ada-relay.andrewdinglearchive.workers.dev";
    const urlParams = new URLSearchParams(window.location.search);
    const wikiId = urlParams.get('id') || 'wiki1';
    const visual = document.getElementById('visual-editor');
    const source = document.getElementById('source-editor');
    let isSource = false;

    async function init() {
        const email = localStorage.getItem('ada_user_email');
        if(!email) { window.location.href='/login.html'; return; }

        const res = await fetch(`${API}/sync?email=${encodeURIComponent(email)}`);
        const data = await res.json();

        // Enforcement
        const canAccess = data.user.is_admin || data.permissions.includes('wiki_access');
        if(!canAccess || data.blocks.includes('wiki.html')) {
            window.location.href = '/blocked.html';
            return;
        }

        document.getElementById('editor-ui').style.display = 'block';
        document.getElementById('p-label').innerText = `Partition: ${wikiId.toUpperCase()}`;
        loadWiki();
    }

    async function loadWiki() {
        const res = await fetch(`${API}/wiki/load?id=${wikiId}`);
        const d = await res.json();
        visual.innerHTML = d.content;
        source.value = d.content;
        attachImageLogic();
    }

    async function saveWiki() {
        const content = isSource ? source.value : visual.innerHTML;
        await fetch(`${API}/wiki/save`, {
            method: 'POST',
            body: JSON.stringify({ id: wikiId, content, user: localStorage.getItem('ada_user_email') })
        });
        alert("Saved.");
    }

    function toggleSource() {
        isSource = !isSource;
        visual.style.display = isSource ? 'none' : 'block';
        source.style.display = isSource ? 'block' : 'none';
        if(!isSource) { visual.innerHTML = source.value; attachImageLogic(); }
        else { source.value = visual.innerHTML; }
    }

    function exec(c, v=null) { if(!isSource){ document.execCommand(c, false, v); visual.focus(); }}

    // (Include your attachImageLogic and dragging logic here as used in previous versions)
    
    init();
</script>
</body>
</html>
