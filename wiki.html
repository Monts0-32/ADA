<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | Wiki Editor</title>
    <style>
        :root { --bg: #0d1117; --header: #161b22; --border: #30363d; --text: #c9d1d9; --btn-green: #238636; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 0; }
        header { background: var(--header); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        .toolbar { background: #161b22; border-bottom: 1px solid var(--border); padding: 8px 24px; display: flex; gap: 6px; position: sticky; top: 0; z-index: 1000; align-items: center; }
        .toolbar button, .toolbar select, .toolbar label, .toolbar input { background: #21262d; border: 1px solid var(--border); color: white; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; height: 32px; box-sizing: border-box; }
        .editor-wrap { max-width: 1100px; margin: 40px auto; background: #0d1117; border: 1px solid var(--border); border-radius: 6px; min-height: 85vh; position: relative; }
        #visual-editor { width: 100%; min-height: 85vh; padding: 60px; box-sizing: border-box; outline: none; line-height: 1.6; }
        #source-editor { width: 100%; min-height: 85vh; padding: 40px; background: #0d1117; color: #79c0ff; border: none; font-family: monospace; display: none; resize: none; outline: none; box-sizing: border-box; }
        .ada-img { position: absolute; cursor: move; border: 2px solid transparent; }
        .ada-img.active { border-color: #58a6ff; resize: both; overflow: auto; z-index: 100; }
        .btn-save { background: var(--btn-green) !important; border: none !important; font-weight: bold; margin-left: auto; }
    </style>
</head>
<body>

<header>
    <a href="/wikiselector.html" style="color:white; text-decoration:none;">← Back to Selector</a>
    <div id="partition-label" style="font-weight:bold; color:#58a6ff;"></div>
</header>

<div class="toolbar">
    <select onchange="exec('formatBlock', this.value); this.selectedIndex=0;">
        <option value="" selected disabled>Heading</option>
        <option value="H1">Title (H1)</option>
        <option value="H2">Heading (H2)</option>
        <option value="H3">Sub-heading (H3)</option>
        <option value="P">Paragraph (P)</option>
    </select>
    <button onclick="exec('bold')">B</button>
    <button onclick="exec('italic')">I</button>
    <input type="color" onchange="exec('foreColor', this.value)">
    <div style="width:1px; background:var(--border); height:20px; margin:0 5px;"></div>
    <button onclick="exec('justifyLeft')">L</button>
    <button onclick="exec('justifyCenter')">C</button>
    <button onclick="exec('justifyRight')">R</button>
    <label for="img-upload">🖼 Upload</label>
    <input type="file" id="img-upload" accept="image/*" onchange="uploadImage(this)" style="display:none">
    <button onclick="toggleSource()" id="toggle-btn">Source</button>
    <button class="btn-save" onclick="saveWiki()">Save Changes</button>
</div>

<div class="editor-wrap">
    <div id="visual-editor" contenteditable="true"></div>
    <textarea id="source-editor"></textarea>
</div>
<script>
    async function loadWiki() {
        const sync = await fetch(`${API}/sync?email=${encodeURIComponent(userEmail)}`);
        const sData = await sync.json();

    // Security Gate
        const hasAccess = sData.user.is_admin || sData.permissions.includes('wiki_access');
        if(!hasAccess || sData.blocks.includes('wiki.html') || sData.blocks.includes('ALL')) {
            window.location.href = '/blocked.html'; return;
        }

    // Load Content
        const res = await fetch(`${API}/wiki/load?id=${wikiId}`);
        const data = await res.json();
        visual.innerHTML = data.content;
        source.value = data.content;
    }
</script>
<script>
    const API = "https://ada-relay.andrewdinglearchive.workers.dev";
    const userEmail = localStorage.getItem('ada_user_email');
    
    // THE SECRET: Get 'id' from the URL
    const urlParams = new URLSearchParams(window.location.search);
    const wikiId = urlParams.get('id') || 'wiki1'; 
    
    const visual = document.getElementById('visual-editor');
    const source = document.getElementById('source-editor');
    let isSource = false;

    document.getElementById('partition-label').innerText = `Editing: ${wikiId.toUpperCase()}`;

    async function loadWiki() {
        const res = await fetch(`${API}/wiki/load?id=${wikiId}`);
        const data = await res.json();
        visual.innerHTML = data.content;
        source.value = data.content;
        attachImageLogic();
    }

    async function saveWiki() {
        const content = isSource ? source.value : visual.innerHTML;
        await fetch(`${API}/wiki/save`, {
            method: 'POST',
            body: JSON.stringify({ id: wikiId, content, user: userEmail }),
            headers: { 'Content-Type': 'application/json' }
        });
        alert(`Data for ${wikiId} saved to database.`);
        loadWiki();
    }

    function toggleSource() {
        if (!isSource) { source.value = visual.innerHTML; visual.style.display = 'none'; source.style.display = 'block'; }
        else { visual.innerHTML = source.value; visual.style.display = 'block'; source.style.display = 'none'; attachImageLogic(); }
        isSource = !isSource;
    }

    function exec(cmd, val = null) { if (!isSource) { document.execCommand(cmd, false, val); visual.focus(); } }

    function uploadImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.createElement('img');
                img.src = e.target.result; img.className = 'ada-img';
                img.style.left = '50px'; img.style.top = '50px'; img.style.width = '200px';
                visual.appendChild(img); attachImageLogic();
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // Standard Drag/Resize Logic
    let activeImg = null, isDragging = false, startX, startY, startLeft, startTop;
    function attachImageLogic() {
        visual.querySelectorAll('.ada-img').forEach(img => {
            img.onmousedown = (e) => {
                const rect = img.getBoundingClientRect();
                if (e.clientX > rect.right - 20 && e.clientY > rect.bottom - 20) return;
                activeImg = img; isDragging = true;
                visual.querySelectorAll('.ada-img').forEach(i => i.classList.remove('active'));
                img.classList.add('active');
                startX = e.clientX; startY = e.clientY;
                startLeft = parseInt(img.style.left) || 0; startTop = parseInt(img.style.top) || 0;
                e.preventDefault();
            };
        });
    }
    window.onmousemove = (e) => { if (isDragging && activeImg) { activeImg.style.left = (startLeft + (e.clientX - startX)) + 'px'; activeImg.style.top = (startTop + (e.clientY - startY)) + 'px'; } };
    window.onmouseup = () => { isDragging = false; };

    loadWiki();
</script>
</body>
</html>
