<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goodbye, Chan</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #040d1a;
    color: #e8f0fe;
    overflow-x: hidden;
  }

  .hero {
    position: relative;
    height: 100vh;
    min-height: 600px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 30% 50%, rgba(29, 78, 216, 0.25) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 40%, rgba(14, 165, 233, 0.15) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 80%, rgba(37, 99, 235, 0.2) 0%, transparent 50%),
      linear-gradient(160deg, #040d1a 0%, #071428 50%, #050e1f 100%);
  }

  /* subtle floating particles */
  .particles {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    background: rgba(96, 165, 250, 0.15);
    animation: drift linear infinite;
  }
  @keyframes drift {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
  }

  .title-wrap {
    position: relative;
    z-index: 10;
    text-align: center;
    pointer-events: none;
    user-select: none;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: #60a5fa;
    margin-bottom: 1.2rem;
    opacity: 0.8;
  }

  .main-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3.2rem, 8vw, 6.5rem);
    font-weight: 700;
    line-height: 1.05;
    color: #e8f0fe;
    text-shadow: 0 0 80px rgba(96, 165, 250, 0.3);
  }

  .main-title em {
    font-style: italic;
    font-weight: 400;
    color: #93c5fd;
  }

  .subtitle {
    margin-top: 1.6rem;
    font-size: 14px;
    font-weight: 300;
    color: #4d7ab5;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .float-img {
    position: absolute;
    border-radius: 6px;
    overflow: hidden;
    box-shadow:
      0 20px 60px rgba(0, 0, 0, 0.6),
      0 0 0 1px rgba(96, 165, 250, 0.1);
    will-change: transform;
    transition: box-shadow 0.3s;
  }

  .float-img:hover {
    box-shadow:
      0 28px 80px rgba(0, 0, 0, 0.7),
      0 0 0 1px rgba(96, 165, 250, 0.35),
      0 0 30px rgba(96, 165, 250, 0.15);
    z-index: 20 !important;
  }

  .float-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: brightness(0.8) saturate(0.85) hue-rotate(10deg);
    transition: filter 0.3s;
  }

  .float-img:hover img {
    filter: brightness(0.95) saturate(1) hue-rotate(5deg);
  }

  /* blue tint overlay on each image */
  .float-img::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(14, 60, 140, 0.18);
    mix-blend-mode: multiply;
    pointer-events: none;
  }

  .content {
    min-height: 70vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 6rem 2rem;
    max-width: 600px;
    margin: 0 auto;
    text-align: center;
    gap: 2rem;
  }

  .content .farewell-line {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 3vw, 2.2rem);
    font-style: italic;
    color: #93c5fd;
    line-height: 1.4;
  }

  .content p {
    font-size: 16px;
    font-weight: 300;
    line-height: 1.95;
    color: #4d7ab5;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #3b82f6, transparent);
    margin: 0 auto;
  }
</style>
</head>
<body>

<section class="hero" id="hero">
  <div class="hero-bg"></div>
  <div class="particles" id="particles"></div>
  <div class="title-wrap">
    <p class="eyebrow">In Memory of donnies love for chan</p>
    <h1 class="main-title">
      Goodbye,<br><em>Chan</em>
    </h1>
    <p class="subtitle">Until we meet again</p>
  </div>
</section>

<section class="content">
  <p class="farewell-line">"Not goodbye, but see you later."</p>
  <div class="divider"></div>
  <p>
    "archway's a shithole" - chan
  </p>
  <p class="farewell-line">Chan's Requests for the page:</p>
  <iframe width="110" height="200" src="https://www.myinstants.com/instant/mommy-asmr-9120/embed/" frameborder="0" scrolling="no"></iframe>
  <p>why did you make me add this</p>
</section>

<script>
  /* ============================================================
     DEVELOPER CONFIG
     ============================================================ */

  /* Add your image paths or URLs here — up to 8 images */
  const IMAGES = [
    "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600",
    "https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=600",
    "https://images.unsplash.com/photo-1501854140801-50d01698950b?w=600",
    "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=600",
    "https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f?w=600",
    "https://images.unsplash.com/photo-1475924156734-496f6cac6ec1?w=600",
    "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=600",
    "https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?w=600",
  ];

  /* ============================================================
     Layout slots
     ============================================================ */
  const slots = [
    { top: '8%',  left: '4%',  w: 200, h: 260, speed: 0.12, rot: -4, z: 3 },
    { top: '5%',  left: '28%', w: 160, h: 200, speed: 0.22, rot:  2, z: 2 },
    { top: '12%', left: '62%', w: 220, h: 170, speed: 0.08, rot: -2, z: 4 },
    { top: '2%',  left: '78%', w: 155, h: 210, speed: 0.18, rot:  5, z: 3 },
    { top: '52%', left: '2%',  w: 170, h: 130, speed: 0.28, rot: -3, z: 2 },
    { top: '58%', left: '20%', w: 130, h: 170, speed: 0.14, rot:  4, z: 3 },
    { top: '55%', left: '72%', w: 180, h: 140, speed: 0.20, rot: -5, z: 2 },
    { top: '68%', left: '55%', w: 145, h: 185, speed: 0.10, rot:  3, z: 4 },
  ];

  /* ============================================================
     Runtime
     ============================================================ */

  // Particles
  const particleContainer = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 6 + 3;
    p.style.cssText = `
      width: ${size}px; height: ${size}px;
      left: ${Math.random() * 100}%;
      animation-duration: ${12 + Math.random() * 16}s;
      animation-delay: ${Math.random() * 14}s;
      opacity: ${0.1 + Math.random() * 0.3};
    `;
    particleContainer.appendChild(p);
  }

  // Images
  const hero = document.getElementById('hero');
  const live = [];

  slots.forEach((s, i) => {
    if (!IMAGES[i]) return;
    const el = document.createElement('div');
    el.className = 'float-img';
    el.style.cssText = `
      top:${s.top}; left:${s.left};
      width:${s.w}px; height:${s.h}px;
      z-index:${s.z};
      transform: rotate(${s.rot}deg) translateY(0px);
    `;
    const img = document.createElement('img');
    img.src = IMAGES[i];
    img.alt = '';
    el.appendChild(img);
    hero.appendChild(el);
    live.push({ el, speed: s.speed, rot: s.rot });
  });

  // Parallax scroll
  let ticking = false;
  window.addEventListener('scroll', () => {
    if (!ticking) {
      requestAnimationFrame(() => {
        const sy = window.scrollY;
        live.forEach(({ el, speed, rot }) => {
          el.style.transform = `rotate(${rot}deg) translateY(${-sy * speed}px)`;
        });
        ticking = false;
      });
      ticking = true;
    }
  }, { passive: true });
</script>
<script src="/chat-widget.js"></script>
</body>
</html>
