<!DOCTYPE html>
<html style="background:#0d1117">
<head>
    <title>Account Creator</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; color: white; background-color: #0d1117; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .creator-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 30px;
            width: 350px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .header { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; color: #58a6ff; }
        .header h2 { margin: 0; font-size: 20px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; margin-bottom: 5px; color: #8b949e; }
        
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: #58a6ff; }

        .checkbox-group { display: flex; align-items: center; gap: 10px; margin: 20px 0; font-size: 14px; cursor: pointer; }
        .checkbox-group input { cursor: pointer; width: 18px; height: 18px; }

        .btn-create {
            width: 100%;
            padding: 12px;
            background-color: #1f6feb;
            color: white;
            border: 1px solid #388bfd;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-create:hover { background-color: #388bfd; }

        .btn-back {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #8b949e;
            text-decoration: none;
            font-size: 13px;
        }
        .btn-back:hover { color: white; }

        #statusMsg { margin-top: 15px; font-size: 13px; text-align: center; min-height: 1.2em; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="creator-card">
        <div class="header">
            <span class="material-symbols-outlined">person_add</span>
            <h2>Account Creator</h2>
        </div>

        <div class="form-group">
            <label>User Email</label>
            <input type="text" id="newEmail" placeholder="user@example.com">
        </div>

        <div class="form-group">
            <label>Password (Min 6 chars)</label>
            <input type="password" id="newPassword" placeholder="••••••••">
        </div>

        <label class="checkbox-group">
            <input type="checkbox" id="isAdmin">
            <span>Set as Administrator</span>
        </label>

        <button class="btn-create" onclick="handleCreate()">Create Auth Account</button>
        
        <div id="statusMsg"></div>

        <a href="dash.html" class="btn-back">Return to Dashboard</a>
    </div>

    <script>
        const SUPABASE_URL = 'https://ljydseeyirvmtzgkuppo.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqeWRzZWV5aXJ2bXR6Z2t1cHBvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NzM4NzYsImV4cCI6MjA5MTA0OTg3Nn0.CmI1TfhskGOeWQlfkKSBkuytJkfWZijqt2ht-RIun3E';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function handleCreate() {
            const email = document.getElementById('newEmail').value.trim();
            const pass = document.getElementById('newPassword').value.trim();
            const isAdmin = document.getElementById('isAdmin').checked;
            const status = document.getElementById('statusMsg');

            if (!email || pass.length < 6) {
                status.style.color = "#ff7b72";
                status.innerText = "Error: Invalid email or password too short.";
                return;
            }

            status.style.color = "#8b949e";
            status.innerText = "Registering in Supabase Auth...";

            // Step 1: Create the User in Supabase Auth
            const { data, error: authError } = await _supabase.auth.signUp({
                email: email,
                password: pass
            });

            if (authError) {
                status.style.color = "#ff7b72";
                status.innerText = "Auth Error: " + authError.message;
                return;
            }

            // Step 2: Handle Admin Status
            // Since the SQL trigger automatically creates the profile row,
            // we just need to update it if they are an admin.
            if (isAdmin) {
                status.innerText = "Auth user created. Setting permissions...";
                
                // Give the trigger a small delay to finish the database insert
                setTimeout(async () => {
                    const { error: dbError } = await _supabase
                        .from('profiles')
                        .update({ is_admin: true })
                        .eq('email', email);

                    if (dbError) {
                        status.style.color = "#ffa657";
                        status.innerText = "Auth created, but failed to set Admin: " + dbError.message;
                    } else {
                        status.style.color = "#7ee787";
                        status.innerText = "Success! Admin account created.";
                    }
                }, 1500);
            } else {
                status.style.color = "#7ee787";
                status.innerText = "Success! Standard account created.";
            }

            // Clear inputs on success
            document.getElementById('newEmail').value = "";
            document.getElementById('newPassword').value = "";
            document.getElementById('isAdmin').checked = false;
        }

        // Security check: Back to index if not an admin
        function checkAccess() {
            const isLogged = localStorage.getItem("log24") === "true";
            const isAdmin = localStorage.getItem("isAdmin") === "true";
            if (!isLogged || !isAdmin) {
                window.location.href = "index.html";
            }
        }
        checkAccess();
    </script>
</body>
</html>
