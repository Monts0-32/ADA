<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | Tetris Module</title>
    <style>
        :root { --bg: #0d1117; --border: #30363d; --blue: #58a6ff; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; }
        header { width: 100%; padding: 20px; border-bottom: 1px solid var(--border); background: #161b22; display: flex; justify-content: space-between; box-sizing: border-box; }
        
        #game-container { margin-top: 40px; display: flex; gap: 30px; align-items: flex-start; }
        canvas { border: 4px solid var(--border); background: #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        .side-panel { background: #161b22; border: 1px solid var(--border); padding: 20px; border-radius: 8px; width: 200px; }
        .stat { font-size: 14px; color: #8b949e; margin-bottom: 15px; }
        .val { font-size: 24px; color: var(--blue); font-weight: bold; }
    </style>
</head>
<body>

<header>
    <a href="/specialcontent.html" style="color:var(--blue); text-decoration:none;">← Exit Module</a>
    <div style="font-weight:bold;">ADA TRAINING: TETRIS_CORE</div>
</header>

<div id="game-container">
    <canvas id="tetris" width="240" height="400"></canvas>
    
    <div class="side-panel">
        <div class="stat">CURRENT SCORE<br><span id="score" class="val">0</span></div>
        <div class="stat">ARCHIVE HIGH SCORE<br><span id="high-score" class="val">0</span></div>
        <hr style="border:0; border-top:1px solid var(--border); margin:20px 0;">
        <p style="font-size:11px; color:#8b949e;">Controls: ARROWS to move. UP to rotate. SPACE to drop.</p>
        <button onclick="location.reload()" style="width:100%; padding:10px; background:#238636; border:none; color:white; border-radius:4px; cursor:pointer;">Restart</button>
    </div>
</div>

<script>
    const API = "https://ada-relay.andrewdinglearchive.workers.dev";
    const email = localStorage.getItem('ada_user_email');
    const canvas = document.getElementById('tetris');
    const context = canvas.getContext('2d');
    context.scale(20, 20);

    let archiveHighScore = 0;

    // Load High Score from DB
    async function loadScore() {
        const res = await fetch(`${API}/game/get-score?email=${email}&game=tetris`);
        const data = await res.json();
        archiveHighScore = data.score;
        document.getElementById('high-score').innerText = archiveHighScore;
    }

    async function saveHighScore(finalScore) {
        if (finalScore <= archiveHighScore) return;
        await fetch(`${API}/game/save-score`, {
            method: 'POST',
            body: JSON.stringify({ email, gameId: 'tetris', score: finalScore })
        });
        document.getElementById('high-score').innerText = finalScore;
    }

    // --- TETRIS GAME LOGIC ---
    function createPiece(type) {
        if (type === 'T') return [[0, 1, 0], [1, 1, 1], [0, 0, 0]];
        if (type === 'O') return [[2, 2], [2, 2]];
        if (type === 'L') return [[0, 3, 0], [0, 3, 0], [0, 3, 3]];
        if (type === 'J') return [[0, 4, 0], [0, 4, 0], [4, 4, 0]];
        if (type === 'I') return [[0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0]];
        if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
        if (type === 'Z') return [[7, 7, 0], [0, 7, 7], [0, 0, 0]];
    }

    function draw() {
        context.fillStyle = '#000';
        context.fillRect(0, 0, canvas.width, canvas.height);
        drawMatrix(arena, {x: 0, y: 0});
        drawMatrix(player.matrix, player.pos);
    }

    function drawMatrix(matrix, offset) {
        matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    context.fillStyle = ['#f85149', '#58a6ff', '#238636', '#d29922', '#bc8cff', '#ff7b72', '#79c0ff'][value - 1];
                    context.fillRect(x + offset.x, y + offset.y, 1, 1);
                }
            });
        });
    }

    function merge(arena, player) {
        player.matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
            });
        });
    }

    function arenaSweep() {
        let rowCount = 1;
        outer: for (let y = arena.length - 1; y > 0; --y) {
            for (let x = 0; x < arena[y].length; ++x) {
                if (arena[y][x] === 0) continue outer;
            }
            const row = arena.splice(y, 1)[0].fill(0);
            arena.unshift(row);
            ++y;
            player.score += rowCount * 10;
            rowCount *= 2;
        }
    }

    function collide(arena, player) {
        const [m, o] = [player.matrix, player.pos];
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
            }
        }
        return false;
    }

    function createArena(w, h) {
        const matrix = [];
        while (h--) matrix.push(new Array(w).fill(0));
        return matrix;
    }

    function playerDrop() {
        player.pos.y++;
        if (collide(arena, player)) {
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
            updateScore();
        }
        dropCounter = 0;
    }

    function playerMove(dir) {
        player.pos.x += dir;
        if (collide(arena, player)) player.pos.x -= dir;
    }

    function playerReset() {
        const pieces = 'ILJOTSZ';
        player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
        player.pos.y = 0;
        player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
        if (collide(arena, player)) {
            saveHighScore(player.score);
            arena.forEach(row => row.fill(0));
            player.score = 0;
            updateScore();
        }
    }

    function playerRotate(dir) {
        const pos = player.pos.x;
        let offset = 1;
        rotate(player.matrix, dir);
        while (collide(arena, player)) {
            player.pos.x += offset;
            offset = -(offset + (offset > 0 ? 1 : -1));
            if (offset > player.matrix[0].length) {
                rotate(player.matrix, -dir);
                player.pos.x = pos;
                return;
            }
        }
    }

    function rotate(matrix, dir) {
        for (let y = 0; y < matrix.length; ++y) {
            for (let x = 0; x < y; ++x) {
                [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
        }
        if (dir > 0) matrix.forEach(row => row.reverse());
        else matrix.reverse();
    }

    let dropCounter = 0;
    let dropInterval = 1000;
    let lastTime = 0;

    function update(time = 0) {
        const deltaTime = time - lastTime;
        lastTime = time;
        dropCounter += deltaTime;
        if (dropCounter > dropInterval) playerDrop();
        draw();
        requestAnimationFrame(update);
    }

    function updateScore() {
        document.getElementById('score').innerText = player.score;
    }

    const arena = createArena(12, 20);
    const player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };

    document.addEventListener('keydown', event => {
        if (event.keyCode === 37) playerMove(-1);
        else if (event.keyCode === 39) playerMove(1);
        else if (event.keyCode === 40) playerDrop();
        else if (event.keyCode === 81) playerRotate(-1);
        else if (event.keyCode === 38) playerRotate(1);
        else if (event.keyCode === 32) { while(!collide(arena, player)) { player.pos.y++; } player.pos.y--; merge(arena, player); playerReset(); arenaSweep(); updateScore(); }
    });

    playerReset();
    updateScore();
    loadScore();
    update();
</script>

</html>
