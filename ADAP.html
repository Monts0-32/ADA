<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | Neural Relay v4</title>
    <link rel="icon" type="image/x-icon" href="/content/UI/ADA.png">
    <style>
        :root { --bg: #0d1117; --header: #161b22; --border: #30363d; --text: #c9d1d9; --blue: #58a6ff; --green: #238636; --warn: #d29922; }
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 5px; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #setup { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; flex-direction: column; }
        .box { max-width: 550px; width: 100%; background: #161b22; border: 1px solid var(--border); border-radius: 12px; padding: 40px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .beta-alert { background: rgba(210, 153, 34, 0.1); border: 1px solid var(--warn); color: var(--warn); padding: 15px; border-radius: 6px; margin-bottom: 25px; text-align: left; font-size: 12px; line-height: 1.5; }
        .input-group { display: flex; gap: 8px; margin-top: 20px; }
        input { flex: 1; background: #0d1117; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; outline: none; font-family: monospace; font-size: 14px; }
        input:focus { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.1); }
        .btn { background: var(--green); color: white; border: none; padding: 10px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn:hover { background: #2ea043; transform: translateY(-1px); }
        #viewer { flex: 1; display: none; background: #fff; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        .floating-nav { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); background: #161b22; border: 1px solid var(--border); padding: 10px 25px; border-radius: 50px; display: flex; gap: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.8); z-index: 2000; }
        .floating-nav a { color: var(--blue); text-decoration: none; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        #status { font-size: 11px; color: #8b949e; margin-top: 12px; font-family: monospace; }
    </style>

    <!-- UV bundle and config from your LOCAL /uv/ folder on Cloudflare Pages -->
    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>
    

    <!-- bare-mux and epoxy loaded from your Railway server -->
    <script src="/uv/baremux.js"></script>

    <script src="/config.js"></script>
    <script src="/page-transition.js"></script>
    <script src="/uplink.js"></script>
    <script src="/announcement-engine.js"></script>
    <script src="/header-engine.js"></script>
    <script src="/chat-widget.js"></script>
    <script src="/escape-key.js"></script>
</head>
<body>

<script>
    async function establishNeuralLink() {
        if (typeof runNeuralGuard !== 'function') { setTimeout(establishNeuralLink, 100); return; }
        const data = await runNeuralGuard('ADAP_access');
        if (data) window.dispatchEvent(new CustomEvent('ada-ready', { detail: data }));
    }
    establishNeuralLink();
</script>

<div id="setup">
    <div class="box">
        <div class="beta-alert">
            <strong>Notice:</strong> The proxy is in development (Developer note: fix WISP URL shwoing re-route error.)
        </div>
        <h2 style="margin:0; font-size: 24px;">Initialize Neural Link</h2>
        <p style="color:#8b949e; font-size:13px; margin-top:10px;">Establishing unlogged, cloaked uplink to external nodes.</p>
        <div class="input-group">
            <input type="text" id="target" placeholder="Search query or destination URL..." onkeydown="if(event.key==='Enter') launch()">
            <button class="btn" onclick="launch()">Initialize</button>
        </div>
        <div id="status">Initializing service worker...</div>
        <a style="color:#00c8ff; font-size:13px; margin-top:10px;" href="https://stats.uptimerobot.com/UVTvYQwETg">Status Page</a>
    </div>
</div>

<div id="viewer">
    <iframe id="frame"></iframe>
    <div class="floating-nav">
        <a href="#" onclick="location.reload()">New Uplink</a>
        <span style="color:var(--border)">|</span>
        <a href="/dash.html">Terminate Session</a>
    </div>
</div>

<script>
    const API = (window.ADA_CONFIG && window.ADA_CONFIG.API) || "/api";
    const RAILWAY   = "https://dev.ada-access.co.uk";
    const WISP_URL = 'wss://dev.ada-access.co.uk/wisp/';

    // ── Auth ──────────────────────────────────────────────────
    async function init() {
        const email = localStorage.getItem('ada_user_email');
        if (!email) { window.location.href = '/login.html'; return; }
        try {
            const res = await fetch(`${API}/sync?email=${encodeURIComponent(email)}`);
            const d   = await res.json();
            const pillName = document.getElementById('pill-name');
            const pillPic  = document.getElementById('pill-pic');
            if (pillName) pillName.innerText = d.user.display_name || d.user.email;
            if (pillPic)  pillPic.src        = d.user.profile_picture;
        } catch(e) { console.warn('Init error:', e); }
    }

    // ── Service Worker + bare-mux + Wisp setup ────────────────
    let swReady = false;

    async function registerSW() {
        const status = document.getElementById('status');
        if (!navigator.serviceWorker) {
            status.textContent = 'Service workers not supported.';
            return;
        }
        try {
            await navigator.serviceWorker.register('/uv/uv.sw.entry.js', {
                scope: '/uv/service/'
            });
            status.textContent = 'Service worker registered...';
    
            const connection = new BareMux.BareMuxConnection('/uv/baremux-worker.js');
    
            if ((await connection.getTransport()) !== '/uv/epoxy.mjs') {
                await connection.setTransport('/uv/epoxy.mjs', [
                    { wisp: WISP_URL }
                ]);
            }
    
            swReady = true;
            status.textContent = 'Neural relay ready.';
            console.log('Neural relay ready');
        } catch (err) {
            status.textContent = 'SW failed: ' + err.message;
            console.error('SW registration failed:', err);
        }
    }

    // ── Launch ────────────────────────────────────────────────
    async function launch() {
        let val = document.getElementById('target').value.trim();
        if (!val) return;

        // Make sure SW is ready before launching
        if (!swReady) {
            document.getElementById('status').textContent = 'Still initializing, please wait...';
            await registerSW();
        }

        let finalUrl;
        const isUrl = val.includes('.') && !val.includes(' ');
        if (isUrl) {
            finalUrl = val.startsWith('http') ? val : 'https://' + val;
        } else {
            finalUrl = `https://www.google.com/search?q=${encodeURIComponent(val)}`;
        }

        const encoded    = __uv$config.encodeUrl(finalUrl);
        const proxiedUrl = __uv$config.prefix + encoded;

        document.getElementById('setup').style.display = 'none';
        document.getElementById('viewer').style.display = 'block';
        document.getElementById('frame').src = proxiedUrl;
    }

    init();
    registerSW();
</script>
</body>
</html>
