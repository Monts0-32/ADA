<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | Neural Relay v3</title>
    <style>
        :root { --bg: #0d1117; --header: #161b22; --border: #30363d; --text: #c9d1d9; --blue: #58a6ff; --green: #238636; --warn-bg: rgba(187, 128, 9, 0.15); --warn-border: rgba(187, 128, 9, 0.4); }
        
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: var(--header); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        
        .user-pill { display: flex; align-items: center; gap: 8px; background: #21262d; border: 1px solid var(--border); padding: 4px 12px; border-radius: 20px; text-decoration: none; color: var(--text); font-size: 12px; }
        .user-pill img { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; }

        #setup { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; flex-direction: column; }
        .box { max-width: 500px; width: 100%; background: #161b22; border: 1px solid var(--border); border-radius: 12px; padding: 40px; text-align: center; }
        
        /* BETA NOTIFICATION STYLING */
        .beta-banner { 
            background: var(--warn-bg); 
            border: 1px solid var(--warn-border); 
            color: #d29922; 
            padding: 12px; 
            border-radius: 6px; 
            margin-bottom: 20px; 
            font-size: 12px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            text-align: left;
            line-height: 1.4;
        }

        .input-group { display: flex; gap: 8px; margin-top: 20px; }
        input { flex: 1; background: #0d1117; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; outline: none; font-family: monospace; }
        input:focus { border-color: var(--blue); }
        .btn { background: var(--green); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        #viewer { flex: 1; display: none; background: #fff; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        .controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--header); border: 1px solid var(--border); padding: 8px 20px; border-radius: 50px; display: flex; gap: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .controls a { color: var(--blue); text-decoration: none; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:15px;">
        <a href="/specialcontent.html" style="color:var(--blue); text-decoration:none; font-weight:600;">← Archive</a>
        <span style="font-weight:bold; font-size:14px;">ADA_SYSTEM: NEURAL_RELAY_v3</span>
        <a href="/profile.html" class="user-pill"><img id="pill-pic" src=""><span id="pill-name">...</span></a>
    </div>
</header>

<div id="setup">
    <div class="box">
        <!-- BETA NOTICE -->
        <div class="beta-banner">
            <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1.5a6.5 6.5 0 100 13 6.5 6.5 0 000-13zM0 8a8 8 0 1116 0A8 8 0 010 8z"></path><path d="M7.25 11h1.5V9.5h-1.5V11zm0-3h1.5V4h-1.5v4z"></path></svg>
            <div>
                <strong>BETA FEATURE:</strong> Neural Relay v3 is in active development. Expect bugs and rendering errors on high-security or complex JS-heavy websites.
            </div>
        </div>

        <h2 style="margin:0;">Initialize Neural Uplink</h2>
        <p style="color:#8b949e; font-size:13px; margin-top:10px;">Enter a URL to visit or a query to search via DuckDuckGo.</p>
        <div class="input-group">
            <input type="text" id="target" placeholder="Search or type URL..." onkeydown="if(event.key==='Enter') launch()">
            <button class="btn" onclick="launch()">Link</button>
        </div>
    </div>
</div>

<div id="viewer">
    <iframe id="frame"></iframe>
    <div class="controls">
        <a href="#" onclick="location.reload()">New Session</a>
        <a href="/specialcontent.html">Kill Link</a>
    </div>
</div>

<script>
    const API = "https://ada-relay.andrewdinglearchive.workers.dev";
    
    async function init() {
        const email = localStorage.getItem('ada_user_email');
        if(!email) { window.location.href='/login.html'; return; }

        const res = await fetch(`${API}/sync?email=${encodeURIComponent(email)}`);
        const d = await res.json();
        document.getElementById('pill-name').innerText = d.user.display_name || d.user.email;
        document.getElementById('pill-pic').src = d.user.profile_picture;
    }

    function launch() {
        let val = document.getElementById('target').value.trim();
        if(!val) return;

        let finalUrl = "";
        const isUrl = val.includes('.') && !val.includes(' ');
        
        if (isUrl) {
            finalUrl = val.startsWith('http') ? val : 'https://' + val;
        } else {
            finalUrl = `https://duckduckgo.com/?q=${encodeURIComponent(val)}`;
        }

        document.getElementById('setup').style.display = 'none';
        document.getElementById('viewer').style.display = 'block';
        document.getElementById('frame').src = `${API}/relay/v3?url=${encodeURIComponent(finalUrl)}`;
    }

    init();
</script>
</body>
</html>
