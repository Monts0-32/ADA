<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — ADA</title>
    <style>
        :root {
            --bg: #0d1117;
            --panel: #161b22;
            --btn-bg: #21262d;
            --border: #30363d;
            --border-hover: #444c56;
            --text: #c9d1d9;
            --muted: #8b949e;
            --muted-2: #6e7681;
            --blue: #58a6ff;
            --green: #238636;
            --green-hover: #2ea043;
            --red: #f85149;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            padding-top: 60px;
        }

        /* Logo / wordmark */
        .logo {
            font-size: 28px; font-weight: 600;
            color: var(--text); text-decoration: none;
            margin-bottom: 24px; letter-spacing: 1px;
        }

        /* The sign-in box (GitHub-style) */
        .box {
            width: 320px;
            background-color: var(--panel);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 20px;
        }

        /* Saved user card */
        .saved-user {
            display: flex; align-items: center; gap: 12px;
            padding: 12px; background: var(--bg);
            border: 1px solid var(--border); border-radius: 6px;
            margin-bottom: 16px; cursor: pointer; transition: 0.12s;
        }
        .saved-user:hover { border-color: var(--border-hover); background: var(--btn-bg); }
        .saved-user-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--btn-bg); overflow: hidden; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .saved-user-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .saved-user-info { flex: 1; min-width: 0; }
        .saved-user-name { font-size: 14px; font-weight: 600; color: var(--text); }
        .saved-user-email { font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .saved-user-status {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--green);
        }
        .saved-user-clear {
            background: transparent; border: 1px solid transparent;
            color: var(--muted); cursor: pointer;
            padding: 4px 8px; border-radius: 4px; font-size: 12px; line-height: 1;
        }
        .saved-user-clear:hover { color: var(--red); border-color: var(--red); }

        .divider {
            display: flex; align-items: center; gap: 10px;
            margin: 16px 0; color: var(--muted-2);
            font-size: 11px; letter-spacing: 0.3px;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }

        label {
            display: block; margin-bottom: 6px;
            font-size: 14px; font-weight: 400; text-align: left;
        }
        input {
            width: 100%; padding: 5px 12px; margin-bottom: 16px;
            background-color: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            box-sizing: border-box; outline: none;
            font-size: 14px; line-height: 20px;
        }
        input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(88,166,255,0.3);
        }

        .btn-go {
            width: 100%; background-color: var(--green);
            color: white; padding: 5px 16px;
            border: 1px solid rgba(240,246,252,0.1);
            border-radius: 6px; font-weight: 500;
            cursor: pointer; font-size: 14px; line-height: 20px;
            transition: 0.1s;
        }
        .btn-go:hover { background-color: var(--green-hover); }
        .btn-go:disabled { opacity: 0.5; cursor: not-allowed; }

        #msg {
            color: var(--red); font-size: 13px; margin-top: 10px;
            text-align: center; padding: 8px;
            background: rgba(248,81,73,0.08);
            border: 1px solid rgba(248,81,73,0.3);
            border-radius: 6px; display: none;
        }
        #msg.show { display: block; }

        .alt-link {
            margin-top: 16px; padding: 16px 0 0; font-size: 14px;
            color: var(--muted); text-align: center;
            border-top: 1px solid var(--border);
        }
        .alt-link a { color: var(--blue); text-decoration: none; }
        .alt-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<a href="/" class="logo">ADA</a>

<div class="box">
    <form id="login-form">
        <div id="saved-user-section"></div>

        <div class="divider" id="divider" style="display:none;">OR SIGN IN WITH ANOTHER ACCOUNT</div>

        <label for="email">Email address</label>
        <input type="email" id="email" required autocomplete="email">

        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password">

        <button type="submit" class="btn-go" id="btn-submit">Sign in</button>
        <div id="msg"></div>
    </form>

    <p class="alt-link">
        New to ADA? <a href="/account-creator.html">Create an account</a>.
    </p>
</div>

<script>
    const API = 'https://ada-relay.andrewdinglearchive.workers.dev';
    const DEFAULT_AVATAR = `data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzhCOTRBRSIgd2lkdGg9IjI0IiBoZWlnaHQ9IjI0Ij48cGF0aCBkPSJNMTIgMTJjMi4yMSAwIDQtMS43OSA0LTREOCAzLjM0IDgtNy4zNCA4LTQgMTQuMjEgMTJ6bTAgMmMtMi42NyAwLTggMS4zNC04IDR2MmgxNnYtMmMwLTIuNjYtNS4zMy00LTggNHoiLz48L3N2Zz4=`;

    function renderSavedUser() {
        const savedName = localStorage.getItem('ada_user_name');
        const savedEmail = localStorage.getItem('ada_user_email');
        const savedPic = localStorage.getItem('ada_user_pic');

        if (!savedEmail) return;

        const section = document.getElementById('saved-user-section');
        const divider = document.getElementById('divider');
        section.innerHTML = `
            <div class="saved-user" id="saved-user-card">
                <div class="saved-user-avatar">
                    <img src="${savedPic || DEFAULT_AVATAR}" onerror="this.src='${DEFAULT_AVATAR}'">
                </div>
                <div class="saved-user-info">
                    <div class="saved-user-name">${savedName || 'Welcome back'}</div>
                    <div class="saved-user-email">${savedEmail}</div>
                </div>
                <div class="saved-user-status"></div>
                <button type="button" class="saved-user-clear" id="clear-saved" title="Sign out">✕</button>
            </div>
        `;
        divider.style.display = 'flex';
        document.getElementById('email').value = savedEmail;

        if (localStorage.getItem('ada_session') === 'active') {
            fetch(`${API}/sync?email=${encodeURIComponent(savedEmail)}`)
                .then(r => r.json())
                .then(data => { if (data && data.user) location.href = '/dash.html'; })
                .catch(() => {});
        }

        document.getElementById('saved-user-card').addEventListener('click', (e) => {
            if (e.target.closest('#clear-saved')) return;
            document.getElementById('email').value = savedEmail;
            document.getElementById('password').focus();
        });

        document.getElementById('clear-saved').addEventListener('click', (e) => {
            e.stopPropagation();
            localStorage.removeItem('ada_user_name');
            localStorage.removeItem('ada_user_pic');
            localStorage.removeItem('ada_user_email');
            localStorage.removeItem('ada_session');
            localStorage.removeItem('ada_admin');
            location.reload();
        });
    }

    const form = document.getElementById('login-form');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('btn-submit');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        msg.classList.remove('show');
        btn.disabled = true;
        btn.textContent = 'Signing in…';

        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;

        try {
            const response = await fetch(`${API}/auth`, {
                method: 'POST',
                body: JSON.stringify({ email, pass }),
                headers: { 'Content-Type': 'application/json' }
            });
            const result = await response.json();

            if (result.success) {
                localStorage.setItem('ada_session', 'active');
                localStorage.setItem('ada_user_email', result.email);
                localStorage.setItem('ada_admin', result.admin);

                try {
                    const profileRes = await fetch(`${API}/profile/get?email=${encodeURIComponent(result.email)}`);
                    const profileData = await profileRes.json();
                    if (profileData && profileData.user) {
                        if (profileData.user.profile_picture) localStorage.setItem('ada_user_pic', profileData.user.profile_picture);
                        if (profileData.user.display_name) localStorage.setItem('ada_user_name', profileData.user.display_name);
                    }
                } catch (e) {}

                location.href = '/dash.html';
            } else {
                msg.textContent = 'Invalid email or password.';
                msg.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'Sign in';
            }
        } catch (err) {
            msg.textContent = 'Connection error. Try again.';
            msg.classList.add('show');
            btn.disabled = false;
            btn.textContent = 'Sign in';
        }
    });

    renderSavedUser();
</script>

</body>
</html>
