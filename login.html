<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in to ADA</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
        }
        .logo { font-size: 24px; font-weight: 600; margin-bottom: 24px; color: #f0f6fc; text-decoration: none; }
        .box {
            width: 300px;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 20px;
        }
        label { display: block; margin-bottom: 8px; font-size: 14px; text-align: left; }
        input {
            width: 100%;
            padding: 5px 12px;
            margin-bottom: 16px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
            outline: none;
        }
        input:focus { border-color: #58a6ff; ring: 1px solid #58a6ff; }
        .btn-go {
            width: 100%;
            background-color: #238636;
            color: white;
            padding: 8px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-go:hover { background-color: #2ea043; }
        #msg { color: #f85149; font-size: 13px; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<a href="/" class="logo">ADA</a>
<div class="box">
    <form id="login-form">
        <label>Email address</label>
        <input type="email" id="email" required>
        
        <label>Password</label>
        <input type="password" id="password" required>
        
        <button type="submit" class="btn-go">Sign in</button>
    </form>
    <div id="msg"></div>
</div>

<script>
    const form = document.getElementById('login-form');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        msg.innerText = "Verifying...";
    
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;

        try {
            // FIXED URL: Added https:// to make it an absolute path
            const response = await fetch('https://ada-relay.andrewdinglearchive.workers.dev/auth', {
                method: 'POST',
                body: JSON.stringify({ email, pass }),
                headers: { 'Content-Type': 'application/json' }
            });

            const result = await response.json();

            if (result.success) {
                localStorage.setItem('ada_session', 'active');
                localStorage.setItem('ada_user_email', result.email);
                localStorage.setItem('ada_admin', result.admin); // Store admin status
                window.location.href = '/dash.html'; // Redirect to dashboard
            } else {
                msg.innerText = 'Invalid email or password.';
            }
        } catch (err) {
            msg.innerText = 'Connection error. Try again.';
            console.error(err);
        }
    });
</script>
</body>
</html>
