<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign in — ADA</title>

    <!-- MASTER SCRIPTS -->
    <script src="/config.js"></script>
    <script src="/uplink.js"></script>

    <style>
        /* ──────────────────────────────────────────────────────────
           ADA OS — Retro Windows 95 / 2000 chrome (Dark Mode)
           ────────────────────────────────────────────────────────── */
        :root {
            --bg-desktop:        #0a0e14;
            --bg-desktop-accent: #141a22;
            --win-bg:            #1c2128;
            --win-bg-light:      #2a313c;
            --win-bg-dark:       #11151b;
            --win-bg-darker:     #0a0d12;
            --win-title:         #0d1117;
            --win-title-active:  linear-gradient(90deg, #2f81f7 0%, #1f6feb 100%);
            --win-title-inactive:linear-gradient(90deg, #2a313c 0%, #1c2128 100%);
            --win-text:          #e6edf3;
            --win-text-light:    #ffffff;
            --win-border-light:  #4a525e;
            --win-border-dark:   #080a0e;
            --win-text-blue:     #58a6ff;
            --taskbar-bg:        #161b22;
            --btn-green:         #238636;
            --blue:              #58a6ff;
            --red:               #f85149;
        }

        * { box-sizing: border-box; }

        /* THEMED SCROLLBAR */
        ::-webkit-scrollbar { width: 16px; height: 16px; }
        ::-webkit-scrollbar-track { background: var(--win-bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--win-bg-light); border-top: 1px solid var(--win-border-light); border-left: 1px solid var(--win-border-light); border-right: 1px solid var(--win-border-dark); border-bottom: 1px solid var(--win-border-dark); }
        ::-webkit-scrollbar-button { background: var(--win-bg-light); display: block; }

        html, body {
            margin: 0; padding: 0; height: 100%;
            font-family: "MS Sans Serif", "Microsoft Sans Serif", "Tahoma", "Geneva", sans-serif;
            font-size: 12px;
            color: var(--win-text);
            overflow: hidden;
        }

        /* ── DESKTOP ───────────────────────────────────────────── */
        #desktop {
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(88,166,255,0.06), transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0,0,0,0.30), transparent 50%),
                var(--bg-desktop);
            overflow: hidden;
        }

        /* ── WINDOWS ───────────────────────────────────────────── */
        .window {
            position: absolute;
            background: var(--win-bg);
            border-top:    2px solid var(--win-border-light);
            border-left:   2px solid var(--win-border-light);
            border-right:  2px solid var(--win-border-dark);
            border-bottom: 2px solid var(--win-border-dark);
            box-shadow: 1px 1px 0 0 #000, 0 0 0 1px #000;
            display: flex; flex-direction: column;
            min-width: 220px; min-height: 140px;
        }

        .titlebar {
            background: var(--win-title-active);
            color: var(--win-text-light);
            padding: 3px 4px 3px 6px;
            display: flex; justify-content: space-between; align-items: center;
            font-weight: bold; font-size: 12px;
            user-select: none;
            flex-shrink: 0;
        }
        .titlebar-text { display: flex; align-items: center; gap: 5px; }
        .titlebar-text .tb-icon { font-size: 13px; }
        .titlebar-buttons { display: flex; gap: 2px; }

        .titlebar-btn {
            width: 18px; height: 16px;
            background: var(--win-bg);
            border-top:    1px solid var(--win-border-light);
            border-left:   1px solid var(--win-border-light);
            border-right:  1px solid var(--win-border-dark);
            border-bottom: 1px solid var(--win-border-dark);
            display: flex; align-items: center; justify-content: center;
            font-family: "Marlett", "MS Sans Serif", monospace;
            font-size: 10px; line-height: 1; cursor: pointer;
            color: var(--win-text); padding: 0;
        }

        .menubar {
            display: flex; gap: 0;
            background: var(--win-bg);
            border-bottom: 1px solid var(--win-border-dark);
            padding: 1px 2px;
            flex-shrink: 0;
        }
        .menubar span {
            padding: 2px 8px; cursor: pointer; font-size: 12px; color: var(--win-text);
        }
        .menubar span:hover { background: var(--win-text-blue); color: var(--win-bg-darker); }

        .window-body {
            flex: 1;
            padding: 14px;
            overflow: auto;
            background: var(--win-bg);
            color: var(--win-text);
            border-top:    1px solid var(--win-border-dark);
            border-left:   1px solid var(--win-border-dark);
            border-right:  1px solid var(--win-border-light);
            border-bottom: 1px solid var(--win-border-light);
            margin: 2px;
        }

        .statusbar {
            padding: 3px 6px; font-size: 11px; color: var(--win-text);
            background: var(--win-bg);
            border-top: 1px solid var(--win-border-dark);
            display: flex; justify-content: space-between; gap: 4px;
            flex-shrink: 0;
        }
        .statusbar-cell {
            border-top:    1px solid var(--win-border-dark);
            border-left:   1px solid var(--win-border-dark);
            border-right:  1px solid var(--win-border-light);
            border-bottom: 1px solid var(--win-border-light);
            padding: 1px 6px; flex: 1;
            color: var(--win-text);
        }

        /* ── BUTTONS (chiseled chrome) ─────────────────────────── */
        .btn {
            background: var(--win-bg);
            color: var(--win-text);
            border-top:    2px solid var(--win-border-light);
            border-left:   2px solid var(--win-border-light);
            border-right:  2px solid var(--win-border-dark);
            border-bottom: 2px solid var(--win-border-dark);
            padding: 5px 16px;
            font-family: inherit; font-size: 12px;
            cursor: pointer; min-width: 90px;
            box-shadow: 1px 1px 0 0 #000;
        }
        .btn:active {
            border-top:    2px solid var(--win-border-dark);
            border-left:   2px solid var(--win-border-dark);
            border-right:  2px solid var(--win-border-light);
            border-bottom: 2px solid var(--win-border-light);
            padding: 6px 15px 4px 17px;
        }
        .btn:disabled { color: var(--win-bg-light); text-shadow: 1px 1px 0 #000; cursor: not-allowed; }
        .btn-primary  { font-weight: bold; }

        .field {
            background: #0d1117; color: var(--win-text);
            border-top:    1px solid var(--win-border-dark);
            border-left:   1px solid var(--win-border-dark);
            border-right:  1px solid var(--win-border-light);
            border-bottom: 1px solid var(--win-border-light);
            padding: 4px 6px; font-family: inherit; font-size: 12px;
            outline: none; width: 100%; box-sizing: border-box;
        }
        .field:focus { background: #161b22; border-right-color: var(--win-text-blue); border-bottom-color: var(--win-text-blue); }
        input.field::placeholder { color: var(--win-bg-light); font-style: italic; }

        /* ── WINDOW-INTERNAL CONTENT ───────────────────────────── */
        .window h2 {
            margin: 0 0 8px 0; font-size: 13px; color: var(--win-text-blue);
            font-weight: bold;
        }
        .window p { margin: 0 0 10px 0; line-height: 1.45; }
        .window p.subtle { color: #8b949e; font-style: italic; font-size: 11px; }

        .field-group { display: flex; flex-direction: column; gap: 3px; margin-bottom: 10px; }
        .field-group label { font-size: 11px; font-weight: bold; color: var(--win-text); }

        /* ── USER TILE / PROFILE PICTURE ───────────────────────── */
        .user-tile {
            display: flex; flex-direction: column; align-items: center;
            gap: 8px; margin-bottom: 14px; padding: 8px 0 4px;
        }
        .user-avatar {
            width: 96px; height: 96px;
            background: #0d1117;
            border-top:    1px solid var(--win-border-dark);
            border-left:   1px solid var(--win-border-dark);
            border-right:  1px solid var(--win-border-light);
            border-bottom: 1px solid var(--win-border-light);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-avatar .avatar-letter {
            font-size: 40px; font-weight: bold; color: var(--win-text-blue);
            text-transform: uppercase;
        }
        .user-name {
            font-size: 15px; font-weight: bold; color: var(--win-text);
            letter-spacing: 0.2px; margin-top: 4px;
        }
        .user-email {
            font-size: 11px; color: #8b949e;
            font-family: "Courier New", monospace;
        }

        /* Welcome-back / row of two buttons */
        .row-buttons { display: flex; gap: 8px; justify-content: center; margin-top: 14px; }
        .row-buttons .btn { flex: 1; }

        /* ── ERROR BANNER ──────────────────────────────────────── */
        .login-msg {
            margin-top: 10px;
            color: var(--red);
            font-size: 11px;
            padding: 4px 8px;
            background: rgba(248,81,73,0.10);
            border-top:    1px solid rgba(248,81,73,0.5);
            border-left:   1px solid rgba(248,81,73,0.5);
            border-right:  1px solid #600;
            border-bottom: 1px solid #600;
            display: none;
            text-align: center;
            font-weight: bold;
        }
        .login-msg.show { display: block; }

        /* ── SWITCH-USER LINK ──────────────────────────────────── */
        .switch-user {
            display: block; text-align: center;
            margin-top: 12px;
            color: var(--win-text-blue);
            font-size: 11px; font-weight: bold;
            cursor: pointer; padding: 4px 8px;
        }
        .switch-user:hover { text-decoration: underline; color: var(--win-text-light); }

        /* ── MISC ──────────────────────────────────────────────── */
        .hidden { display: none !important; }

        /* Back link (bottom-left) */
        #back-option {
            position: fixed; left: 12px; bottom: 12px; z-index: 10;
        }
    </style>
</head>
<body>

<!-- ═════════════ DESKTOP ═════════════ -->
<div id="desktop">

    <!-- ── WINDOW: Sign in ── -->
    <div class="window" id="win-login" data-win="login" style="left: 50%; top: 50%; transform: translate(-50%, -50%); width: 360px;">
        <div class="titlebar">
            <div class="titlebar-text"><span class="tb-icon">🔐</span><span id="tb-title">Sign in to ADA OS</span></div>
            <div class="titlebar-buttons">
                <button class="titlebar-btn" title="Help">?</button>
                <button class="titlebar-btn" onclick="window.location.href='/index.html'" title="Close">×</button>
            </div>
        </div>
        <div class="menubar">
            <span>File</span>
            <span>Edit</span>
            <span>Help</span>
        </div>
        <div class="window-body">

            <!-- ═══ ALREADY LOGGED IN: Welcome-back card ═══ -->
            <div id="resume-section" class="hidden">
                <div class="user-tile">
                    <div class="user-avatar">
                        <img id="resume-avatar-img" src="" alt="">
                        <span class="avatar-letter" id="resume-avatar-letter"></span>
                    </div>
                    <div class="user-name" id="resume-name">User</div>
                    <div class="user-email" id="resume-email">user@example.com</div>
                </div>
                <p class="subtle" style="text-align:center; margin-bottom:4px;">You are already signed in.</p>
                <div class="row-buttons">
                    <button class="btn" id="btn-switch-user">Switch user</button>
                    <button class="btn btn-primary" id="btn-continue">Continue to dash</button>
                </div>
            </div>

            <!-- ═══ SAVED-USER TILE: password prompt ═══ -->
            <div id="saved-tile-section" class="hidden">
                <div class="user-tile">
                    <div class="user-avatar">
                        <img id="saved-avatar-img" src="" alt="">
                        <span class="avatar-letter" id="saved-avatar-letter"></span>
                    </div>
                    <div class="user-name" id="saved-name">User</div>
                    <div class="user-email" id="saved-email">user@example.com</div>
                </div>
                <form id="login-form-saved">
                    <div class="field-group">
                        <label for="password-saved">PASSWORD</label>
                        <input type="password" id="password-saved" class="field" placeholder="••••••••" required autocomplete="current-password" autofocus>
                    </div>
                    <div class="row-buttons" style="margin-top:14px;">
                        <button type="button" class="btn" id="btn-saved-cancel">Switch user</button>
                        <button type="submit" class="btn btn-primary" id="btn-submit-saved">Sign in</button>
                    </div>
                    <div class="login-msg" id="msg-saved"></div>
                </form>
            </div>

            <!-- ═══ OTHER-USER FORM: full email + password ═══ -->
            <div id="other-user-section" class="hidden">
                <h2>ADA Archive</h2>
                <p class="subtle">Sign in to continue.</p>
                <form id="login-form-other">
                    <div class="field-group">
                        <label for="email-other">EMAIL</label>
                        <input type="email" id="email-other" class="field" placeholder="you@example.com" required autocomplete="email">
                    </div>
                    <div class="field-group">
                        <label for="password-other">PASSWORD</label>
                        <input type="password" id="password-other" class="field" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                    <div class="row-buttons" style="margin-top:14px;">
                        <button type="button" class="btn" id="btn-other-cancel">Back</button>
                        <button type="submit" class="btn btn-primary" id="btn-submit-other">Sign in</button>
                    </div>
                    <div class="login-msg" id="msg-other"></div>
                </form>
            </div>

        </div>
        <div class="statusbar">
            <div class="statusbar-cell" id="status-stage">Ready</div>
            <div class="statusbar-cell" id="status-user">guest</div>
        </div>
    </div>

</div><!-- /#desktop -->

<div id="back-option" class="hidden">
    <button class="btn" onclick="window.location.href='/index.html'">← Back</button>
</div>

<script>
    const API = (window.ADA_CONFIG && window.ADA_CONFIG.API) || "/api";
    const DEFAULT_AVATAR = `data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzhCOTRBRSIgd2lkdGg9IjI0IiBoZWlnaHQ9IjI0Ij48cGF0aCBkPSJNMTIgMTJjMi4yMSAwIDQtMS43OSA0LTREOCAzLjM0IDgtNy4zNCA4LTQgMTQuMjEgMTIgMTJ6bTAgMmMtMi42NyAwLTggMS4zNC04IDR2MmgxNnYtMmMwLTIuNjYtNS4zMy00LTggNHoiLz48L3N2Zz4=`;

    function showSection(id) {
        ['resume-section', 'saved-tile-section', 'other-user-section'].forEach(s => {
            const el = document.getElementById(s);
            if (el) el.classList.add('hidden');
        });
        const target = document.getElementById(id);
        if (target) target.classList.remove('hidden');
        const stage = document.getElementById('status-stage');
        if (stage) {
            if (id === 'resume-section') stage.textContent = 'Session active';
            else if (id === 'saved-tile-section') stage.textContent = 'Enter password';
            else stage.textContent = 'Sign in';
        }
    }

    function applyAvatar(imgEl, letterEl, savedPic, fallbackName) {
        if (savedPic) {
            imgEl.src = savedPic;
            imgEl.style.display = '';
            letterEl.style.display = 'none';
        } else {
            imgEl.src = DEFAULT_AVATAR;
            letterEl.textContent = (fallbackName || '?')[0].toUpperCase();
            imgEl.style.display = 'none';
            letterEl.style.display = '';
        }
        imgEl.onerror = () => {
            imgEl.style.display = 'none';
            letterEl.style.display = '';
            letterEl.textContent = (fallbackName || '?')[0].toUpperCase();
        };
    }

    function renderSavedTile() {
        const savedName  = localStorage.getItem('ada_user_name');
        const savedEmail = localStorage.getItem('ada_user_email');
        const savedPic   = localStorage.getItem('ada_user_pic');
        const session    = localStorage.getItem('ada_session');

        // Update the statusbar "user" cell to whoever we have.
        const statusUser = document.getElementById('status-user');
        if (statusUser) statusUser.textContent = savedEmail ? savedEmail.split('@')[0] : 'guest';

        if (session === 'active' && savedEmail) {
            // ── Already signed in: show welcome-back card, NOT auto-redirect.
            document.getElementById('resume-name').textContent  = savedName || savedEmail.split('@')[0];
            document.getElementById('resume-email').textContent = savedEmail;
            applyAvatar(
                document.getElementById('resume-avatar-img'),
                document.getElementById('resume-avatar-letter'),
                savedPic,
                savedName || savedEmail
            );
            document.getElementById('tb-title').textContent = 'Welcome back — ADA OS';
            showSection('resume-section');

            document.getElementById('btn-continue').onclick = () => {
                window.location.href = '/dash.html';
            };
            document.getElementById('btn-switch-user').onclick = () => {
                // Log them out and show the full email+password form
                localStorage.removeItem('ada_session');
                document.getElementById('tb-title').textContent = 'Sign in to ADA OS';
                showSection('other-user-section');
            };
            return;
        }

        if (savedEmail) {
            // ── Saved user, but session cleared: show password prompt.
            document.getElementById('saved-name').textContent  = savedName || savedEmail.split('@')[0];
            document.getElementById('saved-email').textContent = savedEmail;
            applyAvatar(
                document.getElementById('saved-avatar-img'),
                document.getElementById('saved-avatar-letter'),
                savedPic,
                savedName || savedEmail
            );
            showSection('saved-tile-section');

            document.getElementById('login-form-saved').addEventListener('submit', (e) => {
                e.preventDefault();
                doLogin(savedEmail, document.getElementById('password-saved').value, 'msg-saved', 'btn-submit-saved');
            });
            document.getElementById('btn-saved-cancel').onclick = () => {
                localStorage.removeItem('ada_user_name');
                localStorage.removeItem('ada_user_email');
                localStorage.removeItem('ada_user_pic');
                showSection('other-user-section');
            };
            return;
        }

        // ── Nothing saved: show the full login form.
        showSection('other-user-section');
    }

    /* Shared login flow */
    async function doLogin(email, pass, msgId, btnId) {
        const msg = document.getElementById(msgId);
        const btn = document.getElementById(btnId);
        if (msg) { msg.classList.remove('show'); msg.textContent = ''; }
        btn.disabled = true;
        const originalText = btn.textContent;
        btn.textContent = 'Signing in…';

        try {
            const response = await fetch(`${API}/auth`, {
                method: 'POST',
                body: JSON.stringify({ email, pass }),
                headers: { 'Content-Type': 'application/json' }
            });
            const result = await response.json();

            if (result.success) {
                localStorage.setItem('ada_session', 'active');
                localStorage.setItem('ada_user_email', result.email);
                localStorage.setItem('ada_admin', result.admin);
                try {
                    const profileRes = await fetch(`${API}/profile/get?email=${encodeURIComponent(result.email)}`);
                    const profileData = await profileRes.json();
                    if (profileData && profileData.user) {
                        if (profileData.user.profile_picture) localStorage.setItem('ada_user_pic', profileData.user.profile_picture);
                        if (profileData.user.display_name)    localStorage.setItem('ada_user_name', profileData.user.display_name);
                    }
                } catch (e) {}
                window.location.href = '/dash.html';
            } else {
                if (msg) {
                    msg.textContent = 'Incorrect password.';
                    msg.classList.add('show');
                }
                btn.disabled = false;
                btn.textContent = originalText;
            }
        } catch (err) {
            if (msg) {
                msg.textContent = 'Connection error.';
                msg.classList.add('show');
            }
            btn.disabled = false;
            btn.textContent = originalText;
        }
    }

    /* Other-user form wiring */
    const otherForm = document.getElementById('login-form-other');
    otherForm.addEventListener('submit', (e) => {
        e.preventDefault();
        doLogin(
            document.getElementById('email-other').value,
            document.getElementById('password-other').value,
            'msg-other',
            'btn-submit-other'
        );
    });
    document.getElementById('btn-other-cancel').onclick = () => {
        // If we have a saved user, go back to saved-tile form; else just clear fields.
        if (localStorage.getItem('ada_user_email')) {
            renderSavedTile();
        } else {
            document.getElementById('email-other').value = '';
            document.getElementById('password-other').value = '';
        }
    };

    renderSavedTile();
</script>
</body>
</html>
