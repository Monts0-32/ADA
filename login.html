<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in to ADA</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }
        .auth-container {
            width: 300px;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 20px;
            margin-top: 20px;
        }
        .logo { font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; }
        input {
            width: 100%;
            padding: 6px 12px;
            margin-bottom: 16px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
        }
        .btn-submit {
            width: 100%;
            background-color: #238636;
            color: white;
            padding: 8px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="logo">ADA</div>
<div class="auth-container">
    <form id="login-form">
        <label>Email address</label>
        <input type="email" id="email" required>
        
        <label>Password</label>
        <input type="password" id="password" required>
        
        <button type="submit" class="btn-submit">Sign in</button>
    </form>
</div>

<script>
    const form = document.getElementById('login-form');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
    
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;

    // We point to our own internal worker endpoint
        const response = await fetch('ada-relay.andrewdinglearchive.workers.dev', {
            method: 'POST',
            body: JSON.stringify({ email, pass }),
            headers: { 'Content-Type': 'application/json' }
        });

        const result = await response.json();

        if (result.success) {
            // Store session locally
            localStorage.setItem('ada_session', 'active');
            localStorage.setItem('ada_user_email', result.email);
        // Redirect to main archive
            window.location.href = '/index.html';
        } else {
            alert('Invalid credentials. Access denied.');
        }
    });
</script>
</body>
</html>
