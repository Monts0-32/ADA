<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Access Denied</title>
    <style>
        body { background: #0d1117; color: #f85149; font-family: sans-serif; display: flex; 
               flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .warning-box { border: 1px solid #f85149; padding: 40px; border-radius: 6px; text-align: center; }
        h1 { margin-top: 0; }
        .btn { color: white; border: 1px solid #30363d; padding: 10px 20px; text-decoration: none; border-radius: 6px; margin-top: 20px; display: inline-block; }
    </style>
</head>
<body>
    <div class="warning-box">
        <h1>ACCESS BLOCKED</h1>
        <p>Your account has been restricted from viewing this section of the ADA Archive.</p>
        <p>Contact a system administrator for more information.</p>
        <a href="/" class="btn">Return Home</a>
    </div>
</body>
</html>
