<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | Archive Wiki</title>
    <style>
        :root { --bg: #0d1117; --header: #161b22; --border: #30363d; --text: #c9d1d9; --btn-green: #238636; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        header { background: var(--header); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 600; color: #f0f6fc; text-decoration: none; }

        .toolbar { background: #161b22; border-bottom: 1px solid var(--border); padding: 8px 24px; display: flex; gap: 8px; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; }
        .toolbar button, .toolbar label { background: #21262d; border: 1px solid var(--border); color: white; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; display: flex; align-items: center; }
        .toolbar button:hover { background: #30363d; }
        
        /* Layout */
        .editor-container { max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        #visual-editor, #source-editor { 
            width: 100%; min-height: 600px; padding: 20px; 
            background: #0d1117; border: 1px solid var(--border); 
            border-radius: 6px; box-sizing: border-box; outline: none; 
            color: var(--text); font-family: inherit; line-height: 1.6;
        }
        #source-editor { font-family: 'Courier New', monospace; display: none; white-space: pre-wrap; resize: vertical; }

        /* Image Styling */
        #visual-editor img { 
            max-width: 100%; 
            resize: both; 
            overflow: auto; 
            display: inline-block; 
            border: 2px solid transparent; 
            cursor: move;
        }
        #visual-editor img:active { border-color: #58a6ff; }

        .status-bar { max-width: 1000px; margin: 10px auto; font-size: 12px; color: #8b949e; display: flex; justify-content: space-between; padding: 0 20px; }
        .btn-save { background: var(--btn-green) !important; font-weight: bold; border: none !important; margin-left: auto; }
        .toggle-btn.active { background: #58a6ff; color: white; border-color: #58a6ff; }
        
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<header>
    <a href="/dash.html" class="logo">ADA Wiki Editor</a>
    <div id="user-info" style="font-size: 11px; opacity: 0.7;"></div>
</header>

<div class="toolbar">
    <button onclick="exec('bold')" title="Bold"><b>B</b></button>
    <button onclick="exec('italic')" title="Italic"><i>I</i></button>
    <button onclick="exec('underline')" title="Underline"><u>U</u></button>
    <div style="width: 1px; background: var(--border); margin: 0 5px;"></div>
    
    <label for="img-upload">🖼 Upload Image</label>
    <input type="file" id="img-upload" accept="image/*" onchange="handleImage(this)">
    
    <div style="width: 1px; background: var(--border); margin: 0 5px;"></div>
    
    <button onclick="toggleEditor()" id="source-toggle" class="toggle-btn">HTML Source</button>
    
    <button class="btn-save" onclick="saveWiki()">Save to Archive</button>
</div>

<div class="status-bar">
    <span id="last-edited">Loading...</span>
    <span>Drag images to move • Resize via bottom-right handle</span>
</div>

<div class="editor-container">
    <!-- Rich Text View -->
    <div id="visual-editor" contenteditable="true"></div>
    <!-- Code View -->
    <textarea id="source-editor"></textarea>
</div>

<script>
    const API = "https://ada-relay.andrewdinglearchive.workers.dev";
    const userEmail = localStorage.getItem('ada_user_email');
    const visual = document.getElementById('visual-editor');
    const source = document.getElementById('source-editor');
    let isSourceMode = false;

    if (!userEmail) window.location.href = '/login.html';
    document.getElementById('user-info').innerText = userEmail;

    // Load Data
    async function loadWiki() {
        const res = await fetch(`${API}/wiki/load`);
        const data = await res.json();
        visual.innerHTML = data.content;
        source.value = data.content;
        document.getElementById('last-edited').innerText = `Last saved by: ${data.last_user}`;
    }

    // Toggle between Visual and Source
    function toggleEditor() {
        if (!isSourceMode) {
            source.value = visual.innerHTML;
            visual.style.display = 'none';
            source.style.display = 'block';
            document.getElementById('source-toggle').classList.add('active');
        } else {
            visual.innerHTML = source.value;
            source.style.display = 'none';
            visual.style.display = 'block';
            document.getElementById('source-toggle').classList.remove('active');
        }
        isSourceMode = !isSourceMode;
    }

    // Handle Image Upload (Local File)
    function handleImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                // Create image with resize style
                const imgHtml = `<img src="${e.target.result}" style="width:300px; height:auto; display:inline-block;">`;
                if (isSourceMode) {
                    source.value += imgHtml;
                } else {
                    visual.focus();
                    document.execCommand('insertHTML', false, imgHtml);
                }
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // Formatting
    function exec(cmd) {
        if (isSourceMode) return; // Disable formatting in code view
        document.execCommand(cmd, false, null);
    }

    // Save Data
    async function saveWiki() {
        const finalContent = isSourceMode ? source.value : visual.innerHTML;
        const res = await fetch(`${API}/wiki/save`, {
            method: 'POST',
            body: JSON.stringify({ content: finalContent, user: userEmail }),
            headers: { 'Content-Type': 'application/json' }
        });
        if (res.ok) {
            alert("Archive Updated Successfully.");
            loadWiki();
        }
    }

    loadWiki();
</script>
</body>
</html>
