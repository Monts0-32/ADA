<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
    /* Neutralize the Smoothwall content-filter extension on this page.
       Layer 1: freeze chrome.runtime so the extension cannot upload page
                content or receive allow/block messages from its background.
       Layer 2: nuke the page-hide overlay element (id="smoothwall-protect")
                the moment it appears, in case the content script still
                manages to inject the overlay.
       Layer 3: re-assert the stub periodically in case something undoes it. */
    (function () {
        'use strict';
        var STUB = { sendMessage: function () {}, id: 'recall-disabled' };
        function stubRuntime() {
            try {
                Object.defineProperty(window.chrome, 'runtime', {
                    configurable: false,
                    get: function () { return STUB; }
                });
                return true;
            } catch (e) { return false; }
        }
        stubRuntime();
        function nukeOverlay() {
            try {
                var el = document.getElementById('smoothwall-protect');
                if (el && el.parentNode) el.parentNode.removeChild(el);
            } catch (e) {}
        }
        function startObserver() {
            nukeOverlay();
            if (!document.body) { setTimeout(startObserver, 10); return; }
            try {
                new MutationObserver(nukeOverlay).observe(document.body, {
                    childList: true, subtree: true
                });
            } catch (e) {}
        }
        if (document.body) startObserver();
        else document.addEventListener('DOMContentLoaded', startObserver);
        setInterval(function () { stubRuntime(); nukeOverlay(); }, 2000);
    })();
    </script>
    <title>ADA | Account Creator</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; display: flex; justify-content: center; padding-top: 100px; }
        .box { background: #161b22; border: 1px solid #30363d; padding: 30px; border-radius: 6px; width: 350px; }
        input { width: 100%; padding: 8px; margin: 10px 0; background: #0d1117; border: 1px solid #30363d; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .back { color: #8b949e; text-decoration: none; font-size: 12px; display: block; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>
    <script src="/config.js"></script>
    <script src="/page-transition.js"></script>
    <script src="/uplink.js"></script>
    <script src="/announcement-engine.js"></script>
    <script src="/escape-key.js"></script>
    <script>
        async function start() {
            if (typeof runNeuralGuard !== 'function') { setTimeout(start, 100); return; }
            // Admins can enter even without 'wiki_access'
            await runNeuralGuard('account_manage'); 
        }
        start();
    </script>
    <div class="box">
        <h3>System Account Creator</h3>
        <input type="email" id="email" placeholder="New User Email">
        <input type="text" id="pass" placeholder="Initial Password">
        <label style="font-size: 13px;"><input type="checkbox" id="admin"> Grant Admin Privileges</label>
        <button class="btn" style="margin-top: 20px;" onclick="saveUser()">Create Account</button>
        <a href="/dash.html" class="back">← Back to Dashboard</a>
    </div>

    <script>
        async function saveUser() {
            const API = (window.ADA_CONFIG && window.ADA_CONFIG.API) || "/api";
            await fetch(`${API}/admin/create-user`, {
                method: 'POST',
                body: JSON.stringify({
                    email: document.getElementById('email').value,
                    pass: document.getElementById('pass').value,
                    isAdmin: document.getElementById('admin').checked
                })
            });
            alert('User successfully added to database.');
            window.location.href = '/account-manager.html';
        }
    </script>
    <script src="/chat-widget.js"></script>
</body>
</html>
