<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | System Management</title>
    <style>
        :root { 
            --bg: #0d1117; --header: #161b22; --border: #30363d; --text: #c9d1d9; 
            --btn-red: #da3633; --btn-blue: #1f6feb; --btn-green: #238636; --gold: #d29922; 
        }

        /* THEMED SCROLLBAR */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 5px; border: 2px solid var(--bg); }
        ::-webkit-scrollbar-thumb:hover { background: #444c56; }

        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 40px; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        header { margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav-link { color: #58a6ff; text-decoration: none; font-size: 14px; }
        .nav-link:hover { text-decoration: underline; }

        table { width: 100%; border-collapse: collapse; background: #161b22; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
        th, td { padding: 12px; border: 1px solid var(--border); text-align: left; vertical-align: top; font-size: 13px; }
        th { background: #21262d; color: #f0f6fc; font-weight: 600; }

        /* Identity Styling */
        .user-cell { display: flex; align-items: center; gap: 10px; }
        .user-cell img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: #0d1117; border: 1px solid var(--border); }
        .user-name { font-weight: bold; color: #f0f6fc; display: block; }
        .user-email { font-size: 11px; color: #8b949e; }

        /* Role Badges */
        .role-badge { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; border: 1px solid transparent; }
        .role-admin { background: rgba(210, 153, 34, 0.15); color: var(--gold); border-color: var(--gold); }
        .role-user { background: rgba(139, 148, 158, 0.1); color: #8b949e; border-color: #30363d; }

        /* Management Pills */
        .pill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 12px; font-size: 10px; margin: 2px; border: 1px solid var(--border); }
        .pill-perm { background: rgba(35, 134, 54, 0.1); color: #3fb950; border-color: rgba(63, 185, 80, 0.4); }
        .pill-block { background: rgba(248, 81, 73, 0.1); color: #f85149; border-color: rgba(248, 81, 73, 0.4); }
        .pill-badge { background: rgba(88, 166, 255, 0.1); color: #58a6ff; border-color: rgba(88, 166, 255, 0.4); }
        
        .remove-x { margin-left: 6px; cursor: pointer; font-weight: bold; opacity: 0.6; }
        .remove-x:hover { opacity: 1; color: white; }

        /* Action Buttons */
        .btn { padding: 5px 10px; border-radius: 6px; cursor: pointer; border: 1px solid var(--border); font-size: 11px; font-weight: 600; color: white; margin: 2px; transition: 0.2s; }
        .btn-add { background: transparent; color: #58a6ff; border: none; padding: 0; margin-top: 5px; text-decoration: underline; display: block; }
        .btn-red { background: var(--btn-red); }
        .btn-blue { background: var(--btn-blue); }
        .btn-gold { background: var(--gold); color: #000; border: none; }
        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <a href="/dash.html" class="nav-link">← Return to Dashboard</a>
            <h2 style="margin: 10px 0 0 0;">Archive Identity & Permissions Manager</h2>
        </div>
        <div id="stats" style="font-size: 12px; color: #8b949e;">Connecting to D1 Relay...</div>
    </header>
    
    <table>
        <thead>
            <tr>
                <th width="18%">Identity</th>
                <th width="10%">Status</th>
                <th width="20%">Permission Tags</th>
                <th width="20%">Badge Corner</th>
                <th width="15%">Access Blocks</th>
                <th width="17%">Management</th>
            </tr>
        </thead>
        <tbody id="user-list">
            <!-- Rows loaded via JS -->
        </tbody>
    </table>
</div>

<script>
    const API = "https://ada-relay.andrewdinglearchive.workers.dev";
    const myEmail = localStorage.getItem('ada_user_email');

    async function loadUsers() {
        const listBody = document.getElementById('user-list');
        try {
            const res = await fetch(`${API}/admin/list-users`);
            const users = await res.json();
            
            document.getElementById('stats').innerText = `${users.length} Active Records Linked`;

            listBody.innerHTML = users.map(u => `
                <tr>
                    <td>
                        <div class="user-cell">
                            <img src="${u.profile_picture}">
                            <div>
                                <span class="user-name">${u.display_name || 'Anonymous'}</span>
                                <span class="user-email">${u.email}</span>
                            </div>
                        </div>
                    </td>
                    <td>
                        <span class="role-badge ${u.is_admin ? 'role-admin' : 'role-user'}">
                            ${u.is_admin ? 'ADMIN' : 'USER'}
                        </span>
                    </td>
                    <td>
                        ${u.perm_tags.map(t => `<span class="pill pill-perm">${t} <span class="remove-x" onclick="removePerm('${u.email}','${t}')">×</span></span>`).join('')}
                        <button class="btn-add" onclick="addPerm('${u.email}')">+ Assign Tag</button>
                    </td>
                    <td>
                        ${u.badges.map(b => `<span class="pill pill-badge" style="border-color:${b.badge_color}; color:${b.badge_color}">${b.badge_name}</span>`).join('')}
                        <button class="btn-add" onclick="addBadge('${u.email}')">+ Add Badge</button>
                        <button class="btn-add" style="color:#8b949e" onclick="clearBadges('${u.email}')">Wipe Badges</button>
                    </td>
                    <td>
                        ${u.blocked_paths.map(p => `<span class="pill pill-block">${p} <span class="remove-x" onclick="removeBlock('${u.email}','${p}')">×</span></span>`).join('')}
                        <button class="btn-add" style="color:var(--btn-red)" onclick="addBlock('${u.email}')">+ Add Block</button>
                    </td>
                    <td>
                        <button class="btn btn-gold" onclick="toggleAdmin(${u.id}, ${u.is_admin}, '${u.email}')">Toggle Admin</button>
                        <button class="btn btn-red" onclick="deleteAccount(${u.id}, '${u.email}')">Delete</button>
                    </td>
                </tr>
            `).join('');
        } catch (err) {
            listBody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:var(--btn-red);">Failed to synchronize with Worker. Check console for details.</td></tr>';
        }
    }

    // --- ACTIONS ---

    async function toggleAdmin(id, current, email) {
        if (email === myEmail) return alert("You cannot demote yourself.");
        const isAdmin = current === 1 ? 0 : 1;
        await fetch(`${API}/admin/toggle-admin`, { method: 'POST', body: JSON.stringify({ id, isAdmin }) });
        loadUsers();
    }

    async function addPerm(email) {
        const tag = prompt("Enter Permission Tag (e.g., wiki_access, level_1):");
        if (tag) {
            await fetch(`${API}/admin/add-perm`, { method: 'POST', body: JSON.stringify({ email, tag }) });
            loadUsers();
        }
    }

    async function removePerm(email, tag) {
        await fetch(`${API}/admin/remove-perm`, { method: 'POST', body: JSON.stringify({ email, tag }) });
        loadUsers();
    }

    async function addBadge(email) {
        const name = prompt("Badge Name (e.g. STAFF, OG, FOUNDER):");
        const color = prompt("Color (Hex or Name, e.g. #58a6ff):", "#58a6ff");
        if (name) {
            await fetch(`${API}/admin/add-badge`, { method: 'POST', body: JSON.stringify({ email, name, color }) });
            loadUsers();
        }
    }

    async function clearBadges(email) {
        if(confirm("Wipe all badges for this user?")) {
            await fetch(`${API}/admin/clear-badges`, { method: 'POST', body: JSON.stringify({ email }) });
            loadUsers();
        }
    }

    async function addBlock(email) {
        const path = prompt("Endpoint to block (e.g. wiki.html) or type 'ALL':");
        if (path) {
            await fetch(`${API}/admin/block-user`, { method: 'POST', body: JSON.stringify({ email, path }) });
            loadUsers();
        }
    }

    async function removeBlock(email, path) {
        await fetch(`${API}/admin/remove-block`, { method: 'POST', body: JSON.stringify({ email, path }) });
        loadUsers();
    }

    async function deleteAccount(id, email) {
        if (email === myEmail) return alert("Self-deletion is restricted.");
        if (confirm(`Permanently wipe user ${email}?`)) {
            await fetch(`${API}/admin/delete-user`, { method: 'POST', body: JSON.stringify({ id }) });
            loadUsers();
        }
    }

    // Security Check on load
    if (localStorage.getItem('ada_admin') !== '1') {
        window.location.href = '/blocked.html';
    } else {
        loadUsers();
    }
</script>
    <H1>Perms</H1>
    <p>"wiki_access" - grants access to all wiki pages.</p>
    <p style="color:light_grey">More Comming Soon...</p>
</body>
</html>
