<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | System Management</title>
    <style>
        :root { 
            --bg: #0d1117; --header: #161b22; --border: #30363d; --text: #c9d1d9; 
            --btn-red: #da3633; --btn-blue: #1f6feb; --btn-green: #238636; --gold: #d29922; 
        }

        /* THEMED SCROLLBAR */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 5px; border: 2px solid var(--bg); }
        ::-webkit-scrollbar-thumb:hover { background: #444c56; }

        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 40px; }
        .container { max-width: 1500px; margin: 0 auto; }
        
        header { margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav-link { color: #58a6ff; text-decoration: none; font-size: 14px; }
        .nav-link:hover { text-decoration: underline; }

        section { background: #161b22; border: 1px solid var(--border); border-radius: 8px; padding: 25px; margin-bottom: 40px; }
        h2 { margin-top: 0; font-weight: 400; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 20px; }

        table { width: 100%; border-collapse: collapse; border-radius: 6px; overflow: hidden; }
        th, td { padding: 12px; border: 1px solid var(--border); text-align: left; vertical-align: top; font-size: 13px; }
        th { background: #21262d; color: #f0f6fc; }

        /* Identity Styling */
        .user-cell { display: flex; align-items: center; gap: 10px; }
        .user-cell img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: #0d1117; border: 1px solid var(--border); }
        
        /* Badges/Pills */
        .pill { display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 12px; font-size: 10px; margin: 2px; border: 1px solid var(--border); font-weight: 600; }
        .pill-perm { background: rgba(35, 134, 54, 0.1); color: #3fb950; border-color: rgba(63, 185, 80, 0.4); }
        .pill-block { background: rgba(248, 81, 73, 0.1); color: #f85149; border-color: rgba(248, 81, 73, 0.4); }
        .remove-x { margin-left: 6px; cursor: pointer; opacity: 0.6; font-size: 12px; }
        .remove-x:hover { opacity: 1; color: white; }

        /* Inputs & Buttons */
        .inp { background: #0d1117; border: 1px solid var(--border); color: white; padding: 8px; border-radius: 6px; outline: none; font-size: 13px; }
        .btn { padding: 6px 12px; border-radius: 6px; cursor: pointer; border: 1px solid var(--border); font-size: 11px; font-weight: 600; color: white; transition: 0.2s; }
        .btn-add { background: transparent; color: #58a6ff; border: none; padding: 0; margin-top: 5px; text-decoration: underline; display: block; cursor: pointer; }
        
        /* Badge Lab Card */
        .badge-card { background: #21262d; border: 1px solid var(--border); padding: 15px; border-radius: 8px; display: flex; flex-direction: column; gap: 10px; min-width: 150px; }
    </style>
</head>
<body>
    <div id="ada-chat-widget">
        <div id="chat-window">
            <div id="chat-header"><span>Archive Communications</span><span onclick="toggleChat()" style="cursor:pointer;opacity:0.6;">✕</span></div>
            <div id="chat-body"></div>
            <form id="chat-footer" onsubmit="event.preventDefault(); sendChatText();">
                <input type="text" id="chat-msg-input" placeholder="Type a message..." autocomplete="off">
                <button type="button" class="chat-btn" onclick="document.getElementById('chat-file').click()" title="Share Image">🖼️</button>
                <input type="file" id="chat-file" hidden accept="image/*" onchange="uploadChatImg(this)">
                <button type="submit" class="chat-btn btn-send">Send</button>
            </form>
        </div>
        <div id="chat-icon" onclick="toggleChat()">💬<div id="chat-notif"></div></div>
    </div>
    
    <style>
        #ada-chat-widget { position: fixed; bottom: 25px; right: 25px; z-index: 9999; font-family: -apple-system, sans-serif; }
        #chat-icon { width: 56px; height: 56px; background: #238636; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); position: relative; }
        #chat-notif { position: absolute; top: 2px; right: 2px; width: 14px; height: 14px; background: #f85149; border-radius: 50%; border: 2px solid #0d1117; display: none; }
        
        /* Bigger Window */
        #chat-window { width: 380px; height: 550px; background: #161b22; border: 1px solid #30363d; border-radius: 12px; display: none; flex-direction: column; margin-bottom: 15px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        #chat-header { background: #21262d; padding: 14px; font-size: 14px; font-weight: 600; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; }
        #chat-body { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #0d1117; }
        #chat-footer { padding: 12px; border-top: 1px solid #30363d; display: flex; gap: 8px; align-items: center; background: #161b22; }
        #chat-msg-input { flex: 1; background: #0d1117; border: 1px solid #30363d; color: white; padding: 8px 12px; border-radius: 6px; outline: none; font-size: 13px; }
        
        /* Styled Buttons */
        .chat-btn { background: #21262d; border: 1px solid #30363d; color: white; padding: 7px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.2s; }
        .chat-btn:hover { background: #30363d; border-color: #8b949e; }
        .btn-send { background: #238636; border: none; }
        .btn-send:hover { background: #2ea043; }
    
        /* Message Bubbles with Avatars */
        .chat-row { display: flex; gap: 10px; align-items: flex-end; max-width: 90%; }
        .chat-row.me { flex-direction: row-reverse; align-self: flex-end; }
        .chat-row img.chat-avatar { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #30363d; background: #0d1117; flex-shrink: 0; }
        .chat-bubble { padding: 8px 12px; border-radius: 12px; font-size: 13px; line-height: 1.4; word-wrap: break-word; position: relative; }
        .chat-row.other .chat-bubble { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-bottom-left-radius: 2px; }
        .chat-row.me .chat-bubble { background: #238636; color: white; border-bottom-right-radius: 2px; }
        .chat-user-label { font-size: 9px; opacity: 0.5; display: block; margin-bottom: 2px; }
    </style>
    
    <script>
        const CHAT_API = "https://ada-relay.andrewdinglearchive.workers.dev";
        const myChatEmail = localStorage.getItem('ada_user_email');
        let isChatOpen = false;
        let lastChatId = 0;
    
        function toggleChat() {
            isChatOpen = !isChatOpen;
            document.getElementById('chat-window').style.display = isChatOpen ? 'flex' : 'none';
            if(isChatOpen) {
                document.getElementById('chat-notif').style.display = 'none';
                const body = document.getElementById('chat-body');
                body.scrollTop = body.scrollHeight;
            }
        }
    
        async function syncWidget() {
            if(!myChatEmail) return;
            const res = await fetch(`${CHAT_API}/sync?email=${encodeURIComponent(myChatEmail)}`);
            const data = await res.json();
            
            const latest = data.messages[data.messages.length - 1];
            if(latest && latest.id > lastChatId) {
                if(!isChatOpen && lastChatId !== 0) document.getElementById('chat-notif').style.display = 'block';
                lastChatId = latest.id;
                
                const body = document.getElementById('chat-body');
                body.innerHTML = data.messages.map(m => `
                    <div class="chat-row ${m.user_email === myChatEmail ? 'me' : 'other'}">
                        <img src="${m.profile_picture}" class="chat-avatar" title="${m.user_email}">
                        <div class="chat-bubble">
                            <span class="chat-user-label">${m.display_name || m.user_email}</span>
                            ${m.is_image ? `<img src="${m.content}" style="max-width:100%;border-radius:6px;margin-top:5px;cursor:pointer;" onclick="window.open(this.src)">` : m.content}
                        </div>
                    </div>
                `).join('');
                if(isChatOpen) body.scrollTop = body.scrollHeight;
            }
        }
    
        async function sendChatText() {
            const inp = document.getElementById('chat-msg-input');
            if(!inp.value.trim()) return;
            await fetch(`${CHAT_API}/chat`, { method: 'POST', body: JSON.stringify({ email: myChatEmail, content: inp.value, isImage: false }) });
            inp.value = ''; syncWidget();
        }
    
        async function uploadChatImg(input) {
            if (input.files && input.files[0]) {
                const r = new FileReader();
                r.onload = async (e) => {
                    await fetch(`${CHAT_API}/chat`, { method: 'POST', body: JSON.stringify({ email: myChatEmail, content: e.target.result, isImage: true }) });
                    syncWidget();
                };
                r.readAsDataURL(input.files[0]);
            }
        }
    
        setInterval(syncWidget, 3000); syncWidget();
    </script>
<div class="container">
    <header>
        <div>
            <a href="/dash.html" class="nav-link">← Return to Dashboard</a>
            <h1 style="margin: 5px 0 0 0; font-size: 24px;">ADA Archive Management</h1>
        </div>
        <div id="status-text" style="font-size: 12px; color: #8b949e;">Syncing records...</div>
    </header>

    <!-- SECTION 1: USER DIRECTORY -->
    <section>
        <h2>Identity Directory</h2>
        <table>
            <thead>
                <tr>
                    <th width="20%">Identity</th>
                    <th width="10%">Role</th>
                    <th width="18%">Permissions</th>
                    <th width="18%">Badges</th>
                    <th width="15%">Restrictions</th>
                    <th width="19%">Management</th>
                </tr>
            </thead>
            <tbody id="user-list"></tbody>
        </table>
    </section>

    <!-- SECTION 2: BADGE LAB -->
    <section>
        <h2>Archive Badge Lab</h2>
        <div style="display: grid; grid-template-columns: 350px 1fr; gap: 30px;">
            <div style="display: flex; flex-direction: column; gap: 10px; background: #0d1117; padding: 20px; border-radius: 8px; border: 1px solid var(--border);">
                <h3 style="margin-top:0">Create Badge Template</h3>
                <input type="text" id="new-b-name" class="inp" placeholder="Badge Name (e.g. Founder)">
                <input type="text" id="new-b-icon" class="inp" placeholder="Emoji/Icon">
                <div style="display:flex; gap:10px; align-items:center;">
                    <input type="text" id="new-b-color" class="inp" style="flex:1" placeholder="Hex Color (#58a6ff)">
                    <input type="color" onchange="document.getElementById('new-b-color').value=this.value">
                </div>
                <button class="btn" style="background:var(--btn-green); border:none; margin-top:10px;" onclick="createBadgeTemplate()">Register Master Badge</button>
            </div>
            
            <div>
                <h3 style="margin-top:0">Registered Master Badges</h3>
                <div id="master-badge-list" style="display: flex; flex-wrap: wrap; gap: 15px;"></div>
            </div>
        </div>
    </section>
</div>

<script>
    const API = "https://ada-relay.andrewdinglearchive.workers.dev";
    const myEmail = localStorage.getItem('ada_user_email');

    async function refreshAll() {
        const res = await fetch(`${API}/admin/list-users`);
        const users = await res.json();
        
        const bRes = await fetch(`${API}/admin/badges/list`);
        const bData = await bRes.json();

        renderUsers(users);
        renderBadgeLab(bData.master);
        document.getElementById('status-text').innerText = `${users.length} Active Archive Identities`;
    }

    function renderUsers(users) {
        const list = document.getElementById('user-list');
        list.innerHTML = users.map(u => `
            <tr>
                <td>
                    <div class="user-cell">
                        <img src="${u.profile_picture}">
                        <div>
                            <span style="font-weight:bold; color:#f0f6fc;">${u.display_name || 'Anonymous'}</span><br>
                            <span style="font-size:11px; color:#8b949e;">${u.email}</span>
                        </div>
                    </div>
                </td>
                <td>
                    <span class="pill" style="border-color:${u.is_admin ? 'var(--gold)' : '#30363d'}; color:${u.is_admin ? 'var(--gold)' : '#8b949e'}">
                        ${u.is_admin ? 'ADMIN' : 'USER'}
                    </span>
                </td>
                <td>
                    ${u.perm_tags.map(t => `<span class="pill pill-perm">${t} <span class="remove-x" onclick="removePerm('${u.email}','${t}')">×</span></span>`).join('')}
                    <button class="btn-add" onclick="addPerm('${u.email}')">+ Assign Tag</button>
                </td>
                <td>
                    ${u.badges.map(b => `<span class="pill" style="border-color:${b.badge_color}; color:${b.badge_color}">${b.badge_name} <span class="remove-x" onclick="unassignBadge('${u.email}','${b.badge_name}')">×</span></span>`).join('')}
                    <button class="btn-add" onclick="assignBadgePrompt('${u.email}')">+ Grant Badge</button>
                </td>
                <td>
                    ${u.blocked_paths.map(p => `<span class="pill pill-block">${p} <span class="remove-x" onclick="removeBlock('${u.email}','${p}')">×</span></span>`).join('')}
                    <button class="btn-add" style="color:var(--btn-red)" onclick="addBlock('${u.email}')">+ Restrict Path</button>
                </td>
                <td>
                    <button class="btn" style="background:#21262d" onclick="toggleAdmin(${u.id}, ${u.is_admin}, '${u.email}')">Toggle Admin</button>
                    <button class="btn" style="background:${u.profile_disabled ? 'var(--btn-green)' : 'var(--btn-red)'}" onclick="toggleProfile('${u.email}', ${u.profile_disabled})">
                        ${u.profile_disabled ? 'Enable Profile' : 'Disable Profile'}
                    </button>
                    <button class="btn" style="background:transparent; color:var(--btn-red); border-color:rgba(248,81,73,0.2)" onclick="deleteAccount(${u.id}, '${u.email}')">Delete</button>
                </td>
            </tr>
        `).join('');
    }

    function renderBadgeLab(master) {
        const list = document.getElementById('master-badge-list');
        list.innerHTML = master.map(b => `
            <div class="badge-card" style="border-color:${b.color}">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size:24px;">${b.icon}</span>
                    <button onclick="deleteMasterBadge('${b.name}')" style="background:none; border:none; color:var(--btn-red); cursor:pointer;">✕</button>
                </div>
                <div style="font-weight:bold; color:${b.color}">${b.name}</div>
                <button class="btn" style="background:#0d1117" onclick="assignBadgeToSomeone('${b.name}')">Assign to Email</button>
            </div>
        `).join('') || '<p style="opacity:0.5">No badges registered.</p>';
    }

    // --- ACTIONS ---
    async function post(route, body) {
        await fetch(`${API}${route}`, { method: 'POST', body: JSON.stringify(body), headers: {'Content-Type':'application/json'} });
        refreshAll();
    }

    async function toggleAdmin(id, current, email) {
        if(email === myEmail) return alert("Demotion restricted.");
        post('/admin/toggle-admin', { id, isAdmin: current === 1 ? 0 : 1 });
    }

    async function toggleProfile(email, current) {
        post('/admin/profile/toggle-status', { email, status: current === 1 ? 0 : 1 });
    }

    async function addPerm(email) {
        const tag = prompt("Tag Name:");
        if(tag) post('/admin/add-perm', { email, tag });
    }

    async function removePerm(email, tag) {
        post('/admin/remove-perm', { email, tag });
    }

    async function createBadgeTemplate() {
        const name = document.getElementById('new-b-name').value;
        const icon = document.getElementById('new-b-icon').value;
        const color = document.getElementById('new-b-color').value;
        if(name) post('/admin/badges/create', { name, icon, color });
    }

    async function deleteMasterBadge(name) {
        if(confirm("Delete this badge template and remove it from all users?")) post('/admin/badges/delete', { name });
    }

    async function assignBadgePrompt(email) {
        const name = prompt("Enter Master Badge Name to grant:");
        if(name) post('/admin/badges/assign', { email, name });
    }

    async function assignBadgeToSomeone(name) {
        const email = prompt(`Enter Email to receive the ${name} badge:`);
        if(email) post('/admin/badges/assign', { email, name });
    }

    async function unassignBadge(email, name) {
        post('/admin/badges/unassign', { email, name });
    }

    async function addBlock(email) {
        const path = prompt("Block path (e.g. dash.html) or 'ALL':");
        if(path) post('/admin/block-user', { email, path });
    }

    async function removeBlock(email, path) {
        post('/admin/remove-block', { email, path });
    }

    async function deleteAccount(id, email) {
        if(email === myEmail) return alert("Self-wipe restricted.");
        if(confirm(`Wipe ${email}?`)) post('/admin/delete-user', { id });
    }

    // Security Gate
    if(localStorage.getItem('ada_admin') !== '1') window.location.href = '/blocked.html';
    else refreshAll();
</script>
</body>
</html>
