<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | System Management</title>
    
    <!-- MASTER BOOTSTRAP -->
    <script src="/uplink.js"></script>
    <script src="/header-engine.js"></script>

    <style>
        :root { 
            --bg: #0d1117; --header: #161b22; --border: #30363d; --text: #c9d1d9; 
            --btn-red: #da3633; --btn-blue: #1f6feb; --btn-green: #238636; --gold: #d29922; 
        }

        /* THEMED SCROLLBAR */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 5px; }

        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 40px; }
        .container { max-width: 1600px; margin: 0 auto; }
        
        header { margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav-link { color: #58a6ff; text-decoration: none; font-size: 14px; }

        section { background: #161b22; border: 1px solid var(--border); border-radius: 8px; padding: 25px; margin-bottom: 40px; }
        h2 { margin-top: 0; font-weight: 400; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 20px; }

        table { width: 100%; border-collapse: collapse; border-radius: 6px; overflow: hidden; table-layout: fixed; }
        th, td { padding: 12px; border: 1px solid var(--border); text-align: left; vertical-align: top; font-size: 12px; word-wrap: break-word; }
        th { background: #21262d; color: #f0f6fc; }

        /* Identity */
        .user-cell { display: flex; align-items: center; gap: 10px; }
        .user-cell img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: #0d1117; border: 1px solid var(--border); }
        
        /* Online Status */
        .status-wrapper { display: flex; align-items: center; gap: 8px; font-size: 10px; font-weight: bold; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; }
        .online { background: #3fb950; box-shadow: 0 0 8px #3fb950; }
        .offline { background: #8b949e; }

        /* Pills */
        .pill { display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 12px; font-size: 10px; margin: 2px; border: 1px solid var(--border); font-weight: 600; }
        .pill-perm { background: rgba(35, 134, 54, 0.1); color: #3fb950; border-color: rgba(63, 185, 80, 0.4); }
        .pill-block { background: rgba(248, 81, 73, 0.1); color: #f85149; border-color: rgba(248, 81, 73, 0.4); }
        .remove-x { margin-left: 6px; cursor: pointer; opacity: 0.6; font-size: 12px; font-weight: bold; }
        .remove-x:hover { opacity: 1; color: white; }

        /* Controls */
        .inp { background: #0d1117; border: 1px solid var(--border); color: white; padding: 8px; border-radius: 6px; outline: none; font-size: 12px; width: 100%; box-sizing: border-box; }
        .btn { padding: 6px 12px; border-radius: 6px; cursor: pointer; border: 1px solid var(--border); font-size: 11px; font-weight: 600; color: white; margin: 2px; transition: 0.2s; white-space: nowrap; }
        .btn-add { background: transparent; color: #58a6ff; border: none; padding: 0; margin-top: 5px; text-decoration: underline; display: block; cursor: pointer; font-size: 10px; }
        .refresh-btn { background: none; border: 1px solid var(--border); color: var(--text); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 18px; transition: transform 0.3s; }
        .refresh-btn:active { transform: rotate(180deg); }
    </style>
</head>
<body>

<div id="ada-header-anchor"></div>

<div class="container">
    <header>
        <div>
            <a href="/dash.html" class="nav-link">← Return to Dashboard</a>
            <div style="display:flex; align-items:center; gap:15px; margin-top:10px;">
                <h1 style="margin:0; font-size: 24px;">Archive Identity Manager</h1>
                <button class="refresh-btn" onclick="window.refreshAll()">↻</button>
            </div>
        </div>
        <div id="stats" style="font-size: 12px; color: #8b949e;">Connecting to D1 Relay...</div>
    </header>

    <!-- SECTION 1: USER LIST -->
    <section>
        <h2>Identity Directory</h2>
        <table>
            <thead>
                <tr>
                    <th width="16%">Identity</th>
                    <th width="8%">Status</th>
                    <th width="8%">Role</th>
                    <th width="15%">Clearance Tags</th>
                    <th width="15%">Badges</th>
                    <th width="15%">Restrictions</th>
                    <th width="23%">System Controls</th>
                </tr>
            </thead>
            <tbody id="user-list"></tbody>
        </table>
    </section>

    <!-- SECTION 2: BADGE LAB -->
    <section>
        <h2>Badge Lab</h2>
        <div style="display: grid; grid-template-columns: 350px 1fr; gap: 30px;">
            <div style="background:#0d1117; padding:20px; border-radius:8px; border:1px solid var(--border); display:flex; flex-direction:column; gap:10px;">
                <h3 style="margin-top:0">New Template</h3>
                <input type="text" id="b-name" class="inp" placeholder="Badge Name">
                <input type="text" id="b-icon" class="inp" placeholder="Emoji Icon">
                <div style="display:flex; align-items:center; gap:10px;">
                    <input type="text" id="b-color" class="inp" placeholder="Hex Color (#58a6ff)" style="flex:1">
                    <input type="color" onchange="document.getElementById('b-color').value=this.value">
                </div>
                <button class="btn" style="background:var(--btn-green); border:none; margin-top:10px;" onclick="window.createBadgeTemplate()">Register Badge</button>
            </div>
            <div id="master-badge-list" style="display:flex; flex-wrap:wrap; gap:15px; align-content: flex-start;"></div>
        </div>
    </section>
</div>

<script>
    const API = "https://ada-relay.andrewdinglearchive.workers.dev";
    const myEmail = localStorage.getItem('ada_user_email');

    // --- REFRESH ENGINE ---
    window.refreshAll = async function() {
        document.getElementById('stats').innerText = "Synchronizing...";
        const [uRes, bRes] = await Promise.all([
            fetch(`${API}/admin/list-users`),
            fetch(`${API}/admin/badges/list`)
        ]);
        const users = await uRes.json();
        const bData = await bRes.json();
        
        window.renderUsers(users);
        window.renderBadgeLab(bData.master);
        document.getElementById('stats').innerText = `${users.length} Active Neural Links Registered`;
    };

    // --- UI RENDERING ---
    window.renderUsers = function(users) {
        const list = document.getElementById('user-list');
        list.innerHTML = users.map(u => {
            return `
                <tr>
                    <td>
                        <div class="user-cell">
                            <img src="${u.profile_picture}">
                            <div>
                                <span style="font-weight:bold; color:#f0f6fc;">${u.display_name || 'Anonymous'}</span><br>
                                <span style="font-size:10px; color:#8b949e;">${u.email}</span>
                            </div>
                        </div>
                    </td>
                    <td>
                        <div class="status-wrapper">
                            <div class="status-dot ${u.is_online ? 'online' : 'offline'}"></div>
                            <span>${u.is_online ? 'ONLINE' : 'OFFLINE'}</span>
                        </div>
                    </td>
                    <td>
                        <span class="pill" style="border-color:${u.is_admin ? 'var(--gold)' : '#30363d'}; color:${u.is_admin ? 'var(--gold)' : 'inherit'}">
                            ${u.is_admin ? 'ADMIN' : 'USER'}
                        </span>
                    </td>
                    <td>
                        ${(u.perm_tags || []).map(t => `<div class="pill pill-perm">${t} <span class="remove-x" onclick="window.postAction('/admin/remove-perm', {email:'${u.email}', tag:'${t}'})">×</span></div>`).join('')}
                        <button class="btn-add" onclick="window.addPerm('${u.email}')">+ Add Tag</button>
                    </td>
                    <td>
                        ${(u.badges || []).map(b => `<div class="pill" style="border-color:${b.color}; color:${b.color}">${b.badge_name} <span class="remove-x" onclick="window.postAction('/admin/badges/unassign', {email:'${u.email}', name:'${b.badge_name}'})">×</span></div>`).join('')}
                        <button class="btn-add" onclick="window.assignBadgeToUser('${u.email}')">+ Grant Badge</button>
                    </td>
                    <td>
                        ${(u.blocked_paths || []).map(p => `<div class="pill pill-block">${p} <span class="remove-x" onclick="window.postAction('/admin/remove-block', {email:'${u.email}', path:'${p}'})">×</span></div>`).join('')}
                        <button class="btn-add" style="color:var(--red)" onclick="window.addBlock('${u.email}')">+ Block Path</button>
                    </td>
                    <td>
                        <div style="display:flex; flex-wrap:wrap; gap:4px;">
                            <button class="btn" style="background:#21262d" onclick="window.postAction('/admin/toggle-admin', {id:${u.id}, isAdmin:${u.is_admin === 1 ? 0 : 1}})">Toggle Role</button>
                            <button class="btn" style="background:#21262d" onclick="window.postAction('/admin/profile/toggle-status', {email:'${u.email}', status:${u.profile_disabled ? 0 : 1}})">
                                ${u.profile_disabled ? 'Enable Profile' : 'Disable Profile'}
                            </button>
                            <button class="btn" style="background:var(--blue); color:#000" onclick="window.postAction('/admin/client/refresh', {email:'${u.email}'})">Refresh Client</button>
                            <button class="btn" style="background:var(--red)" onclick="window.deleteUser(${u.id}, '${u.email}')">Delete</button>
                        </div>
                    </td>
                </tr>`;
        }).join('');
    };

    window.renderBadgeLab = function(master) {
        document.getElementById('master-badge-list').innerHTML = master.map(b => `
            <div style="background:#21262d; border:1px solid ${b.color}; padding:15px; border-radius:8px; min-width:130px; display:flex; flex-direction:column; gap:5px;">
                <div style="display:flex; justify-content:space-between;">
                    <span style="font-size:20px;">${b.icon}</span>
                    <span style="cursor:pointer; color:var(--red); font-weight:bold;" onclick="window.postAction('/admin/badges/delete', {name:'${b.name}'})">✕</span>
                </div>
                <div style="font-weight:bold; color:${b.color}; margin-top:5px;">${b.name}</div>
            </div>
        `).join('') || '<p style="opacity:0.4; font-size:12px;">No badge templates registered.</p>';
    };

    // --- ACTION LOGIC ---
    window.postAction = async function(route, body) {
        await fetch(`${API}${route}`, { 
            method: 'POST', 
            headers: {'Content-Type':'application/json'}, 
            body: JSON.stringify(body) 
        });
        window.refreshAll();
    };

    window.addPerm = (e) => { const t = prompt("Tag Name:"); if(t) window.postAction('/admin/add-perm', {email:e, tag:t}); };
    window.addBlock = (e) => { const p = prompt("Path to block (e.g. visuals.html) or ALL:"); if(p) window.postAction('/admin/block-user', {email:e, path:p}); };
    
    window.createBadgeTemplate = () => {
        const name = document.getElementById('b-name').value;
        const icon = document.getElementById('b-icon').value;
        const color = document.getElementById('b-color').value || "#58a6ff";
        if(name) {
            window.postAction('/admin/badges/create', {name, icon, color});
            document.getElementById('b-name').value = '';
            document.getElementById('b-icon').value = '';
        }
    };

    window.assignBadgeToUser = (e) => {
        const name = prompt("Enter Master Badge Name to grant:");
        if(name) window.postAction('/admin/badges/assign', {email:e, name});
    };

    window.deleteUser = (id, email) => {
        if (email === myEmail) return alert("Self-wipe restricted.");
        if (confirm(`CRITICAL: Permanently wipe account ${email}?`)) {
            window.postAction('/admin/delete-user', {id});
        }
    };

    // --- BOOTSTRAP ---
    async function start() {
        if (typeof runNeuralGuard !== 'function') { setTimeout(start, 100); return; }
        const d = await runNeuralGuard();
        if(d && d.user.is_admin === 1) window.refreshAll();
        else window.location.href = '/blocked.html';
    }
    start();
</script>
</body>
</html>
