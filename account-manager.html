<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | Account Manager</title>
    <style>
        :root { --bg: #0d1117; --border: #30363d; --text: #c9d1d9; --btn-red: #da3633; --btn-blue: #1f6feb; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; padding: 40px; }
        .container { max-width: 1100px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; background: #161b22; border: 1px solid var(--border); }
        th, td { padding: 12px; border: 1px solid var(--border); text-align: left; font-size: 13px; }
        th { background: #21262d; }
        .btn { padding: 4px 10px; border-radius: 6px; cursor: pointer; border: none; font-size: 11px; color: white; margin-right: 4px; }
        .btn-red { background: var(--btn-red); }
        .btn-blue { background: var(--btn-blue); }
        .pill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 12px; font-size: 10px; margin: 2px; border: 1px solid var(--border); }
        .pill-perm { background: rgba(35, 134, 54, 0.1); color: #3fb950; }
        .pill-block { background: rgba(248, 81, 73, 0.1); color: #f85149; }
        .remove-x { margin-left: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <a href="/dash.html" style="color: #58a6ff; text-decoration: none;">← Return to Archive</a>
    <h2>System Account Management</h2>
    <table id="user-table">
        <thead>
            <tr>
                <th>Identity</th>
                <th>Permissions</th>
                <th>Restrictions</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="user-list"></tbody>
    </table>
</div>

<script>
    const API = "https://ada-relay.andrewdinglearchive.workers.dev";
    const myEmail = localStorage.getItem('ada_user_email');

    async function loadUsers() {
        const res = await fetch(`${API}/admin/list-users`);
        const users = await res.json();
        const listBody = document.getElementById('user-list');
        
        listBody.innerHTML = users.map(u => `
            <tr>
                <td><b>${u.display_name || 'Anonymous'}</b><br><span style="opacity:0.6">${u.email}</span></td>
                <td>
                    ${u.perm_tags.map(t => `<span class="pill pill-perm">${t} <span class="remove-x" onclick="removePerm('${u.email}', '${t}')">×</span></span>`).join('')}
                    <button class="btn btn-blue" style="display:block;margin-top:5px" onclick="addPerm('${u.email}')">+ Tag</button>
                </td>
                <td>
                    ${u.blocked_paths.map(p => `<span class="pill pill-block">${p} <span class="remove-x" onclick="removeBlock('${u.email}', '${p}')">×</span></span>`).join('')}
                    <button class="btn btn-red" style="display:block;margin-top:5px" onclick="blockPrompt('${u.email}')">+ Block</button>
                </td>
                <td><button class="btn btn-red" onclick="deleteUser(${u.id})">Delete</button></td>
            </tr>
        `).join('');
    }

    async function addPerm(email) {
        const tag = prompt("Permission Tag:");
        if (tag) {
            await fetch(`${API}/admin/add-perm`, { method: 'POST', body: JSON.stringify({ email, tag }) });
            loadUsers();
        }
    }

    async function removePerm(email, tag) {
        await fetch(`${API}/admin/remove-perm`, { method: 'POST', body: JSON.stringify({ email, tag }) });
        loadUsers();
    }

    async function blockPrompt(email) {
        const path = prompt("Path to block (or 'ALL'):");
        if (path) {
            await fetch(`${API}/admin/block-user`, { method: 'POST', body: JSON.stringify({ email, path }) });
            loadUsers();
        }
    }

    async function removeBlock(email, path) {
        await fetch(`${API}/admin/remove-block`, { method: 'POST', body: JSON.stringify({ email, path }) });
        loadUsers();
    }

    async function deleteUser(id) {
        if (confirm('Delete user?')) {
            await fetch(`${API}/admin/delete-user`, { method: 'POST', body: JSON.stringify({ id }) });
            loadUsers();
        }
    }

    loadUsers();
</script>
</body>
</html>
