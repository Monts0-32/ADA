<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | Manager</title>
    <style>
        :root { --bg: #0d1117; --border: #30363d; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 40px; }
        table { width: 100%; border-collapse: collapse; background: #161b22; border: 1px solid var(--border); }
        th, td { padding: 12px; border: 1px solid var(--border); text-align: left; font-size: 13px; }
        .btn { padding: 4px 8px; border-radius: 4px; cursor: pointer; border: none; color: white; font-size: 11px; margin: 2px; }
        .pill { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 10px; margin: 2px; border: 1px solid var(--border); }
    </style>
</head>
<body>
    <a href="/dash.html" style="color:#58a6ff">← Dashboard</a>
    <h2>User Management</h2>
    <table>
        <thead><tr><th>User</th><th>Tags</th><th>Blocks</th><th>Actions</th></tr></thead>
        <tbody id="list"></tbody>
    </table>

    <script>
        const API = "https://ada-relay.andrewdinglearchive.workers.dev";
        async function load() {
            const res = await fetch(`${API}/admin/list-users`);
            const users = await res.json();
            document.getElementById('list').innerHTML = users.map(u => `
                <tr>
                    <td><b>${u.display_name || 'Anonymous'}</b><br>${u.email}</td>
                    <td>
                        ${u.perm_tags.map(t => `<span class="pill">${t} <span onclick="remP('${u.email}','${t}')" style="cursor:pointer">×</span></span>`).join('')}
                        <button class="btn" style="background:#1f6feb" onclick="addP('${u.email}')">+ Tag</button>
                    </td>
                    <td>
                        ${u.blocked_paths.map(p => `<span class="pill" style="color:red">${p} <span onclick="remB('${u.email}','${p}')" style="cursor:pointer">×</span></span>`).join('')}
                        <button class="btn" style="background:#da3633" onclick="addB('${u.email}')">+ Block</button>
                    </td>
                    <td><button class="btn" style="background:#da3633" onclick="del(${u.id})">Delete</button></td>
                </tr>
            `).join('');
        }
        async function addP(e) { const t = prompt("Tag:"); if(t) { await fetch(`${API}/admin/add-perm`, {method:'POST', body:JSON.stringify({email:e,tag:t})}); load(); } }
        async function remP(e,t) { await fetch(`${API}/admin/remove-perm`, {method:'POST', body:JSON.stringify({email:e,tag:t})}); load(); }
        async function addB(e) { const p = prompt("Path:"); if(p) { await fetch(`${API}/admin/block-user`, {method:'POST', body:JSON.stringify({email:e,path:p})}); load(); } }
        async function remB(e,p) { await fetch(`${API}/admin/remove-block`, {method:'POST', body:JSON.stringify({email:e,path:p})}); load(); }
        async function del(id) { if(confirm('Delete?')) { await fetch(`${API}/admin/delete-user`, {method:'POST', body:JSON.stringify({id})}); load(); } }
        load();
    </script>
</body>
</html>
