<!DOCTYPE html>
<html style="background:#0d1117">
<head>
    <title>Account Manager</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; color: white; background-color: #0d1117; padding: 40px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; background: #161b22; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; }
        th { text-align: left; padding: 12px; background: #0d1117; border-bottom: 1px solid #30363d; color: #8b949e; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid #30363d; font-size: 14px; }
        .btn-action { background: #21262d; border: 1px solid #30363d; color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .btn-action:hover { background: #30363d; }
        .btn-delete { color: #ff7b72; border-color: #f8514933; }
        .btn-delete:hover { background: #f851491a; }
        .badge { padding: 2px 6px; border-radius: 10px; font-size: 11px; font-weight: bold; }
        .badge-admin { background: #23863633; color: #3fb950; border: 1px solid #23863666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 style="display:flex; align-items:center; gap:10px;">
                <span class="material-symbols-outlined">group</span> Account Manager
            </h2>
            <button class="btn-action" onclick="window.location.href='dash.html'">Back to Dash</button>
        </div>

        <table id="userTable">
            <thead>
                <tr>
                    <th>Email / Username</th>
                    <th>Role</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="userList">
                </tbody>
        </table>
    </div>

    <script>
        const SUPABASE_URL = 'https://ljydseeyirvmtzgkuppo.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqeWRzZWV5aXJ2bXR6Z2t1cHBvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NzM4NzYsImV4cCI6MjA5MTA0OTg3Nn0.CmI1TfhskGOeWQlfkKSBkuytJkfWZijqt2ht-RIun3E';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadUsers() {
            const { data, error } = await _supabase.from('profiles').select('*');
            if (error) return console.error(error);

            const list = document.getElementById('userList');
            list.innerHTML = '';
            data.forEach(user => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${user.email}</td>
                    <td>${user.is_admin ? '<span class="badge badge-admin">Admin</span>' : '<span class="badge">User</span>'}</td>
                    <td style="display:flex; gap:10px;">
                        <button class="btn-action" onclick="toggleAdmin('${user.id}', ${user.is_admin})">Toggle Admin</button>
                    </td>
                `;
                list.appendChild(row);
            });
        }

        async function toggleAdmin(id, currentStatus) {
            await _supabase.from('profiles').update({ is_admin: !currentStatus }).eq('id', id);
            loadUsers();
        }

        // Security check
        if (localStorage.getItem("isAdmin") !== "true") window.location.href = "index.html";
        
        loadUsers();
    </script>
</body>
</html>
