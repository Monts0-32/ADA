<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADA | System Management</title>
    <script src="/uplink.js"></script>
    <style>
        :root { --bg: #0d1117; --header: #161b22; --border: #30363d; --text: #c9d1d9; --btn-red: #da3633; --btn-blue: #1f6feb; --btn-green: #238636; --gold: #d29922; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 40px; }
        .container { max-width: 1550px; margin: 0 auto; }
        header { margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        table { width: 100%; border-collapse: collapse; background: #161b22; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
        th, td { padding: 12px; border: 1px solid var(--border); text-align: left; vertical-align: top; font-size: 12px; }
        th { background: #21262d; color: #f0f6fc; }
        .user-cell { display: flex; align-items: center; gap: 10px; }
        .user-cell img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background: #3fb950; box-shadow: 0 0 8px #3fb950; }
        .offline { background: #8b949e; }
        .pill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 12px; font-size: 10px; margin: 2px; border: 1px solid var(--border); font-weight: bold; }
        .remove-x { margin-left: 6px; cursor: pointer; color: var(--red); }
        .btn { padding: 5px 10px; border-radius: 6px; cursor: pointer; border: 1px solid var(--border); font-size: 10px; font-weight: 600; color: white; margin: 2px; }
        .btn-add { background: transparent; color: #58a6ff; border: none; padding: 0; margin-top: 5px; text-decoration: underline; cursor: pointer; font-size: 10px; display: block; }
    </style>
</head>
<body>
<div id="ada-header-anchor"></div>
<script src="/header-engine.js"></script>

<div class="container">
    <header>
        <div>
            <a href="/dash.html" style="color:var(--blue); text-decoration:none;">← Return to Dashboard</a>
            <h1 style="margin:10px 0 0 0; font-size:22px;">Archive Identity & Permissions Manager</h1>
        </div>
        <button class="btn" style="font-size:16px;" onclick="refreshAll()">↻</button>
    </header>
    
    <table>
        <thead>
            <tr>
                <th width="15%">Identity</th>
                <th width="8%">Status</th>
                <th width="10%">Role</th>
                <th width="15%">Clearance Tags</th>
                <th width="15%">Badges</th>
                <th width="15%">Path Blocks</th>
                <th width="22%">System Controls</th>
            </tr>
        </thead>
        <tbody id="user-list"></tbody>
    </table>

    <div id="badge-lab-anchor"></div> <!-- Badge Lab logic remains same as previous full version -->
</div>

<script>
    const API = "https://ada-relay.andrewdinglearchive.workers.dev";
    const myEmail = localStorage.getItem('ada_user_email');

    async function refreshAll() {
        const res = await fetch(`${API}/admin/list-users`);
        const users = await res.json();
        renderUsers(users);
    }

    function renderUsers(users) {
        const list = document.getElementById('user-list');
        list.innerHTML = users.map(u => `
            <tr>
                <td>
                    <div class="user-cell">
                        <img src="${u.profile_picture}">
                        <div><b>${u.display_name || 'Anonymous'}</b><br><span style="opacity:0.6">${u.email}</span></div>
                    </div>
                </td>
                <td>
                    <div class="status-dot ${u.is_online ? 'online' : 'offline'}"></div>
                    <span style="font-size:10px;">${u.is_online ? 'ONLINE' : 'OFFLINE'}</span>
                </td>
                <td><span class="pill" style="border-color:${u.is_admin ? 'var(--gold)' : '#30363d'}">${u.is_admin ? 'ADMIN' : 'USER'}</span></td>
                <td>
                    ${u.perm_tags.map(t => `<div class="pill">${t} <span class="remove-x" onclick="action('/admin/remove-perm', {email:'${u.email}', tag:'${t}'})">×</span></div>`).join('')}
                    <button class="btn-add" onclick="addPerm('${u.email}')">+ Add Tag</button>
                </td>
                <td>
                    ${u.badges.map(b => `<div class="pill" style="border-color:${b.color}; color:${b.color}">${b.badge_name} <span class="remove-x" onclick="action('/admin/badges/unassign', {email:'${u.email}', name:'${b.badge_name}'})">×</span></div>`).join('')}
                    <button class="btn-add" onclick="assignBadge('${u.email}')">+ Grant Badge</button>
                </td>
                <td>
                    ${u.blocked_paths.map(p => `<div class="pill" style="color:var(--red)">${p} <span class="remove-x" onclick="action('/admin/remove-block', {email:'${u.email}', path:'${p}'})">×</span></div>`).join('')}
                    <button class="btn-add" style="color:var(--red)" onclick="addBlock('${u.email}')">+ Block Path</button>
                </td>
                <td>
                    <button class="btn" onclick="action('/admin/toggle-admin', {id:${u.id}, isAdmin:${u.is_admin ? 0 : 1}})">Toggle Role</button>
                    <button class="btn" onclick="action('/admin/profile/toggle-status', {email:'${u.email}', status:${u.profile_disabled ? 0 : 1}})">${u.profile_disabled ? 'Enable' : 'Disable'} Profile</button>
                    <button class="btn" style="background:var(--blue); color:#000" onclick="action('/admin/client/refresh', {email:'${u.email}'})">Refresh Client</button>
                    <button class="btn" style="background:var(--red)" onclick="deleteUser(${u.id}, '${u.email}')">Delete</button>
                </td>
            </tr>
        `).join('');
    }

    async function action(path, body) {
        await fetch(`${API}${path}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
        refreshAll();
    }

    function addPerm(email) { const tag = prompt("Clearance Tag:"); if(tag) action('/admin/add-perm', {email, tag}); }
    function addBlock(email) { const path = prompt("Block path (or ALL):"); if(path) action('/admin/block-user', {email, path}); }
    function assignBadge(email) { const name = prompt("Badge Name:"); if(name) action('/admin/badges/assign', {email, name}); }
    function deleteUser(id, email) { if(email !== myEmail && confirm("Wipe user?")) action('/admin/delete-user', {id}); }

    refreshAll();
</script>
</body>
</html>
