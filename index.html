<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrew Dingle Archive | ADA</title>
    <style>
        :root { 
            --bg: #0d1117; --header: #161b22; --border: #30363d; --text: #c9d1d9; 
            --btn-green: #238636; --blue: #58a6ff; --red: #f85149; 
        }
        
        /* THEMED SCROLLBAR */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 5px; border: 2px solid var(--bg); }
        ::-webkit-scrollbar-thumb:hover { background: #444c56; }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }

        header { 
            background: var(--header); 
            border-bottom: 1px solid var(--border); 
            padding: 12px 24px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }

        .logo { font-weight: 600; color: #f0f6fc; text-decoration: none; font-size: 16px; display: flex; align-items: center; gap: 8px; }

        /* USER PILL */
        .user-pill { 
            display: none; /* Hidden by default until login check */
            align-items: center; 
            gap: 8px; 
            background: #21262d; 
            border: 1px solid var(--border); 
            padding: 4px 12px; 
            border-radius: 20px; 
            text-decoration: none; 
            color: var(--text); 
            font-size: 12px; 
            transition: 0.2s; 
        }
        .user-pill:hover { border-color: #8b949e; background: #30363d; }
        .user-pill img { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; background: #0d1117; }

        .btn { 
            padding: 6px 16px; 
            border-radius: 6px; 
            border: 1px solid var(--border); 
            cursor: pointer; 
            background: #21262d; 
            color: white; 
            font-size: 13px; 
            font-weight: 600; 
            text-decoration: none; 
            transition: 0.2s;
        }
        .btn-green { background: var(--btn-green); border: none; }
        .btn-green:hover { background: #2ea043; }

        /* HERO SECTION */
        main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            padding: 40px 20px; 
        }

        .hero-title { font-size: 48px; font-weight: 700; color: #f0f6fc; margin-bottom: 16px; }
        .hero-sub { font-size: 20px; color: #8b949e; max-width: 600px; margin-bottom: 32px; line-height: 1.5; }

        .action-area { display: flex; gap: 12px; }

        footer { padding: 24px; border-top: 1px solid var(--border); text-align: center; font-size: 12px; color: #8b949e; }
    </style>
</head>
<body>

<div id="ada-header-anchor"></div>
<script src="/header-engine.js"></script>

<main>
    <h1 class="hero-title">Secure Archive Entry</h1>
    <p class="hero-sub">Welcome to ADA. A specialized digital environment for the storage, retrieval, and analysis of classified archive data.</p>
    
    <div class="action-area" id="action-area">
        <!-- Button changes dynamically based on auth state -->
        <a href="/login.html" id="hero-btn" class="btn btn-green" style="padding: 12px 32px; font-size: 16px;">Initialize Access</a>
    </div>
</main>

<footer>
    &copy; 2024 Andrew Dingle Archive. Restricted System.
</footer>

<script>
    const API = "https://ada-relay.andrewdinglearchive.workers.dev";
    const email = localStorage.getItem('ada_user_email');
    const DEFAULT_ICON = `data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzhCOTRBRSIgd2lkdGg9IjI0IiBoZWlnaHQ9IjI0Ij48cGF0aCBkPSJNMTIgMTJjMi4yMSAwIDQtMS43OSA0LTREOCAzLjM0IDgtNy4zNCA4LTQgMTQuMjEgMTIgMTIgMTJ6bTAgMmMtMi42NyAwLTggMS4zNC04IDR2MmgxNnYtMmMwLTIuNjYtNS4zMy00LTggNHoiLz48L3N2Zz4=`;

    async function checkAuth() {
        if (!email) return;

        try {
            // Sync with Worker to get Profile Details
            const res = await fetch(`${API}/sync?email=${encodeURIComponent(email)}`);
            const data = await res.json();

            if (data.user) {
                // Update Header
                const pill = document.getElementById('user-pill');
                const loginBtn = document.getElementById('login-btn');
                const nameSpan = document.getElementById('pill-name');
                const avatarImg = document.getElementById('pill-avatar');

                pill.style.display = 'flex';
                loginBtn.style.display = 'none';
                nameSpan.innerText = data.user.display_name || data.user.email;
                avatarImg.src = data.user.profile_picture || DEFAULT_ICON;

                // Update Hero Button
                const heroBtn = document.getElementById('hero-btn');
                heroBtn.innerText = "Open Dashboard";
                heroBtn.href = "/dash.html";
            }
        } catch (e) {
            console.error("Archive Sync Error", e);
        }
    }

    checkAuth();
</script>

</body>
</html>
