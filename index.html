<html style="background:#0d1117">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Andrew Dingle Archive</title>
        <link rel="icon" href="image/icon.png">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
        
        <style>
            body { margin: 0; font-family: Arial, sans-serif; color: white; background-color: #0d1117; }
            
            /* Header Styling from Dash */
            .header-container {
                background-color: #0d1117;
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 10px 20px;
                border-bottom: 1px solid #30363d;
            }
            .header-left, .header-right {
                display: flex;
                align-items: center;
                gap: 15px;
            }
            .nav-link {
                color: #f0f6fc;
                text-decoration: none;
                font-size: 14px;
            }
            .nav-link:hover { color: #58a6ff; }

            /* Hero Section */
            .hero {
                text-align: center;
                padding: 80px 20px;
                max-width: 800px;
                margin: 0 auto;
            }
            h1 { font-size: 32px; margin-bottom: 10px; }
            h4 { color: #8b949e; font-weight: normal; line-height: 1.6; margin-bottom: 30px; }

            /* Buttons */
            .custom-button-green {
                background-color: #238636;
                border: 1px solid rgba(240, 246, 252, 0.1);
                border-radius: 6px;
                color: #ffffff;
                padding: 12px 24px;
                font-size: 16px;
                font-weight: 600;
                cursor: pointer;
                text-decoration: none;
                display: inline-block;
                transition: background 0.2s;
            }
            .custom-button-green:hover { background-color: #2ea043; }

            .secondary-btn {
                background: none;
                border: 1px solid #30363d;
                color: #8b949e;
                padding: 5px 10px;
                border-radius: 4px;
                cursor: pointer;
                font-size: 12px;
                margin-top: 50px;
            }
            .secondary-btn:hover { border-color: #8b949e; color: white; }

            .user-pill {
                background: #161b22;
                border: 1px solid #30363d;
                padding: 5px 12px;
                border-radius: 20px;
                display: flex;
                align-items: center;
                gap: 8px;
            }
        </style>
    </head>
    <body>

        <header class="header-container">
            <div class="header-left">
                <img src="https://image2url.com/r2/default/images/1775466030837-0229b739-ab59-47e4-82b7-978befb5b488.png" style="height: 40px;">
                <h2 style="margin: 0; font-size: 18px;">Andrew Dingle Archive</h2>
            </div>
            <div class="header-right" id="auth-zone">
                <a href="login.html" class="nav-link">Sign In</a>
            </div>
        </header>

        <div class="hero">
            <h1>Welcome to the Archive</h1>
            <h4>We are dedicated to researching and preserving the complex lore of the Andrew Dingle universe. Access to detailed records requires authorized clearance.</h4>
            
            <div id="main-action">
                <a href="login.html" class="custom-button-green">Access Dashboard</a>
            </div>

            <button class="secondary-btn" onclick="clearCache()">Clear Session Cache</button>
            <p id="cache-msg" style="color: #7ee787; font-size: 12px; margin-top: 10px;"></p>
        </div>

        <script>
            function updateHeader() {
                const user = localStorage.getItem("loggedUser");
                const authZone = document.getElementById("auth-zone");
                const mainAction = document.getElementById("main-action");

                if (user) {
                    // If logged in, show user info in header
                    authZone.innerHTML = `
                        <div class="user-pill">
                            <span class="material-symbols-outlined" style="font-size: 18px; color: #7ee787;">account_circle</span>
                            <span style="font-size: 14px;">${user}</span>
                        </div>
                        <a href="#" onclick="logout()" class="nav-link">Logout</a>
                    `;
                    // Change main button to go straight to Dash
                    mainAction.innerHTML = `<a href="dash.html" class="custom-button-green">Go to Dashboard</a>`;
                }
            }

            function logout() {
                localStorage.removeItem("loggedUser");
                localStorage.removeItem("isAdmin");
                window.location.reload();
            }

            function clearCache() {
                localStorage.clear();
                document.getElementById("cache-msg").innerHTML = "Local storage cleared successfully.";
                setTimeout(() => { location.reload(); }, 1000);
            }

            // Run on load
            window.onload = updateHeader;
        </script>
    </body>
</html>
