<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrew Dingle Archive | ADA</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --header-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --btn-green: #238636;
            --btn-hover: #2ea043;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
        }
        header {
            background-color: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-left { display: flex; align-items: center; gap: 16px; }
        .logo { font-weight: 600; font-size: 16px; color: #f0f6fc; text-decoration: none; }
        .nav-right { display: flex; align-items: center; gap: 12px; }
        
        .user-pill {
            background: #21262d;
            border: 1px solid var(--border-color);
            padding: 4px 12px;
            border-radius: 2em;
            font-size: 12px;
            display: none; /* Hidden by default */
        }
        .btn {
            padding: 5px 16px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            border: 1px solid var(--border-color);
        }
        .btn-auth { background-color: var(--btn-green); color: white; border: none; }
        .btn-auth:hover { background-color: var(--btn-hover); }
        
        main { padding: 40px; max-width: 1012px; margin: 0 auto; }
        h1 { border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
    </style>
</head>
<body>

<header>
    <div class="nav-left">
        <a href="/" class="logo">ADA</a>
    </div>
    <nav class="nav-right" id="nav-controls">
        <div id="user-display" class="user-pill"></div>
        <a href="/login.html" id="auth-btn" class="btn btn-auth">Sign in</a>
    </nav>
</header>

<main>
    <h1>Andrew Dingle Archive</h1>
    <p>Welcome to the secure archive. Please log in to access the full records.</p>
</main>

<script>
    // Check local session state
    const sessionToken = localStorage.getItem('ada_session');
    const userDisplay = document.getElementById('user-display');
    const authBtn = document.getElementById('auth-btn');

    if (sessionToken) {
        // User is logged in
        userDisplay.style.display = 'block';
        userDisplay.innerText = localStorage.getItem('ada_user_email');
        authBtn.innerText = 'Sign out';
        authBtn.href = '#';
        authBtn.onclick = () => {
            localStorage.clear();
            window.location.reload();
        };
    }
</script>

</body>
</html>
