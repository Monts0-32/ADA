<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADA | Andrew Dingle Archive</title>
    <style>
        :root {
            --bg: #0d1117;
            --header: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --btn-green: #238636;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
        }
        header {
            background-color: var(--header);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-area { font-weight: 600; font-size: 14px; color: #f0f6fc; text-decoration: none; }
        
        nav { display: flex; align-items: center; gap: 12px; }

        /* The User Pill */
        .user-pill {
            background: #21262d;
            border: 1px solid var(--border);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: var(--text);
            display: none; /* Hidden unless logged in */
        }

        .btn {
            font-size: 14px;
            font-weight: 500;
            padding: 5px 16px;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            border: 1px solid var(--border);
            transition: 0.2s;
        }
        .btn-auth { background-color: var(--btn-green); color: white; border: none; }
        .btn-auth:hover { background-color: #2ea043; }
        .btn-out { background-color: transparent; color: #f85149; border-color: rgba(248,81,73,0.4); }
        .btn-out:hover { background-color: #b62324; color: white; }

        main { padding: 40px; max-width: 900px; margin: 0 auto; line-height: 1.6; }
        .hero { border-bottom: 1px solid var(--border); margin-bottom: 24px; padding-bottom: 12px; }
    </style>
</head>
<body>

<header>
    <a href="/" class="logo-area">Andrew Dingle Archive</a>
    <nav>
        <div id="pill" class="user-pill"></div>
        <a href="/login.html" id="auth-link" class="btn btn-auth">Sign in</a>
    </nav>
</header>

<main>
    <div class="hero">
        <h1>Welcome to ADA</h1>
        <p>A secure digital repository for the Andrew Dingle Archive.</p>
    </div>
    <div id="content-status">
        <p>Please authenticate to view protected records.</p>
    </div>
</main>

<script>
    const userPill = document.getElementById('pill');
    const authLink = document.getElementById('auth-link');
    const statusText = document.getElementById('content-status');

    // Check if user is logged in
    const activeSession = localStorage.getItem('ada_session');
    const userEmail = localStorage.getItem('ada_user_email');

    if (activeSession === 'active') {
        // Update UI for logged in state
        userPill.innerText = userEmail;
        userPill.style.display = 'block';
        
        authLink.innerText = 'Sign out';
        authLink.classList.remove('btn-auth');
        authLink.classList.add('btn-out');
        authLink.href = '#';
        
        statusText.innerHTML = `<p style="color: #238636;">● System Online. You have full archive access.</p>`;

        // Sign out logic
        authLink.onclick = () => {
            localStorage.clear();
            window.location.reload();
        };
    }
</script>

</body>
</html>
